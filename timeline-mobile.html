 sensor frontal para detectar cuándo el usuario está mirando la pantalla, atenuando notificaciones o manteniendo la pantalla encendida solo mientras hay atención sostenida.", "desc_en": "The iPhone X uses its front sensor to detect when the user is looking at the screen, dimming notifications or keeping the display on only while attention is sustained.", "category": "UX/Interacción", "category_en": "UX/Interaction", "importance": 1, "region": "Estados Unidos", "region_en": "United States", "note": "Un patrón temprano de diseño que responde a la mirada humana, no solo al toque.", "note_en": "An early design pattern that responds to the human gaze, not just to touch."}, {"id": "UX-0049", "year": 2018, "era": "2018–2019: Gestos totales y modo oscuro", "era_en": "2018–2019: Full gestures and dark mode", "title": "Memoji", "title_en": "Memoji", "desc": "Apple extiende los Animoji hacia los Memoji, permitiendo construir un avatar animado y personalizable del propio usuario para usar en mensajería.", "desc_en": "Apple extends Animoji into Memoji, letting users build a customizable, animated avatar of themselves for use in messaging.", "category": "UX/Interacción", "category_en": "UX/Interaction", "importance": 1, "region": "Estados Unidos", "region_en": "United States", "note": "La identidad visual personal entra a la mensajería como un elemento diseñable, no solo una foto de perfil.", "note_en": "Personal visual identity enters messaging as a designable element, not just a profile photo."}, {"id": "UX-0050", "year": 2018, "era": "2018–2019: Gestos totales y modo oscuro", "era_en": "2018–2019: Full gestures and dark mode", "title": "Haptic Touch", "title_en": "Haptic Touch", "desc": "Apple reemplaza el sensible a presión 3D Touch por Haptic Touch, una alternativa basada en mantener presionado más vibración, más fácil de implementar en un rango más amplio de hardware.", "desc_en": "Apple replaces pressure-sensitive 3D Touch with Haptic Touch, a long-press-plus-vibration alternative that's easier to implement across a much wider range of hardware.", "category": "UX/Interacción", "category_en": "UX/Interaction", "importance": 2, "region": "Estados Unidos", "region_en": "United States", "note": "A veces simplificar una tecnología (de presión a tiempo) mejora la consistencia del ecosistema completo.", "note_en": "Sometimes simplifying a technology (from pressure to time) improves consistency across the whole ecosystem."}, {"id": "UX-0051", "year": 2018, "era": "2018–2019: Gestos totales y modo oscuro", "era_en": "2018–2019: Full gestures and dark mode", "title": "Navegación gesture-first", "title_en": "Gesture-first navigation", "desc": "Android 9 Pie introduce un nuevo sistema de navegación basado en gestos (indicador de inicio en forma de píldora), con Google siguiendo el camino abierto por el iPhone X para reducir botones en pantalla.", "desc_en": "Android 9 Pie introduces a new gesture-based navigation system (a pill-shaped home indicator), with Google following the path opened by the iPhone X to reduce on-screen buttons.", "category": "UX/Interacción", "category_en": "UX/Interaction", "importance": 2, "region": "Estados Unidos", "region_en": "United States", "note": "La convergencia de patrones entre iOS y Android acelera cuando un gesto exitoso se copia rápido.", "note_en": "The convergence of patterns between iOS and Android accelerates whenever a successful gesture gets copied fast."}, {"id": "DEV-0011", "year": 2019, "era": "2018–2019: Gestos totales y modo oscuro", "era_en": "2018–2019: Full gestures and dark mode", "title": "Samsung Galaxy Fold", "title_en": "Samsung Galaxy Fold", "desc": "Samsung lanza el primer smartphone plegable de producción masiva, introduciendo desafíos de diseño alrededor de layouts adaptativos y continuidad entre estados de pantalla.", "desc_en": "Samsung launches the first mass-produced foldable smartphone, introducing design challenges around adaptive layouts and continuity across screen states.", "category": "Dispositivos", "category_en": "Devices", "importance": 2, "region": "Corea del Sur", "region_en": "South Korea", "note": "Los patrones de 'continuidad' al plegar/desplegar se volverían un nuevo territorio de la UX.", "note_en": "'Continuity' patterns for folding/unfolding would become an entirely new UX frontier."}, {"id": "MOB-0009", "year": 2019, "era": "2018–2019: Gestos totales y modo oscuro", "era_en": "2018–2019: Full gestures and dark mode", "title": "Despliegue comercial de 5G", "title_en": "Commercial rollout of 5G", "desc": "Corea del Sur y Estados Unidos (Verizon) lanzan las primeras redes 5G comerciales, prometiendo latencia ultra baja que habilitaría realidad aumentada, cloud gaming e interfaces IoT más densas.", "desc_en": "South Korea and the United States (Verizon) launch the first commercial 5G networks, promising ultra-low latency that would enable augmented reality, cloud gaming, and denser IoT interfaces.", "category": "Redes", "category_en": "Networks", "importance": 2, "region": "Corea del Sur / Estados Unidos", "region_en": "South Korea / United States", "note": "La latencia baja del 5G es lo que hace viables las interacciones AR en tiempo real.", "note_en": "5G's low latency is what makes real-time AR interactions viable."}, {"id": "UX-0052", "year": 2019, "era": "2018–2019: Gestos totales y modo oscuro", "era_en": "2018–2019: Full gestures and dark mode", "title": "Navegación gestual de Android", "title_en": "Android gesture navigation", "desc": "Android 10 finaliza una navegación completamente gestual (deslizamientos desde el borde para atrás/inicio/apps recientes), permitiendo desactivar por completo la barra de navegación de tres botones.", "desc_en": "Android 10 finalizes fully gestural navigation (edge swipes for back/home/recent apps), letting users disable the traditional three-button nav bar entirely.", "category": "UX/Interacción", "category_en": "UX/Interaction", "importance": 2, "region": "Estados Unidos", "region_en": "United States", "note": "Dos ecosistemas distintos convergen, con matices, en el mismo lenguaje gestual de navegación.", "note_en": "Two distinct ecosystems converge, with nuances, on the same gestural navigation language."}, {"id": "UX-0053", "year": 2019, "era": "2018–2019: Gestos totales y modo oscuro", "era_en": "2018–2019: Full gestures and dark mode", "title": "UX para pantallas plegables", "title_en": "Foldable UX", "desc": "Con el Galaxy Fold y dispositivos similares, el diseño debe resolver la 'continuidad': apps que se redimensionan en vivo mientras la pantalla se despliega, y nuevos patrones de multitarea en pantallas plegadas más grandes.", "desc_en": "With the Galaxy Fold and similar devices, design has to solve for 'continuity': apps resizing live as the screen unfolds, and new multitasking patterns for larger folded screens.", "category": "UX/Interacción", "category_en": "UX/Interaction", "importance": 2, "region": "Corea del Sur", "region_en": "South Korea", "note": "Diseñar para un dispositivo que cambia de forma de tamaño en medio del uso es un problema nuevo por completo.", "note_en": "Designing for a device that changes shape and size mid-use is an entirely new kind of problem."}, {"id": "UX-0054", "year": 2019, "era": "2018–2019: Gestos totales y modo oscuro", "era_en": "2018–2019: Full gestures and dark mode", "title": "Modo oscuro (Dark Mode)", "title_en": "Dark Mode", "desc": "iOS 13 y Android 10 lanzan modo oscuro a nivel de todo el sistema, obligando a todo el ecosistema de diseño a soportar temas de color claro y oscuro como expectativa básica.", "desc_en": "iOS 13 and Android 10 both ship system-wide Dark Mode, forcing the entire design ecosystem to support light and dark color themes as a baseline expectation.", "category": "UX/Interacción", "category_en": "UX/Interaction", "importance": 2, "region": "Global", "region_en": "Global", "note": "De opción estética a requisito de accesibilidad y ahorro de batería: el modo oscuro cambió el proceso de diseño de sistemas de color.", "note_en": "From aesthetic option to accessibility and battery-saving requirement: Dark Mode changed how color systems get designed."}, {"id": "DEV-0012", "year": 2020, "era": "2020–2025: IA, multimodalidad y pantallas adaptativas", "era_en": "2020–2025: AI, multimodality and adaptive screens", "title": "iPad Pro con LiDAR", "title_en": "iPad Pro with LiDAR", "desc": "Apple incorpora un escáner LiDAR al iPad Pro, habilitando detección de profundidad para una colocación e interacción de objetos de realidad aumentada mucho más precisa.", "desc_en": "Apple adds a LiDAR scanner to the iPad Pro, enabling depth sensing for far more precise placement and interaction with augmented-reality objects.", "category": "Dispositivos", "category_en": "Devices", "importance": 1, "region": "Estados Unidos", "region_en": "United States", "note": "Profundidad de sensor = objetos AR que finalmente 'se quedan quietos' en el mundo real.", "note_en": "Sensor depth = AR objects that finally 'stay put' in the real world."}, {"id": "UX-0055", "year": 2020, "era": "2020–2025: IA, multimodalidad y pantallas adaptativas", "era_en": "2020–2025: AI, multimodality and adaptive screens", "title": "Widgets interactivos", "title_en": "Interactive widgets", "desc": "iOS 14 rediseña los widgets de pantalla de inicio para mostrar información viva y de un vistazo (y más adelante controles interactivos), moviendo la pantalla de inicio de íconos estáticos hacia contenido dinámico.", "desc_en": "iOS 14 redesigns home-screen widgets to show live, glanceable information (and later interactive controls), moving the home screen from static icons toward dynamic content.", "category": "UX/Interacción", "category_en": "UX/Interaction", "importance": 2, "region": "Estados Unidos", "region_en": "United States", "note": "La pantalla de inicio pasa de ser un directorio de apps a ser, en sí misma, una superficie de información.", "note_en": "The home screen goes from being an app directory to becoming, in itself, an information surface."}, {"id": "UX-0056", "year": 2020, "era": "2020–2025: IA, multimodalidad y pantallas adaptativas", "era_en": "2020–2025: AI, multimodality and adaptive screens", "title": "Arrastrar y soltar múltiples ítems", "title_en": "Multi-item drag & drop", "desc": "iPadOS perfecciona el drag & drop para soportar tomar varios ítems a la vez y moverlos entre apps, extendiendo gestos de multitarea de nivel escritorio hacia las tablets.", "desc_en": "iPadOS refines drag-and-drop to support picking up several items at once and moving them between apps, extending desktop-class multitasking gestures to tablets.", "category": "UX/Interacción", "category_en": "UX/Interaction", "importance": 1, "region": "Estados Unidos", "region_en": "United States", "note": "Un gesto que traslada metáforas de productividad de escritorio a un dispositivo pensado originalmente para consumo.", "note_en": "A gesture that carries desktop productivity metaphors onto a device originally designed for consumption."}, {"id": "UX-0057", "year": 2020, "era": "2020–2025: IA, multimodalidad y pantallas adaptativas", "era_en": "2020–2025: AI, multimodality and adaptive screens", "title": "Interacciones con LiDAR", "title_en": "LiDAR interactions", "desc": "Los iPad/iPhone con LiDAR permiten que las apps de realidad aumentada coloquen objetos virtuales con comprensión de profundidad casi instantánea y precisa, mejorando oclusión y realismo en la UX de AR.", "desc_en": "LiDAR-equipped iPads/iPhones let AR apps place virtual objects with near-instant, accurate depth understanding, improving occlusion and realism in AR UX.", "category": "UX/Interacción", "category_en": "UX/Interaction", "importance": 1, "region": "Estados Unidos", "region_en": "United States", "note": "Cuanto mejor entiende el sensor el mundo real, menos 'trucos' de diseño necesita disimular en AR.", "note_en": "The better the sensor understands the real world, the fewer design 'tricks' AR needs to hide."}, {"id": "UX-0058", "year": 2021, "era": "2020–2025: IA, multimodalidad y pantallas adaptativas", "era_en": "2020–2025: AI, multimodality and adaptive screens", "title": "Live Text", "title_en": "Live Text", "desc": "iOS 15 introduce Live Text, permitiendo que la cámara o cualquier foto reconozca texto y deje seleccionarlo, copiarlo o accionarlo directamente dentro de una imagen en tiempo real.", "desc_en": "iOS 15 introduces Live Text, letting the camera or any photo recognize text and let users select, copy, or act on it directly within an image in real time.", "category": "UX/Interacción", "category_en": "UX/Interaction", "importance": 2, "region": "Estados Unidos", "region_en": "United States", "note": "La cámara deja de ser solo captura y se convierte en una herramienta de lectura e interacción con texto.", "note_en": "The camera stops being just a capture tool and becomes a text-reading and interaction tool."}, {"id": "UX-0059", "year": 2021, "era": "2020–2025: IA, multimodalidad y pantallas adaptativas", "era_en": "2020–2025: AI, multimodality and adaptive screens", "title": "Design tokens", "title_en": "Design tokens", "desc": "Los sistemas de diseño multiplataforma formalizan cada vez más los 'design tokens' (valores nombrados de color, espaciado, tipografía) para que una sola fuente de verdad guíe una UI consistente en iOS, Android y web.", "desc_en": "Cross-platform design systems increasingly formalize 'design tokens' (named values for color, spacing, typography) so a single source of truth can drive consistent UI across iOS, Android, and web.", "category": "UX/Interacción", "category_en": "UX/Interaction", "importance": 1, "region": "Global", "region_en": "Global", "note": "Menos un gesto visible y más una infraestructura invisible que hace posible la consistencia entre plataformas.", "note_en": "Less a visible gesture and more an invisible infrastructure that makes cross-platform consistency possible."}, {"id": "UX-0060", "year": 2022, "era" ", "era_en": "2020–2025: AI, multimodality and adaptive screens", "title": "Dispositivos con IA on-device", "title_en": "On-device AI devices", "desc": "Smartphones como Google Pixel y Samsung Galaxy S24 comienzan a incluir chips neuronales dedicados para ejecutar funciones de IA generativa localmente, cambiando las expectativas de privacidad y latencia en la UX móvil.", "desc_en": "Smartphones such as the Google Pixel and Samsung Galaxy S24 begin shipping dedicated neural chips to run generative-AI features locally, changing privacy and latency expectations in mobile UX.", "category": "Dispositivos", "category_en": "Devices", "importance": 2, "region": "Global", "region_en": "Global", "note": "Procesar IA en el dispositivo, no en la nube, es la nueva frontera de diseño de confianza.", "note_en": "Processing AI on the device, not in the cloud, is the new frontier of trust-centered design."}, {"id": "UX-0062", "year": 2023, "era": "2020–2025: IA, multimodalidad y pantallas adaptativas", "era_en": "2020–2025: AI, multimodality and adaptive screens", "title": "Interfaces de IA generativa", "title_en": "Generative AI interfaces", "desc": "Las apps comienzan a incorporar interfaces de chat/prompt con IA generativa (al estilo ChatGPT) directamente en la UX móvil para creación de contenido, búsqueda y asistencia.", "desc_en": "Apps begin embedding generative-AI chat/prompt interfaces (ChatGPT-style) directly into mobile UX for content creation, search, and assistance.", "category": "UX/Interacción", "category_en": "UX/Interaction", "importance": 2, "region": "Global", "region_en": "Global", "note": "El campo de texto de búsqueda evoluciona hacia una conversación abierta con un modelo de lenguaje.", "note_en": "The search text field evolves into an open-ended conversation with a language model."}, {"id": "UX-0063", "year": 2023, "era": "2020–2025: IA, multimodalidad y pantallas adaptativas", "era_en": "2020–2025: AI, multimodality and adaptive screens", "title": "UX de IA on-device", "title_en": "On-device AI UX", "desc": "Los fabricantes llevan funciones de IA (transcripción, resúmenes, generación de imágenes) a ejecutarse en el propio dispositivo mediante chips neuronales dedicados, cambiando las expectativas de UX en velocidad, disponibilidad offline y privacidad.", "desc_en": "Manufacturers push AI features (transcription, summarization, image generation) to run on the device itself via dedicated neural chips, changing UX expectations around speed, offline availability, and privacy.", "category": "UX/Interacción", "category_en": "UX/Interaction", "importance": 2, "region": "Global", "region_en": "Global", "note": "La IA que corre sin conexión cambia el contrato de confianza entre usuario y dispositivo.", "note_en": "AI that runs offline changes the trust contract between user and device."}, {"id": "UX-0064", "year": 2025, "era": "2020–2025: IA, multimodalidad y pantallas adaptativas", "era_en": "2020–2025: AI, multimodality and adaptive screens", "title": "Interfaces multimodales adaptativas", "title_en": "Adaptive multimodal interfaces", "desc": "Las interfaces móviles combinan cada vez más voz, texto, cámara y gestos de forma intercambiable dentro de un mismo flujo, permitiendo cambiar de modalidad de entrada a mitad de tarea mientras sistemas de IA interpretan la intención entre modalidades.", "desc_en": "Mobile interfaces increasingly combine voice, text, camera, and gesture interchangeably within a single flow, letting users switch input modality mid-task while AI systems interpret intent across modalities.", "category": "UX/Interacción", "category_en": "UX/Interaction", "importance": 2, "region": "Global", "region_en": "Global", "note": "El futuro cercano de la UX: menos 'elegir el botón correcto' y más 'expresar la intención de la forma que sea más natural'.", "note_en": "The near future of UX: less 'pick the right button' and more 'express your intent however feels most natural.'"}]</script>
<script>
// Iconografía por categoría — estilo línea, 24x24 viewBox, stroke-based
const CATEGORY_ICONS = {
  'Redes': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="9"/>
    <ellipse cx="12" cy="12" rx="4" ry="9"/>
    <line x1="3" y1="12" x2="21" y2="12"/>
    <path d="M4.5 7 H19.5"/>
    <path d="M4.5 17 H19.5"/>
  </svg>`,

  'Dispositivos': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <rect x="7" y="2.5" width="10" height="19" rx="2.2"/>
    <line x1="10" y1="19" x2="14" y2="19"/>
  </svg>`,

  'UX/Interacción': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="4" width="18" height="13" rx="1.5"/>
    <line x1="3" y1="8" x2="21" y2="8"/>
    <path d="M8.5 12.8 L10.5 14.8 L15 10.2"/>
  </svg>`
};

const SUN_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.5"/><line x1="12" y1="1.5" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22.5"/><line x1="4.2" y1="4.2" x2="6" y2="6"/><line x1="18" y1="18" x2="19.8" y2="19.8"/><line x1="1.5" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22.5" y2="12"/><line x1="4.2" y1="19.8" x2="6" y2="18"/><line x1="18" y1="6" x2="19.8" y2="4.2"/></svg>`;
const MOON_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a6.8 6.8 0 0 0 10.5 10.5Z"/></svg>`;

// ===== CONFIG =====
const CATEGORY_COLORS = {
  'Redes': 'var(--c-redes)',
  'Dispositivos': 'var(--c-dispositivos)',
  'UX/Interacción': 'var(--c-ux)'
};
// Color de texto/ícono con contraste seguro sobre cada color de categoría.
// Dispositivos (#4A3AFF) es demasiado oscuro para texto oscuro (ratio ~3:1, falla AA);
// Redes y UX/Interacción sí tienen suficiente contraste con texto oscuro (ratio > 7:1).
const CATEGORY_TEXT = {
  'Redes': '#0B0B14',
  'Dispositivos': '#FFFFFF',
  'UX/Interacción': '#0B0B14'
};
const MAIN_CATS = ['Redes', 'Dispositivos', 'UX/Interacción'];

const EVENTS = JSON.parse(document.getElementById('events-data').textContent);
const YEAR_MIN = Math.min(...EVENTS.map(e => e.year));
const YEAR_MAX = Math.max(...EVENTS.map(e => e.year));

// ===== I18N =====
const STR = {
  es: {
    eyebrow: "Taller de Diseño Digital",
    titleHTML: 'Línea de tiempo <span>Mobile UX</span>',
    searchPlaceholder: "Buscar evento...",
    allRegions: "Todas las regiones",
    clearFilters: "Limpiar filtros",
    from: "Desde",
    to: "Hasta",
    footer: "Coloripop · Datos: investigación histórica verificada, 1947–2025",
    emptyState: "No hay eventos que coincidan con estos filtros.",
    designNote: "Nota de diseño",
    regionLabel: "Región / origen",
    importanceLabel: "Importancia",
    refIdLabel: "ID de referencia",
    themeToLight: "Cambiar a modo claro",
    themeToDark: "Cambiar a modo oscuro",
    showing: (n, total) => `Mostrando <b>${n}</b> de ${total} eventos`,
    headerMeta: (n, from, to) => `${n} eventos · ${from}–${to}`,
    categories: { 'Redes':'Redes', 'Dispositivos':'Dispositivos', 'UX/Interacción':'UX/Interacción' }
  },
  en: {
    eyebrow: "Digital Design Workshop",
    titleHTML: 'Mobile UX <span>Timeline</span>',
    searchPlaceholder: "Search event...",
    allRegions: "All regions",
    clearFilters: "Clear filters",
    from: "From",
    to: "To",
    footer: "Coloripop — Data: verified historical research, 1947–2025",
    emptyState: "No events match these filters.",
    designNote: "Design note",
    regionLabel: "Region / origin",
    importanceLabel: "Importance",
    refIdLabel: "Reference ID",
    themeToLight: "Switch to light mode",
    themeToDark: "Switch to dark mode",
    showing: (n, total) => `Showing <b>${n}</b> of ${total} events`,
    headerMeta: (n, from, to) => `${n} events · ${from}–${to}`,
    categories: { 'Redes':'Networks', 'Dispositivos':'Devices', 'UX/Interacción':'UX/Interaction' }
  }
};

// ===== STATE =====
let activeFilters = new Set();
let searchQuery = '';
let yearFrom = YEAR_MIN;
let yearTo = YEAR_MAX;
let selectedRegion = '';
let currentLang = 'es';
let currentTheme = 'dark';

// generic bilingual field getter: title/title_en, desc/desc_en, note/note_en, era/era_en, region/region_en, category/category_en
function L(ev, field){
  return currentLang === 'es' ? ev[field] : ev[field + '_en'];
}

// ===== THEME =====
function setTheme(theme){
  currentTheme = theme;
  document.documentElement.setAttribute('data-theme', theme);
  const btn = document.getElementById('themeToggle');
  btn.innerHTML = currentTheme === 'dark' ? SUN_ICON : MOON_ICON;
  btn.title = currentTheme === 'dark' ? STR[currentLang].themeToLight : STR[currentLang].themeToDark;
}
document.getElementById('themeToggle').addEventListener('click', () => {
  setTheme(currentTheme === 'dark' ? 'light' : 'dark');
});

// ===== LANGUAGE =====
function applyStaticStrings(){
  const s = STR[currentLang];
  document.documentElement.lang = currentLang;
  document.getElementById('eyebrowText').textContent = s.eyebrow;
  document.getElementById('titleText').innerHTML = s.titleHTML;
  document.getElementById('searchInput').placeholder = s.searchPlaceholder;
  document.getElementById('clearBtn').textContent = s.clearFilters;
  document.getElementById('fromEyebrow').textContent = s.from;
  document.getElementById('toEyebrow').textContent = s.to;
  document.getElementById('footerText').textContent = s.footer;
  document.querySelectorAll('#mainToggles .toggle-btn').forEach(btn => {
    btn.querySelector('.cat-label').textContent = s.categories[btn.dataset.cat];
  });
  const btn = document.getElementById('themeToggle');
  btn.title = currentTheme === 'dark' ? s.themeToLight : s.themeToDark;
}

function setLang(lang){
  currentLang = lang;
  document.getElementById('langEs').classList.toggle('active', lang === 'es');
  document.getElementById('langEn').classList.toggle('active', lang === 'en');
  applyStaticStrings();
  buildRegionOptions();
  refreshEraTooltips();
  render();
}
document.getElementById('langEs').addEventListener('click', () => setLang('es'));
document.getElementById('langEn').addEventListener('click', () => setLang('en'));

// ===== REGION FILTER =====
const regionSelect = document.getElementById('regionSelect');
function buildRegionOptions(){
  const previousValue = selectedRegion;
  const counts = {};
  EVENTS.forEach(ev => { counts[ev.region] = (counts[ev.region] || 0) + 1; });
  const regions = Object.keys(counts).sort((a,b) => counts[b] - counts[a]);
  regionSelect.innerHTML = '';
  const defaultOpt = document.createElement('option');
  defaultOpt.value = '';
  defaultOpt.textContent = STR[currentLang].allRegions;
  regionSelect.appendChild(defaultOpt);
  regions.forEach(r => {
    const label = currentLang === 'es' ? r : (EVENTS.find(e => e.region === r).region_en);
    const opt = document.createElement('option');
    opt.value = r;
    opt.textContent = `${label} (${counts[r]})`;
    regionSelect.appendChild(opt);
  });
  regionSelect.value = previousValue;
}
regionSelect.addEventListener('change', () => {
  selectedRegion = regionSelect.value;
  render();
});

// ===== MAIN TOGGLES =====
document.querySelectorAll('#mainToggles .toggle-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const cat = btn.dataset.cat;
    toggleFilter(cat);
    btn.classList.toggle('active', activeFilters.has(cat));
  });
});

function toggleFilter(cat){
  if(activeFilters.has(cat)) activeFilters.delete(cat);
  else activeFilters.add(cat);
  render();
}

document.getElementById('clearBtn').addEventListener('click', () => {
  activeFilters.clear();
  searchQuery = '';
  yearFrom = YEAR_MIN;
  yearTo = YEAR_MAX;
  selectedRegion = '';
  regionSelect.value = '';
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  rangeFrom.value = YEAR_MIN;
  rangeTo.value = YEAR_MAX;
  updateRangeUI();
  render();
});

document.getElementById('searchInput').addEventListener('input', (e) => {
  searchQuery = e.target.value.trim().toLowerCase();
  render();
});

// ===== FILTER LOGIC =====
function getFiltered(){
  let result = EVENTS.filter(ev => ev.year >= yearFrom && ev.year <= yearTo);
  if(activeFilters.size > 0){
    result = result.filter(ev => activeFilters.has(ev.category));
  }
  if(selectedRegion){
    result = result.filter(ev => ev.region === selectedRegion);
  }
  if(searchQuery){
    result = result.filter(ev =>
      L(ev,'title').toLowerCase().includes(searchQuery) ||
      L(ev,'desc').toLowerCase().includes(searchQuery) ||
      L(ev,'era').toLowerCase().includes(searchQuery) ||
      String(ev.year).includes(searchQuery) ||
      (ev.id && ev.id.toLowerCase().includes(searchQuery))
    );
  }
  return result;
}

// ===== RENDER TIMELINE =====
function highlightMatch(text){
  if(!searchQuery) return escapeHTML(text);
  const escaped = escapeHTML(text);
  const idx = escaped.toLowerCase().indexOf(searchQuery.toLowerCase());
  if(idx === -1) return escaped;
  return escaped.slice(0, idx) + '<mark>' + escaped.slice(idx, idx + searchQuery.length) + '</mark>' + escaped.slice(idx + searchQuery.length);
}
function escapeHTML(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function buildCard(ev){
  const color = CATEGORY_COLORS[ev.category];
  const textColor = CATEGORY_TEXT[ev.category];
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <span class="cat-stripe" style="background:${color}"></span>
    <span class="imp-badge">${'★'.repeat(ev.importance)}</span>
    <div class="date">${ev.year}</div>
    <div class="title">${highlightMatch(L(ev,'title'))}</div>
    <div class="tags"><span class="tag" style="background:${color}; color:${textColor}">${L(ev,'category')}</span></div>
  `;
  card.addEventListener('click', () => openModal(ev));
  return card;
}

function buildNode(ev){
  const node = document.createElement('div');
  node.className = 'node imp-' + ev.importance;
  node.style.setProperty('--node-color', CATEGORY_COLORS[ev.category]);
  node.style.color = CATEGORY_TEXT[ev.category];
  node.innerHTML = CATEGORY_ICONS[ev.category] || '';
  node.addEventListener('click', () => openModal(ev));
  return node;
}

// ===== MODAL =====
function openModal(ev){
  const overlay = document.getElementById('modalOverlay');
  const card = document.getElementById('modalCard');
  const color = CATEGORY_COLORS[ev.category];
  const textColor = CATEGORY_TEXT[ev.category];
  const s = STR[currentLang];

  card.innerHTML = `
    <div class="modal-close" id="modalCloseBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>
    <div class="modal-icon" style="background:${color}; color:${textColor}">${CATEGORY_ICONS[ev.category] || ''}</div>
    <div class="modal-date">${ev.year} · ${L(ev,'era')}</div>
    <h2 class="modal-title">${L(ev,'title')}</h2>
    <div class="modal-tags"><span class="tag" style="background:${color}; color:${textColor}">${L(ev,'category')}</span></div>
    <p class="modal-desc">${L(ev,'desc')}</p>
    <div class="modal-note"><b>${s.designNote}</b>${L(ev,'note')}</div>
    <div class="modal-meta">
      <span><b>${s.regionLabel}:</b> ${L(ev,'region') || '—'}</span>
      <span><b>${s.importanceLabel}:</b> ${'★'.repeat(ev.importance)}${'☆'.repeat(3-ev.importance)}</span>
      <span><b>${s.refIdLabel}:</b> ${ev.id}</span>
    </div>
  `;
  overlay.classList.add('open');
  document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
}
function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
}
document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if(e.target.id === 'modalOverlay') closeModal();
});
document.addEventListener('keydown', (e) => {
  if(e.key === 'Escape') closeModal();
});

function render(){
  const filtered = getFiltered();
  const track = document.getElementById('timelineTrack');
  const resultCount = document.getElementById('resultCount');
  const headerMeta = document.getElementById('headerMeta');
  const s = STR[currentLang];

  resultCount.innerHTML = s.showing(filtered.length, EVENTS.length);
  if(filtered.length){
    headerMeta.textContent = s.headerMeta(filtered.length, filtered[0].year, filtered[filtered.length-1].year);
  }

  track.innerHTML = '<div class="spine"></div>';

  if(filtered.length === 0){
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.style.width = '100%';
    empty.textContent = s.emptyState;
    track.appendChild(empty);
    return;
  }

  let lastEra = null;
  let alternate = 0;

  filtered.forEach((ev) => {
    const eraLabel = L(ev,'era');
    if(eraLabel !== lastEra){
      const marker = document.createElement('div');
      marker.className = 'era-marker';
      marker.innerHTML = `
        <span class="year-big">${ev.year}</span>
        <span class="era-label">${eraLabel}</span>
      `;
      track.appendChild(marker);
      lastEra = eraLabel;
    }

    const col = document.createElement('div');
    const isTop = alternate % 2 === 0;
    col.className = 'event-col ' + (isTop ? 'top' : 'bottom');
    col.dataset.year = ev.year;

    const connH = ev.importance === 3 ? 26 : 22;
    col.style.setProperty('--conn-h', connH + 'px');

    const halfTop = document.createElement('div');
    halfTop.className = 'col-half half-top';
    const halfBottom = document.createElement('div');
    halfBottom.className = 'col-half half-bottom';

    const activeHalf = isTop ? halfTop : halfBottom;

    const connector = document.createElement('div');
    connector.className = 'connector';
    activeHalf.appendChild(connector);

    activeHalf.appendChild(buildNode(ev));

    const slot = document.createElement('div');
    slot.className = 'card-slot';
    slot.appendChild(buildCard(ev));
    activeHalf.appendChild(slot);

    col.appendChild(halfTop);
    col.appendChild(halfBottom);

    track.appendChild(col);
    alternate++;
  });

  updateScrollProgress();
}

// ===== YEAR RANGE SLIDER =====
const rangeFrom = document.getElementById('rangeFrom');
const rangeTo = document.getElementById('rangeTo');
const yearFromLabel = document.getElementById('yearFromLabel');
const yearToLabel = document.getElementById('yearToLabel');
const rangeFill = document.getElementById('rangeFill');
const eraTicksWrap = document.getElementById('eraTicks');
const eraLabelsWrap = document.getElementById('eraLabels');
const MIN_GAP = 1;

rangeFrom.min = YEAR_MIN; rangeFrom.max = YEAR_MAX; rangeFrom.value = YEAR_MIN;
rangeTo.min = YEAR_MIN; rangeTo.max = YEAR_MAX; rangeTo.value = YEAR_MAX;

// eraStarts: one entry per distinct era, short label = leading year range (identical in both languages)
const eraStarts = [];
const seenEras = new Set();
EVENTS.slice().sort((a,b) => a.year - b.year).forEach(ev => {
  if(!seenEras.has(ev.era)){
    seenEras.add(ev.era);
    eraStarts.push({
      year: ev.year,
      shortLabel: ev.era.split(':')[0],
      era_es: ev.era,
      era_en: ev.era_en
    });
  }
});

const eraTickEls = [];
function buildEraTicks(){
  const min = YEAR_MIN, max = YEAR_MAX;
  eraStarts.forEach(e => {
    const pct = ((e.year - min) / (max - min)) * 100;

    const tick = document.createElement('div');
    tick.className = 'range-era-tick';
    tick.style.left = pct + '%';
    tick.addEventListener('click', () => jumpToEra(e.year));
    eraTicksWrap.appendChild(tick);

    const label = document.createElement('div');
    label.className = 'range-era-label';
    label.style.left = pct + '%';
    label.textContent = e.shortLabel;
    label.addEventListener('click', () => jumpToEra(e.year));
    eraLabelsWrap.appendChild(label);

    eraTickEls.push({ tick, label, era_es: e.era_es, era_en: e.era_en });
  });
  refreshEraTooltips();
}
function refreshEraTooltips(){
  eraTickEls.forEach(({tick, label, era_es, era_en}) => {
    const full = currentLang === 'es' ? era_es : era_en;
    tick.title = full;
    label.title = full;
  });
}

function jumpToEra(year){
  yearFrom = year;
  if(yearTo <= yearFrom) yearTo = YEAR_MAX;
  rangeFrom.value = yearFrom;
  rangeTo.value = yearTo;
  updateRangeUI();
  render();
}

function updateRangeUI(){
  const min = Number(rangeFrom.min);
  const max = Number(rangeFrom.max);
  const pctFrom = ((yearFrom - min) / (max - min)) * 100;
  const pctTo = ((yearTo - min) / (max - min)) * 100;
  rangeFill.style.left = pctFrom + '%';
  rangeFill.style.width = (pctTo - pctFrom) + '%';
  yearFromLabel.textContent = yearFrom;
  yearToLabel.textContent = yearTo;
}

rangeFrom.addEventListener('input', () => {
  yearFrom = Math.min(Number(rangeFrom.value), yearTo - MIN_GAP);
  rangeFrom.value = yearFrom;
  updateRangeUI();
  render();
});
rangeTo.addEventListener('input', () => {
  yearTo = Math.max(Number(rangeTo.value), yearFrom + MIN_GAP);
  rangeTo.value = yearTo;
  updateRangeUI();
  render();
});

// ===== SCROLL PROGRESS INDICATOR =====
const timelineScrollEl = document.getElementById('timelineScroll');
const scrollProgressBar = document.getElementById('scrollProgressBar');
const scrollPositionLabel = document.getElementById('scrollPositionLabel');

function updateScrollProgress(){
  const el = timelineScrollEl;
  const maxScroll = el.scrollWidth - el.clientWidth;
  const pct = maxScroll > 0 ? (el.scrollLeft / maxScroll) * 100 : 0;
  scrollProgressBar.style.width = Math.min(100, Math.max(0, pct)) + '%';

  const viewportCenter = el.scrollLeft + el.clientWidth / 2;
  const cols = el.querySelectorAll('.event-col');
  let closest = null;
  let closestDist = Infinity;
  cols.forEach(col => {
    const colCenter = col.offsetLeft + col.offsetWidth / 2;
    const dist = Math.abs(colCenter - viewportCenter);
    if(dist < closestDist){ closestDist = dist; closest = col; }
  });
  scrollPositionLabel.textContent = closest ? closest.dataset.year : '';
}

timelineScrollEl.addEventListener('scroll', updateScrollProgress, { passive: true });
window.addEventListener('resize', updateScrollProgress);

// ===== TRACK HEIGHT SYNC =====
function syncTrackHeight(){
  const h = timelineScrollEl.clientHeight;
  if(h > 0){
    document.getElementById('timelineTrack').style.setProperty('--track-h', h + 'px');
  }
}

const yearRangeEl = document.querySelector('.year-range');
function syncYearRangeHeight(){
  const h = yearRangeEl.getBoundingClientRect().height;
  if(h > 0){
    document.documentElement.style.setProperty('--year-range-h', h + 'px');
  }
  syncTrackHeight();
}
if(typeof ResizeObserver !== 'undefined'){
  const trackResizeObserver = new ResizeObserver(() => syncYearRangeHeight());
  trackResizeObserver.observe(timelineScrollEl);
  trackResizeObserver.observe(yearRangeEl);
} else {
  window.addEventListener('resize', syncYearRangeHeight);
}
window.addEventListener('resize', syncYearRangeHeight);

// ===== INIT =====
setTheme('light');
buildRegionOptions();
buildEraTicks();
updateRangeUI();
syncYearRangeHeight();
render();

</script>
</body>
</html>
