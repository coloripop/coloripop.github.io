ed: false\n    };\n  }\n\n  persist() {\n    const s = this.state;\n    try { localStorage.setItem('rh-onboarding-v1', JSON.stringify({ lang: s.lang, dark: s.dark, name: s.name, role: s.role, done: s.done, checks: s.checks })); } catch (e) {}\n  }\n  set(patch) { this.setState(patch, () => this.persist()); }\n\n  // ─── content ───\n  content() {\n    const L = this.state.lang;\n    const t = (en, es) => (L === 'es' ? es : en);\n    const ui = {\n      appTitle: t('UX/UI Team Onboarding', 'Onboarding del equipo UX/UI'),\n      kicker: t('SRS · Roof Hub design team', 'SRS · Equipo de diseño Roof Hub'),\n      welcomeH1: t('Welcome to the team.', 'Bienvenido al equipo.'),\n      welcomeP: t('This walkthrough gets you productive in your first week: who we are, how we work a sprint, how the UI Kit evolves, and the tools you need access to. Short modules, a quick check at the end of each — your progress is saved on this device.', 'Este recorrido te hace productivo en tu primera semana: quiénes somos, cómo trabajamos un sprint, cómo evoluciona el UI Kit y las herramientas que necesitas. Módulos cortos, con una comprobación rápida al final — tu progreso se guarda en este dispositivo.'),\n      coverStatus: t('Status:', 'Estado:'),\n      coverStatusVal: t('In progress', 'En progreso'),\n      coverVersion: t('Version:', 'Versión:'),\n      coverContribs: t('Contributors:', 'Colaboradores:'),\n      nameLabel: t('Your name', 'Tu nombre'),\n      namePh: t('e.g. Alex', 'p. ej. Alex'),\n      roleLabel: t('Pick your role', 'Elige tu rol'),\n      startBtn: t('Start onboarding', 'Comenzar onboarding'),\n      changeRole: t('Change role', 'Cambiar rol'),\n      themeToggle: t('Toggle light / dark', 'Cambiar claro / oscuro'),\n      dashP: t('Work through the core modules first, then the one for your role. Come back anytime — everything is saved.', 'Completa primero los módulos base y luego el de tu rol. Vuelve cuando quieras — todo queda guardado.'),\n      coreHeading: t('Core — everyone', 'Base — para todos'),\n      doneTag: t('Done', 'Listo'),\n      resetHint: t('Starting over for someone else?', '¿Empezar de nuevo para otra persona?'),\n      resetLink: t('Reset all progress', 'Reiniciar todo el progreso'),\n      back: t('All modules', 'Todos los módulos'),\n      quizKicker: t('Quick check', 'Comprobación rápida'),\n      quizTitle: t('Check your understanding', 'Verifica lo aprendido'),\n      checkBtn: t('Check answers', 'Revisar respuestas'),\n      retryBtn: t('Try again', 'Intentar de nuevo'),\n      retryMsg: t('Almost — review the marked answers.', 'Casi — revisa las respuestas marcadas.'),\n      passedMsg: t('All correct', 'Todo correcto'),\n      later: t('Finish later', 'Terminar después'),\n      askAbout: t('Ask about:', 'Pregunta por:'),\n      certKicker: t('Onboarding complete', 'Onboarding completado'),\n      certP: t('You know the process. Now go make something great — and say hi in the Teams channel.', 'Ya conoces el proceso. Ahora crea algo grandioso — y saluda en el canal de Teams.'),\n      footer: t('Design workflow & collaboration · v1.0 · Contributors: Andrea Sanchez, Elizabeth Arostegui, Ricardo Zuluaga', 'Flujo de diseño y colaboración · v1.0 · Colaboradores: Andrea Sanchez, Elizabeth Arostegui, Ricardo Zuluaga'),\n      correct: t('Correct', 'Correcta'),\n      wrong: t('Not quite', 'No es esa'),\n      minShort: t('min', 'min')\n    };\n\n    const roles = [\n      { id: 'designer', title: t('Product Designer', 'Product Designer'), desc: t('You design in Figma, hand off in Zeplin, and log everything in FigLog.', 'Diseñas en Figma, entregas en Zeplin y registras todo en FigLog.') },\n      { id: 'ba', title: t('Business Analyst / SME', 'Business Analyst / SME'), desc: t('You write UX stories, review mockups and approve UI Kit changes.', 'Escribes historias UX, revisas mockups y apruebas cambios del UI Kit.') },\n      { id: 'manager', title: t('Manager', 'Manager'), desc: t('You run the rituals, watch estimation and keep the process healthy.', 'Diriges los rituales, vigilas la estimación y cuidas el proceso.') },\n      { id: 'dev', title: t('Developer / QA', 'Developer / QA'), desc: t('Context view: where designs live, what to build and what to test.', 'Vista de contexto: dónde viven los diseños, qué construir y qué probar.') }\n    ];\n\n    const M = [];\n    // 01 — team\n    M.push({ id: 'team', mins: 5, core: true, isRoster: true,\n      title: t('Meet the team', 'Conoce al equipo'),\n      desc: t('Who does what, and who to ask when you are stuck.', 'Quién hace qué, y a quién preguntar cuando te atascas.'),\n      intro: t('Small team, short paths. Learn these names first — asking the right person early saves you a day of guessing.', 'Equipo pequeño, caminos cortos. Aprende estos nombres primero — preguntar a la persona correcta te ahorra un día de dudas.'),\n      people: [\n        { initials: 'AS', name: 'Andrea Sanchez', role: t('Product Designer', 'Product Designer'), email: 'Andrea.Sanchez@srsdistribution.com', teams: 'as106756@mmhfgb.com', loc: t('Milan, Italy · UTC +2', 'Milán, Italia · UTC +2') },\n        { initials: 'EA', name: 'Elizabeth Arostegui', role: t('Product Designer', 'Product Designer'), email: 'Elizabeth.Arostegui@srsdistribution.com', teams: 'ea108606@mmhfgb.com', loc: t('La Paz, Bolivia · UTC -4', 'La Paz, Bolivia · UTC -4') },\n        { initials: 'RZ', name: 'Ricardo Zuluaga', role: t('Product Designer · UI Kit', 'Product Designer · UI Kit'), email: 'Ricardo.Zuluaga@srsdistribution.com', teams: 'rz110852@mmhfgb.com', loc: t('Bogota, Colombia · UTC -5', 'Bogotá, Colombia · UTC -5') },\n      ],\n      rosterNote: t('Any designer can help with the sprint design process, Figma files, mockup standards, FigLog changelog, Zeplin handoff, story workflow, the Design Hub wiki, and the UI Kit — ask whoever is online in your timezone.', 'Cualquier diseñador puede ayudarte con el proceso de diseño del sprint, archivos de Figma, estándares de mockups, changelog en FigLog, entrega en Zeplin, flujo de historias, la wiki Design Hub y el UI Kit — pregunta a quien esté en línea en tu zona horaria.'),\n      blocks: [] , quiz: [] },\n    // 02 — tools\n    { id: 'tools', mins: 10, core: true, isChecklist: true,\n      title: t('Get your tools', 'Consigue tus herramientas'),\n      desc: t('The access checklist — tick each one off as you get it.', 'La lista de accesos — marca cada uno cuando lo tengas.'),\n      intro: t('You cannot do the job without these. Ask your manager for anything missing; this list is your day-one agenda.', 'No puedes trabajar sin esto. Pide a tu manager lo que falte; esta lista es tu agenda del primer día.'),\n      checks: [\n        { id: 'figma', t: t('Figma — team access', 'Figma — acceso al equipo'), d: t('Roof Hub Web and Mobile App design files, Component Library and UI Kit.', 'Archivos de diseño Roof Hub Web y Mobile App, Component Library y UI Kit.') },\n        { id: 'figlog', t: t('FigLog plugin', 'Plugin FigLog'), d: t('Evolution tracker — the changelog lives inside the feature files.', 'Rastreador de evolución — el changelog vive dentro de los archivos de features.') },\n        { id: 'zeplin', t: t('Zeplin — Web & Mobile projects', 'Zeplin — proyectos Web y Mobile'), d: t('Where finished mockups are published for business and development.', 'Donde se publican los mockups terminados para negocio y desarrollo.') },\n        { id: 'teams', t: t('Microsoft Teams channel', 'Canal de Microsoft Teams'), d: t('Team updates land here, including UI Kit announcements via the Figma integration.', 'Las novedades del equipo llegan aquí, incluidos anuncios del UI Kit vía la integración con Figma.') },\n        { id: 'backlog', t: t('Backlog board', 'Tablero de backlog'), d: t('Where user stories are estimated, assigned and tracked through the sprint.', 'Donde las historias se estiman, asignan y siguen durante el sprint.') },\n        { id: 'app', t: t('Roof Hub app access', 'Acceso a la app Roof Hub'), d: t('Use the real product — web and mobile builds — before you design for it.', 'Usa el producto real — web y móvil — antes de diseñar para él.') },\n        { id: 'wiki', t: t('Design Hub wiki (Azure DevOps)', 'Wiki Design Hub (Azure DevOps)'), d: t('The team\\u2019s single source of truth: Latest Updates, Quick Access Links, Team Structure and Important Announcements.', 'La única fuente de verdad del equipo: Latest Updates, Quick Access Links, Team Structure e Important Announcements.') },\n        { id: 'figent', t: t('Figma Enterprise account', 'Cuenta Figma Enterprise'), d: t('All Roof Hub files live in the Enterprise account since May 2026 — make sure your seat is on it, not a legacy team.', 'Todos los archivos de Roof Hub viven en la cuenta Enterprise desde mayo de 2026 — asegúrate de que tu asiento esté ahí, no en un equipo legado.') }\n      ],\n      blocks: [\n        { h: t('Quick Access Links', 'Quick Access Links'), body: t('The wiki\\u2019s Quick Access Links page is your bookmark bar — the same links are mirrored below, with the shared password on the tag where one is asked.', 'La página Quick Access Links de la wiki es tu barra de marcadores — los mismos enlaces están replicados abajo, con la contraseña compartida en la etiqueta donde se solicita.'), items: [] }\n      ],\n      linkGroups: [\n        { h: 'UI Kit', links: [\n          { t: 'Foundations', url: 'https://www.figma.com/design/i9GMYgaS79NiEWuWZK72zz/Roof-Hub---Foundations?node-id=6-1921&t=5adudgdyCvR0yZ09-1', tag: 'Password · SRS2024' },\n          { t: t('Assets library', 'Assets library'), url: 'https://www.figma.com/design/s38AJgqdyQJU7mc1Hov4tI/Roof-Hub---Assets?node-id=4-15569&t=KleKa36f6p4DMhSg-1', tag: 'Password · SRS2024' },\n          { t: t('Icon library — Remixicons', 'Librería de íconos — Remixicons'), url: 'https://remixicon.com/', tag: '' },\n          { t: 'Web Components', url: 'https://www.figma.com/design/fw9PS6zMRxBmSGZe5DGtwz/Roof-Hub---Web-Components?node-id=0-1&t=4ifS9Ec2mrWfa1OH-1', tag: 'Password · SRS2024' },\n          { t: 'Mobile App Components', url: 'https://www.figma.com/design/Inc7lz3qPhLKtuSGzGsfEk/Roof-Hub---App-Components?m=auto&t=fg1MJXHaB043W4vI-6', tag: 'Password · SRS2024' } ] },\n        { h: t('Working files — External Platform', 'Archivos de trabajo — External Platform'), links: [\n          { t: t('Product design files', 'Archivos de diseño de producto'), url: 'https://www.figma.com/files/1606373365070576328/project/285444125?fuid=1385362244427568572', tag: '' },\n          { t: t('Research boards', 'Tableros de research'), url: 'https://www.figma.com/files/1606373365070576328/project/601553346?fuid=1385362244427568572', tag: '' } ] },\n        { h: t('Working files — Internal Platform', 'Archivos de trabajo — Internal Platform'), links: [\n          { t: t('Product design files', 'Archivos de diseño de producto'), url: 'https://www.figma.com/design/7tQ2gtjWi9burjmDdrXHJS/Internal-Platform?node-id=0-1&t=vMzuCWsoGA0sLJTK-1', tag: 'Password · SRS2024' } ] },\n        { h: t('Legacy Platform', 'Legacy Platform'), links: [\n          { t: t('Product design files', 'Archivos de diseño de producto'), url: 'https://www.figma.com/files/1606373365070576328/project/131501881?fuid=1385362244427568572', tag: '' } ] },\n        { h: t('Team & sprint', 'Equipo y sprint'), links: [\n          { t: t('Design Team wiki', 'Wiki del Design Team'), url: 'https://dev.azure.com/srscloud/Roof%20Hub/_wiki/wikis/Roof-Hub.wiki/8498/Design-Team', tag: '' },\n          { t: t('Current sprint — design team stories', 'Sprint actual — historias del design team'), url: 'https://dev.azure.com/srscloud/Roof%20Hub/_backlogs/backlog/Roof%20Hub%20Design%20Team/Stories?System.IterationPath=%40currentIteration', tag: '' } ] },\n        { h: t('Workshops & library', 'Workshops y librería'), links: [\n          { t: t('Workshop boards', 'Tableros de workshops'), url: 'https://www.figma.com/files/1606373365070576328/project/387612702?fuid=1385362244427568572', tag: '' },\n          { t: t('Library documents', 'Documentos de librería'), url: 'https://www.figma.com/files/1606373365070576328/project/601555122?fuid=1385362244427568572', tag: '' } ] }\n      ], quiz: [] },\n    // 03 — comms\n    { id: 'comms', mins: 6, core: true,\n      title: t('How we communicate', 'Cómo nos comunicamos'),\n      desc: t('Teams, grooming sessions, and where updates get posted.', 'Teams, sesiones de grooming y dónde se publican las novedades.'),\n      intro: t('We keep communication close to the work: updates post where the files live, and Teams carries the announcements.', 'Mantenemos la comunicación cerca del trabajo: las novedades se publican donde viven los archivos, y Teams lleva los anuncios.'),\n      blocks: [\n        { h: t('The Design Hub wiki', 'La wiki Design Hub'), body: t('The Azure DevOps wiki is the team\\u2019s single source of truth and onboarding support system. Check it regularly — it carries four sections:', 'La wiki de Azure DevOps es la única fuente de verdad del equipo y su sistema de apoyo al onboarding. Revísala con frecuencia — tiene cuatro secciones:'), items: [\n          { t: 'Latest Updates —', d: t('operational, product, design-system and process changes, plus the Design Board for the current sprint.', 'cambios operativos, de producto, del design system y de proceso, más el Design Board del sprint actual.') },\n          { t: 'Quick Access Links —', d: t('centralized access to the UI Kit, working files, research and workshop boards.', 'acceso centralizado al UI Kit, archivos de trabajo, research y tableros de workshops.') },\n          { t: 'Team Structure —', d: t('who is on the team, with emails, Teams usernames and time zones.', 'quiénes forman el equipo, con correos, usuarios de Teams y zonas horarias.') },\n          { t: 'Important Announcements —', d: t('major changes, like the May 2026 migration of all Roof Hub files to Figma Enterprise.', 'cambios mayores, como la migración de mayo de 2026 de todos los archivos de Roof Hub a Figma Enterprise.') } ] },\n        { h: t('Teams + Figma', 'Teams + Figma'), body: t('UI Kit updates are announced in the Teams channel through the Figma integration — a link to the updated kit, visible to the whole team.', 'Las actualizaciones del UI Kit se anuncian en el canal de Teams mediante la integración con Figma — un enlace al kit actualizado, visible para todo el equipo.'), items: [] },\n        { h: t('Grooming sessions', 'Sesiones de grooming'), body: t('Designers collaboratively estimate sprint tickets. The agreed score is added to the user story before work starts.', 'Los diseñadores estiman en conjunto los tickets del sprint. El puntaje acordado se añade a la historia antes de empezar.'), items: [] },\n        { h: t('Quick-fix feedback in Zeplin', 'Feedback de quick fixes en Zeplin'), body: t('Questions and small-change feedback between designers and business happen directly on the screens in Zeplin — not in scattered chats.', 'Las preguntas y el feedback de cambios pequeños entre diseño y negocio ocurren directamente sobre las pantallas en Zeplin — no en chats dispersos.'), items: [] },\n        { h: t('FigLog changelog', 'Changelog en FigLog'), body: t('Every change to a feature is registered in the changelog in its Figma file, tagged with the user story number and feature name — so design updates and development updates stay connected.', 'Cada cambio a una feature se registra en el changelog de su archivo de Figma, etiquetado con el número de historia y el nombre de la feature — así las actualizaciones de diseño y desarrollo quedan conectadas.'), items: [] }\n      ],\n      quiz: [\n        { q: t('Where are UI Kit updates announced?', '¿Dónde se anuncian las actualizaciones del UI Kit?'), a: 0, opts: [t('In Teams, via the Figma integration', 'En Teams, vía la integración con Figma'), t('By email, once a month', 'Por correo, una vez al mes'), t('They are not announced', 'No se anuncian')] },\n        { q: t('Where is every design change registered?', '¿Dónde se registra cada cambio de diseño?'), a: 1, opts: [t('In a shared spreadsheet', 'En una hoja de cálculo compartida'), t('In the FigLog changelog, tagged with the user story #', 'En el changelog de FigLog, etiquetado con el # de historia'), t('In the sprint retro notes', 'En las notas de la retro')] },\n        { q: t('You need the team\\u2019s official links, updates and announcements. Where do you look?', 'Necesitas los enlaces, novedades y anuncios oficiales del equipo. ¿Dónde miras?'), a: 0, opts: [t('The Design Hub wiki in Azure DevOps', 'La wiki Design Hub en Azure DevOps'), t('Scroll back through Teams chats', 'Buscar en chats viejos de Teams'), t('Ask in the daily until someone answers', 'Preguntar en la daily hasta que alguien responda')] }\n      ] },\n    // 04 — stories\n    { id: 'stories', mins: 8, core: true,\n      title: t('UX story types', 'Tipos de historias UX'),\n      desc: t('Quick fix, New feature, Redesign — and what each one delivers.', 'Quick fix, New feature, Redesign — y qué entrega cada una.'),\n      intro: t('Every design ticket is one of three types. The type sets the scope, the deliverables, and how the sprint treats it.', 'Cada ticket de diseño es de uno de tres tipos. El tipo define el alcance, los entregables y cómo lo trata el sprint.'),\n      blocks: [\n        { h: 'Quick fix', body: t('Labels, text, content or layout changes — no new functionality. Can happen before, during or after a sprint, including post-release.', 'Cambios de etiquetas, texto, contenido o layout — sin funcionalidad nueva. Puede ocurrir antes, durante o después del sprint, incluso post-release.'), items: [\n          { t: t('Deliverables', 'Entregables'), d: t('High-fidelity mockups · Zeplin files', 'Mockups de alta fidelidad · Archivos de Zeplin') } ] },\n        { h: 'New feature', body: t('A totally new feature. Once defined, screens are frozen until the end of the sprint — no mid-sprint changes.', 'Una feature totalmente nueva. Una vez definida, las pantallas se congelan hasta el final del sprint — sin cambios a mitad de sprint.'), items: [\n          { t: t('Deliverables', 'Entregables'), d: t('Case flows · Interactive prototype · Zeplin files · Responsive screens · Spanish text', 'Flujos de casos · Prototipo interactivo · Archivos de Zeplin · Pantallas responsivas · Texto en español') } ] },\n        { h: 'Redesign', body: t('A long redesign of screen flows, planned for the next sprint. Covers badly implemented, refreshed, or newly tested features.', 'Un rediseño largo de flujos de pantallas, planificado para el próximo sprint. Cubre features mal implementadas, renovadas o recién testeadas.'), items: [\n          { t: t('Deliverables', 'Entregables'), d: t('Case flows · Interactive prototype · Zeplin files · Responsive screens · Spanish text', 'Flujos de casos · Prototipo interactivo · Archivos de Zeplin · Pantallas responsivas · Texto en español') } ] }\n      ],\n      quiz: [\n        { q: t('A ticket changes button labels and rearranges a form — no new functionality. What type is it?', 'Un ticket cambia etiquetas de botones y reordena un formulario — sin funcionalidad nueva. ¿Qué tipo es?'), a: 0, opts: ['Quick fix', 'New feature', 'Redesign'] },\n        { q: t('A New feature is defined and the sprint starts. When can its screens change?', 'Una New feature está definida y el sprint comienza. ¿Cuándo pueden cambiar sus pantallas?'), a: 2, opts: [t('Any time business asks', 'Cuando negocio lo pida'), t('Only on Fridays', 'Solo los viernes'), t('Not until the end of the sprint', 'No hasta el final del sprint')] }\n      ] },\n    // 05 — sprint\n    { id: 'sprint', mins: 12, core: true,\n      title: t('The sprint design process', 'El proceso de diseño del sprint'),\n      desc: t('From backlog to Dev Complete: estimate, design, publish, hand off.', 'Del backlog a Dev Complete: estimar, diseñar, publicar, entregar.'),\n      intro: t('One story travels through three places: the backlog board, Figma, and Zeplin. Here is the full loop.', 'Una historia viaja por tres lugares: el tablero de backlog, Figma y Zeplin. Este es el ciclo completo.'),\n      blocks: [\n        { h: t('1 · Backlog & grooming', '1 · Backlog y grooming'), body: t('Stories are estimated collaboratively in grooming; the agreed points go on the story. Stories are then assigned to a designer, who flips the status to In Development when work begins.', 'Las historias se estiman en conjunto en grooming; los puntos acordados van en la historia. Luego se asignan a un diseñador, que cambia el estado a In Development al empezar.'), items: [] },\n        { h: t('2 · Design in Figma', '2 · Diseño en Figma'), body: t('Mockups are built in the respective Web or Mobile App file, always from the Roof Hub Component Library and UI Kit.', 'Los mockups se construyen en el archivo Web o Mobile App correspondiente, siempre con la Roof Hub Component Library y el UI Kit.'), items: [\n          { t: t('Every mockup covers its variants:', 'Cada mockup cubre sus variantes:'), d: t('responsive screen sizes · light and dark modes · English and Spanish content', 'tamaños responsivos · modo claro y oscuro · contenido en inglés y español') },\n          { t: t('Updates:', 'Actualizaciones:'), d: t('either a new copy or overriding the latest version — business specifies which; previous copies stay stored in the file.', 'una copia nueva o sobrescribir la última versión — negocio especifica cuál; las copias anteriores quedan en el archivo.') } ] },\n        { h: t('3 · Publish to Zeplin', '3 · Publicar en Zeplin'), body: t('When mockups are ready for review — with all screen variants — they are uploaded to the respective Web or Mobile project in Zeplin. This is the cross-team window: business reviews there, developers build from there.', 'Cuando los mockups están listos para revisión — con todas las variantes — se suben al proyecto Web o Mobile en Zeplin. Es la ventana entre equipos: negocio revisa ahí, desarrollo construye desde ahí.'), items: [\n          { t: t('Zeplin gives us:', 'Zeplin nos da:'), d: t('cross-team visibility · quick-fix feedback cycle · version history · categorization · asset download · CSS inspection', 'visibilidad entre equipos · ciclo de feedback de quick fixes · historial de versiones · categorización · descarga de assets · inspección de CSS') } ] },\n        { h: t('4 · Hand off', '4 · Entrega'), body: t('The designer attaches Figma files and Zeplin links to the story, sets the status to Dev Complete, inputs the Actual Story Points, and assigns the story back to the Business SME.', 'El diseñador adjunta archivos de Figma y enlaces de Zeplin a la historia, marca el estado Dev Complete, ingresa los Actual Story Points y reasigna la historia al Business SME.'), items: [] }\n      ],\n      quiz: [\n        { q: t('Where are estimation points agreed?', '¿Dónde se acuerdan los puntos de estimación?'), a: 1, opts: [t('The designer sets them alone', 'El diseñador los define solo'), t('Collaboratively, in grooming sessions', 'En conjunto, en sesiones de grooming'), t('Development assigns them', 'Desarrollo los asigna')] },\n        { q: t('Every mockup must consider…', 'Todo mockup debe considerar…'), a: 0, opts: [t('Responsive sizes, light/dark modes, English & Spanish', 'Tamaños responsivos, modo claro/oscuro, inglés y español'), t('Desktop only — mobile comes later', 'Solo desktop — móvil después'), t('Whatever the ticket happens to mention', 'Lo que mencione el ticket')] },\n        { q: t('Design work is finished. You set Dev Complete, enter actual points, and assign the story to…', 'El diseño está terminado. Marcas Dev Complete, ingresas los puntos reales y asignas la historia a…'), a: 2, opts: [t('The next designer', 'El siguiente diseñador'), t('Nobody — it closes itself', 'Nadie — se cierra sola'), t('The Business SME', 'El Business SME')] }\n      ] },\n    // 06 — uikit\n    { id: 'uikit', mins: 10, core: true,\n      title: t('UI Kit update process', 'Proceso de actualización del UI Kit'),\n      desc: t('How a new component earns its place in the official library.', 'Cómo un componente nuevo se gana su lugar en la librería oficial.'),\n      intro: t('Every new or modified component is validated by business before it joins the official UI Kit and reaches development. Five stages, one loop.', 'Cada componente nuevo o modificado es validado por negocio antes de entrar al UI Kit oficial y llegar a desarrollo. Cinco etapas, un ciclo.'),\n      blocks: [\n        { h: t('1 · Draft design', '1 · Borrador'), body: t('Design creates the component as a draft from product requirements and UX standards: the draft in Figma, its usage context, and the rationale for decisions when needed.', 'Diseño crea el componente como borrador a partir de los requerimientos y estándares UX: el borrador en Figma, su contexto de uso y la justificación de decisiones cuando haga falta.'), items: [] },\n        { h: t('2 · Business presentation', '2 · Presentación a negocio'), body: t('The draft is presented to business stakeholders to validate intent, confirm alignment with product goals, and surface constraints early.', 'El borrador se presenta a los stakeholders de negocio para validar la intención, confirmar la alineación con los objetivos del producto y detectar restricciones a tiempo.'), items: [] },\n        { h: t('3 · Design adjustments', '3 · Ajustes de diseño'), body: t('Design iterates on the feedback and presents again. The loop repeats until business grants approval.', 'Diseño itera sobre el feedback y presenta de nuevo. El ciclo se repite hasta que negocio aprueba.'), items: [] },\n        { h: t('4 · Development review', '4 · Revisión con desarrollo'), body: t('Before entering the library, the approved component goes to development: technical feasibility, implementation risks, behavior logic and edge cases, effort and dependencies.', 'Antes de entrar a la librería, el componente aprobado pasa por desarrollo: factibilidad técnica, riesgos de implementación, lógica de comportamiento y casos borde, esfuerzo y dependencias.'), items: [] },\n        { h: t('5 · Final update', '5 · Actualización final'), body: t('The component is finalized in Figma, the UI Kit library is updated, documentation (variants, states, usage rules) is completed, a development walkthrough is scheduled, and the component is applied to upcoming designs.', 'El componente se finaliza en Figma, se actualiza la librería del UI Kit, se completa la documentación (variantes, estados, reglas de uso), se agenda un walkthrough con desarrollo y el componente se aplica a los próximos diseños.'), items: [] },\n        { h: t('When to branch', 'Cuándo usar branches'), body: t('Branches are not always needed: small disciplined teams with good documentation, automated libraries, and little things like cover sheets or release notes can skip them.', 'No siempre se necesitan branches: equipos pequeños y disciplinados con buena documentación, librerías automatizadas y cosas menores como portadas o release notes pueden omitirlos.'), items: [] }\n      ],\n      quiz: [\n        { q: t('Who reviews a draft component first?', '¿Quién revisa primero un componente en borrador?'), a: 1, opts: [t('Development', 'Desarrollo'), t('Business stakeholders', 'Los stakeholders de negocio'), t('QA', 'QA')] },\n        { q: t('What must happen before the component enters the UI Kit library?', '¿Qué debe pasar antes de que el componente entre a la librería del UI Kit?'), a: 0, opts: [t('A development review of feasibility, risks and edge cases', 'Una revisión de desarrollo: factibilidad, riesgos y casos borde'), t('Nothing — approval by business is enough', 'Nada — la aprobación de negocio basta'), t('A vote by the whole team', 'Una votación de todo el equipo')] }\n      ] },\n    // 06b — file structure\n    { id: 'files', mins: 6, core: true, hasFileImage: true,\n      title: t('Cover file explanation', 'Explicación del archivo Cover'),\n      desc: t('How every feature file is organized in Figma — pages, sections, naming.', 'Cómo se organiza cada archivo de features en Figma — páginas, secciones, nombres.'),\n      intro: t('Every working file in the Component Library follows the same page structure, so you always know where things live. Open any feature file and you will find these pages, in this order.', 'Todos los archivos de trabajo de la Component Library siguen la misma estructura de páginas, así siempre sabes dónde vive cada cosa. Abre cualquier archivo de features y encontrarás estas páginas, en este orden.'),\n      blocks: [\n        { h: t('Entry pages', 'Páginas de entrada'), body: t('The file opens with its identity and its conversation.', 'El archivo abre con su identidad y su conversación.'), items: [\n          { t: 'Cover:', d: t('visual entry point and thumbnail for the project — feature name, status (e.g. PAUSED), platform tags, last update, contributors.', 'punto de entrada visual y miniatura del proyecto — nombre de la feature, estado (p. ej. PAUSED), etiquetas de plataforma, última actualización, colaboradores.') },\n          { t: t('Comments and Notes:', 'Comments and Notes:'), d: t('space for documentation and feedback.', 'espacio para documentación y feedback.') } ] },\n        { h: t('UI Design (section)', 'UI Design (sección)'), body: t('Organizes the high-fidelity design work, split by lifecycle and platform. Frames are named [Feature-Name] - (MM-DD-YYYY) - [WIP].', 'Organiza el trabajo de diseño de alta fidelidad, dividido por ciclo de vida y plataforma. Los frames se nombran [Feature-Name] - (MM-DD-YYYY) - [WIP].'), items: [\n          { t: 'Redesign:', d: t('new proposals and design in progress — with Web and App platform pages.', 'propuestas nuevas y diseño en progreso — con páginas por plataforma Web y App.') },\n          { t: 'Legacy:', d: t('old or already implemented design — also split into Web and App.', 'diseño antiguo o ya implementado — también dividido en Web y App.') } ] },\n        { h: t('Support pages', 'Páginas de apoyo'), body: t('Everything that feeds or falls out of the design work.', 'Todo lo que alimenta o resulta del trabajo de diseño.'), items: [\n          { t: 'Local Components:', d: t('library of elements exclusive to this file.', 'librería de elementos exclusivos de este archivo.') },\n          { t: 'Research:', d: t('data, analysis, and findings.', 'datos, análisis y hallazgos.') },\n          { t: 'Sketches:', d: t('wireframes and low-fidelity ideas.', 'wireframes e ideas de baja fidelidad.') },\n          { t: 'Archive:', d: t('obsolete versions and unused concepts.', 'versiones obsoletas y conceptos sin usar.') } ] }\n      ],\n      fileImageCaption: t('The annotated page structure of a feature file in the Roof Hub Redesign 2025 Component Library.', 'La estructura de páginas anotada de un archivo de features en la Roof Hub Redesign 2025 Component Library.'),\n      quiz: [\n        { q: t('Where do old or already implemented designs live?', '¿Dónde viven los diseños antiguos o ya implementados?'), a: 1, opts: [t('Archive', 'Archive'), t('Legacy — split into Web and App', 'Legacy — dividido en Web y App'), t('Sketches', 'Sketches')] },\n        { q: t('A component used only inside this file belongs in…', 'Un componente usado solo dentro de este archivo va en…'), a: 0, opts: ['Local Components', t('The UI Kit library', 'La librería del UI Kit'), 'Research'] }\n      ] },\n    // 07 — principles\n    { id: 'principles', mins: 6, core: true,\n      title: t('Quality bar & principles', 'Estándar de calidad y principios'),\n      desc: t('The habits that keep our files clean and our process trusted.', 'Los hábitos que mantienen los archivos limpios y el proceso confiable.'),\n      intro: t('These are not in any single document — they are how the team stays fast without getting sloppy. Recommended reading twice.', 'Esto no está en un solo documento — es cómo el equipo se mantiene rápido sin descuidarse. Se recomienda leerlo dos veces.'),\n      blocks: [\n        { h: t('Kit first', 'Primero el kit'), body: t('Build from the Component Library and UI Kit. If the component you need does not exist, do not improvise inline — draft it and run the UI Kit update process.', 'Construye desde la Component Library y el UI Kit. Si el componente no existe, no improvises en la pantalla — haz el borrador y corre el proceso de actualización del UI Kit.'), items: [] },\n        { h: t('Every variant, every time', 'Todas las variantes, siempre'), body: t('Responsive sizes, light and dark modes, English and Spanish. A mockup missing a variant is not ready for Zeplin.', 'Tamaños responsivos, modo claro y oscuro, inglés y español. Un mockup sin una variante no está listo para Zeplin.'), items: [] },\n        { h: t('Log it or it did not happen', 'Regístralo o no pasó'), body: t('Every change gets a FigLog entry tagged with its user story number. The changelog is what keeps design and development telling the same story.', 'Cada cambio lleva una entrada en FigLog etiquetada con su número de historia. El changelog es lo que mantiene a diseño y desarrollo contando la misma historia.'), items: [] },\n        { h: t('Feedback lives on the work', 'El feedback vive sobre el trabajo'), body: t('Reviews and quick-fix conversations happen in Zeplin, on the screen in question — searchable, versioned, visible to everyone.', 'Las revisiones y conversaciones de quick fixes ocurren en Zeplin, sobre la pantalla en cuestión — buscables, versionadas, visibles para todos.'), items: [] },\n        { h: t('Respect the freeze', 'Respeta el congelamiento'), body: t('Once a New feature is defined, its screens hold until the sprint ends. Scope changes become the next sprint\\u2019s Redesign, not this sprint\\u2019s chaos.', 'Una vez definida una New feature, sus pantallas se mantienen hasta el fin del sprint. Los cambios de alcance son el Redesign del próximo sprint, no el caos de este.'), items: [] }\n      ],\n      quiz: [\n        { q: t('You need a component that is not in the UI Kit. What do you do?', 'Necesitas un componente que no está en el UI Kit. ¿Qué haces?'), a: 2, opts: [t('Design it inline and ship the mockup', 'Lo diseñas en la pantalla y entregas el mockup'), t('Ask development to invent it', 'Pides a desarrollo que lo invente'), t('Draft it and run the UI Kit update process', 'Haces el borrador y corres el proceso del UI Kit')] }\n      ] },\n    // 08 — glossary\n    { id: 'glossary', mins: 4, core: true, isGlossary: true,\n      title: t('Glossary', 'Glosario'),\n      desc: t('The words you will hear in your first grooming session.', 'Las palabras que oirás en tu primera sesión de grooming.'),\n      intro: t('Skim now, return later. No quiz — just mark it read.', 'Échale un vistazo ahora, vuelve después. Sin quiz — solo márcalo como leído.'),\n      terms: [\n        { t: 'SOT', d: t('Source of Truth — the single agreed place a design or spec lives. Our mockup SOT flows through Figma into Zeplin.', 'Source of Truth — el único lugar acordado donde vive un diseño o spec. Nuestro SOT de mockups fluye de Figma a Zeplin.') },\n        { t: 'FigLog', d: t('Figma plugin (Evolution Tracker) holding each feature\\u2019s changelog: log entries with author, date, links, tagged to user stories.', 'Plugin de Figma (Evolution Tracker) con el changelog de cada feature: entradas con autor, fecha, enlaces, etiquetadas a historias.') },\n        { t: 'Zeplin', d: t('Handoff tool — published screens, version history, asset download, CSS inspection, and the quick-fix feedback cycle.', 'Herramienta de entrega — pantallas publicadas, historial de versiones, descarga de assets, inspección de CSS y el ciclo de feedback de quick fixes.') },\n        { t: 'Grooming', d: t('The session where designers collaboratively estimate sprint tickets before work starts.', 'La sesión donde los diseñadores estiman en conjunto los tickets antes de empezar.') },\n        { t: t('Story points', 'Story points'), d: t('The estimation score agreed in grooming and added to the user story.', 'El puntaje de estimación acordado en grooming y añadido a la historia.') },\n        { t: 'Actual points', d: t('The real effort, entered by the designer when work is finished — feeds better future estimates.', 'El esfuerzo real, ingresado por el diseñador al terminar — mejora las estimaciones futuras.') },\n        { t: 'Dev Complete', d: t('The story status meaning design work is done and handed off with Figma + Zeplin links attached.', 'El estado de la historia que indica que el diseño terminó y se entregó con enlaces de Figma + Zeplin.') },\n        { t: 'Design Hub', d: t('The team wiki in Azure DevOps — single source of truth for updates, links, team structure and announcements.', 'La wiki del equipo en Azure DevOps — única fuente de verdad para novedades, enlaces, estructura del equipo y anuncios.') },\n        { t: 'Remixicons', d: t('The team\\u2019s icon library, linked from the wiki\\u2019s Quick Access Links.', 'La librería de íconos del equipo, enlazada desde Quick Access Links en la wiki.') },\n        { t: 'SME', d: t('Subject Matter Expert on the business side — writes and accepts stories, receives the handoff.', 'Subject Matter Expert del lado de negocio — escribe y acepta historias, recibe la entrega.') },\n        { t: 'UI Kit', d: t('The official, validated component library every mockup is built from.', 'La librería oficial y validada de componentes con la que se construye todo mockup.') },\n        { t: t('Quick fix / New feature / Redesign', 'Quick fix / New feature / Redesign'), d: t('The three UX story types — each with its own scope and deliverables.', 'Los tres tipos de historias UX — cada uno con su alcance y entregables.') }\n      ],\n      blocks: [], quiz: [] },\n    // role modules\n    { id: 'r-designer', mins: 8, role: 'designer',\n      title: t('Your first sprint', 'Tu primer sprint'),\n      desc: t('A designer\\u2019s week one, ticket by ticket.', 'La primera semana de un diseñador, ticket a ticket.'),\n      intro: t('Here is the realistic shape of your first two weeks — go slow, log everything, and ask early.', 'Esta es la forma realista de tus primeras dos semanas — ve con calma, registra todo y pregunta pronto.'),\n      blocks: [\n        { h: t('Days 1–2 · Absorb', 'Días 1–2 · Absorbe'), body: t('Finish the tools checklist. Open the Web and Mobile Figma files and read the FigLog changelogs of two recent features — they tell you how decisions actually get made. Use the Roof Hub app itself.', 'Termina la lista de herramientas. Abre los archivos Web y Mobile de Figma y lee los changelogs de FigLog de dos features recientes — te cuentan cómo se toman las decisiones. Usa la app Roof Hub.'), items: [] },\n        { h: t('Days 3–5 · Shadow', 'Días 3–5 · Acompaña'), body: t('Sit in a grooming session and watch how points get agreed. Follow one story from assignment to Dev Complete over someone\\u2019s shoulder.', 'Participa en una sesión de grooming y observa cómo se acuerdan los puntos. Sigue una historia desde la asignación hasta Dev Complete junto a un colega.'), items: [] },\n        { h: t('Week 2 · Take a quick fix', 'Semana 2 · Toma un quick fix'), body: t('Your first ticket should be a Quick fix: small scope, full process. Design from the UI Kit, cover the variants, publish to Zeplin, log it in FigLog, set Dev Complete, enter actual points, assign to the SME. The whole loop, once, end to end.', 'Tu primer ticket debería ser un Quick fix: alcance pequeño, proceso completo. Diseña desde el UI Kit, cubre las variantes, publica en Zeplin, regístralo en FigLog, marca Dev Complete, ingresa los puntos reales, asigna al SME. El ciclo completo, una vez, de punta a punta.'), items: [] }\n      ],\n      quiz: [\n        { q: t('Your ideal first ticket is a…', 'Tu primer ticket ideal es un…'), a: 0, opts: ['Quick fix', 'Redesign', 'New feature'] }\n      ] },\n    { id: 'r-ba', mins: 7, role: 'ba',\n      title: t('Working with design', 'Trabajar con diseño'),\n      desc: t('Writing stories, reviewing mockups, approving components.', 'Escribir historias, revisar mockups, aprobar componentes.'),\n      intro: t('You are the other half of the loop: stories start with you and finished work comes back to you.', 'Eres la otra mitad del ciclo: las historias comienzan contigo y el trabajo terminado vuelve a ti.'),\n      blocks: [\n        { h: t('Write typed stories', 'Escribe historias tipadas'), body: t('Tag every UX story as Quick fix, New feature or Redesign — the type sets the deliverables the designer owes and the timeline the sprint can promise.', 'Etiqueta cada historia UX como Quick fix, New feature o Redesign — el tipo define los entregables del diseñador y los plazos que el sprint puede prometer.'), items: [] },\n        { h: t('Review in Zeplin', 'Revisa en Zeplin'), body: t('Mockups arrive in the Web or Mobile Zeplin project with all their variants. Leave questions and quick-fix feedback there, on the screens — that is the agreed channel.', 'Los mockups llegan al proyecto Web o Mobile de Zeplin con todas sus variantes. Deja preguntas y feedback de quick fixes ahí, sobre las pantallas — ese es el canal acordado.'), items: [] },\n        { h: t('Specify the versioning', 'Especifica el versionado'), body: t('When you request an update, say whether it should be a new copy or override the latest version — you own that call, and previous copies stay stored in the file.', 'Cuando pidas una actualización, indica si debe ser una copia nueva o sobrescribir la última versión — esa decisión es tuya, y las copias anteriores quedan guardadas.'), items: [] },\n        { h: t('Approve UI Kit drafts', 'Aprueba borradores del UI Kit'), body: t('New components come to you first, as drafts: validate intent, confirm product-goal alignment, raise constraints. Design iterates until you approve — then it moves to development review.', 'Los componentes nuevos llegan a ti primero, como borradores: valida la intención, confirma la alineación con los objetivos y plantea restricciones. Diseño itera hasta tu aprobación — luego pasa a la revisión con desarrollo.'), items: [] },\n        { h: t('Receive the handoff', 'Recibe la entrega'), body: t('Dev Complete stories come back assigned to you, with Figma attachments and Zeplin links — your cue to accept or reopen.', 'Las historias en Dev Complete vuelven asignadas a ti, con adjuntos de Figma y enlaces de Zeplin — tu señal para aceptar o reabrir.'), items: [] }\n      ],\n      quiz: [\n        { q: t('Where does quick-fix feedback between business and design happen?', '¿Dónde ocurre el feedback de quick fixes entre negocio y diseño?'), a: 1, opts: [t('Private Teams chats', 'Chats privados de Teams'), t('In Zeplin, on the screens', 'En Zeplin, sobre las pantallas'), t('In the sprint retro', 'En la retro del sprint')] }\n      ] },\n    { id: 'r-manager', mins: 7, role: 'manager',\n      title: t('Running the process', 'Dirigir el proceso'),\n      desc: t('Rituals, estimation health, and what to watch.', 'Rituales, salud de la estimación y qué vigilar.'),\n      intro: t('Your job is to keep the loop honest: estimated versus actual, frozen versus creeping, logged versus lost.', 'Tu trabajo es mantener el ciclo honesto: estimado versus real, congelado versus creciente, registrado versus perdido.'),\n      blocks: [\n        { h: t('Own the rituals', 'Lidera los rituales'), body: t('Grooming is where estimation happens collaboratively — protect it. Make sure every sprint ticket leaves grooming with agreed points on the story.', 'El grooming es donde la estimación ocurre en conjunto — protégelo. Asegura que cada ticket salga del grooming con puntos acordados en la historia.'), items: [] },\n        { h: t('Watch estimated vs. actual', 'Vigila estimado vs. real'), body: t('Designers enter Actual Story Points at Dev Complete. The gap between agreed and actual is your best signal for coaching and for next sprint\\u2019s capacity.', 'Los diseñadores ingresan los Actual Story Points en Dev Complete. La brecha entre lo acordado y lo real es tu mejor señal para acompañar al equipo y planificar la capacidad.'), items: [] },\n        { h: t('Defend the freeze', 'Defiende el congelamiento'), body: t('Mid-sprint scope changes on New features are how sprints die. Route them to the next sprint as a Redesign, and keep Quick fixes genuinely quick.', 'Los cambios de alcance a mitad de sprint en New features son la muerte del sprint. Deriva esos cambios al próximo sprint como Redesign, y mantén los Quick fixes realmente rápidos.'), items: [] },\n        { h: t('Audit the changelog', 'Audita el changelog'), body: t('Spot-check FigLog entries: every design update tagged to a user story, every story traceable to its screens. If the log is quiet, the process is drifting.', 'Revisa entradas de FigLog al azar: cada actualización etiquetada a una historia, cada historia rastreable a sus pantallas. Si el log está en silencio, el proceso se está desviando.'), items: [] },\n        { h: t('Unblock reviews', 'Destraba revisiones'), body: t('The UI Kit loop stalls when business presentations or development reviews sit unscheduled. Your calendar is the throttle — keep both moving.', 'El ciclo del UI Kit se estanca cuando las presentaciones a negocio o las revisiones con desarrollo quedan sin agendar. Tu calendario es el acelerador — mantén ambas en movimiento.'), items: [] }\n      ],\n      quiz: [\n        { q: t('Actual story points are recorded…', 'Los puntos reales se registran…'), a: 2, opts: [t('During grooming', 'Durante el grooming'), t('Never — only estimates matter', 'Nunca — solo importan las estimaciones'), t('By the designer, when the story reaches Dev Complete', 'Por el diseñador, cuando la historia llega a Dev Complete')] }\n      ] },\n    { id: 'r-dev', mins: 6, role: 'dev',\n      title: t('Design context for Dev & QA', 'Contexto de diseño para Dev y QA'),\n      desc: t('Where designs live, what to build from, what to test.', 'Dónde viven los diseños, desde dónde construir, qué probar.'),\n      intro: t('You do not need the whole design process — just these four facts.', 'No necesitas todo el proceso de diseño — solo estos cuatro datos.'),\n      blocks: [\n        { h: t('Build from Zeplin', 'Construye desde Zeplin'), body: t('Developers reference screens and assets in the Web or Mobile Zeplin project: version history, individual asset download, and CSS inspection are all there. If it is not in Zeplin, it is not ready.', 'Desarrollo referencia pantallas y assets en el proyecto Web o Mobile de Zeplin: historial de versiones, descarga de assets individuales e inspección de CSS están ahí. Si no está en Zeplin, no está listo.'), items: [] },\n        { h: t('Trace through FigLog', 'Rastrea con FigLog'), body: t('Design changes are tagged with the user story number and feature name in the FigLog changelog — when a screen changes, the log tells you which story did it and links the handoff.', 'Los cambios de diseño se etiquetan con el número de historia y el nombre de la feature en el changelog de FigLog — cuando una pantalla cambia, el log te dice qué historia lo hizo y enlaza la entrega.'), items: [] },\n        { h: t('Expect all variants', 'Espera todas las variantes'), body: t('Delivered screens cover responsive sizes, light and dark modes, and English and Spanish content. QA: that is your test matrix — a missing variant is a valid bug against the design.', 'Las pantallas entregadas cubren tamaños responsivos, modo claro y oscuro, y contenido en inglés y español. QA: esa es tu matriz de pruebas — una variante faltante es un bug válido contra el diseño.'), items: [] },\n        { h: t('New components get a walkthrough', 'Los componentes nuevos tienen walkthrough'), body: t('UI Kit components pass a development feasibility review before entering the library, and a walkthrough is scheduled at release — raise edge cases there, not in the sprint.', 'Los componentes del UI Kit pasan una revisión de factibilidad con desarrollo antes de entrar a la librería, y se agenda un walkthrough en el release — plantea los casos borde ahí, no en el sprint.'), items: [] }\n      ],\n      quiz: [\n        { q: t('Where do developers reference screens and assets?', '¿Dónde referencia desarrollo las pantallas y assets?'), a: 0, opts: ['Zeplin', t('Screenshots in Teams', 'Capturas en Teams'), t('The raw Figma drafts', 'Los borradores crudos de Figma')] }\n      ] }\n    );\n    return { ui, roles, modules: M, t };\n  }\n\n  visibleModules(c) {\n    const role = this.state.role;\n    return c.modules.filter(m => m.core || m.role === role);\n  }\n\n  openModule(id) { this.setState({ view: 'mod', modId: id, answers: {}, checked: false, passed: false }); window.scrollTo(0, 0); }\n\n  completeModule(mod) {\n    const done = Object.assign({}, this.state.done); done[mod.id] = true;\n    const c = this.content();\n    const vis = this.visibleModules(c);\n    const idx = vis.findIndex(v => v.id === mod.id);\n    const next = vis.slice(idx + 1).find(v => !done[v.id]) || vis.find(v => !done[v.id]);\n    if (next) { this.set({ done }); this.openModule(next.id); }\n    else { this.set({ done, view: 'dash', modId: null }); window.scrollTo(0, 0); }\n  }\n\n  renderVals() {\n    const s = this.state;\n    const c = this.content();\n    const ui = c.ui;\n    const quizRequired = this.props.quizRequired ?? true;\n    const showDevRole = this.props.showDevRole ?? true;\n\n    const inkOn = 'var(--color-text)', bgOn = 'var(--color-bg)';\n\n    // role cards (welcome)\n    const roleList = showDevRole ? c.roles : c.roles.filter(r => r.id !== 'dev');\n    const roleCards = roleList.map((r, i) => {\n      const sel = s.role === r.id;\n      return {\n        num: 'R' + (i + 1), title: r.title, desc: r.desc,\n        bg: sel ? 'var(--color-accent)' : 'var(--color-bg)',\n        fg: sel ? '#f3f2f2' : 'var(--color-text)',\n        hoverBg: sel ? 'var(--color-accent)' : 'var(--color-surface)',\n        numFg: sel ? '#f3f2f2' : 'var(--color-accent)',\n        pick: () => this.set({ role: r.id })\n      };\n    });\n\n    const vis = this.visibleModules(c);\n    const doneCount = vis.filter(m => s.done[m.id]).length;\n    const pct = vis.length ? Math.round(100 * doneCount / vis.length) : 0;\n\n    const cardVm = (m, i) => ({\n      num: (i + 1 < 10 ? '0' : '') + (i + 1),\n      title: m.title, desc: m.desc,\n      mins: m.mins + ' ' + ui.minShort,\n      done: !!s.done[m.id], todo: !s.done[m.id],\n      open: () => this.openModule(m.id)\n    });\n    const coreMods = vis.filter(m => m.core);\n    const roleMods = vis.filter(m => !m.core);\n    const coreCards = coreMods.map(cardVm);\n    const roleCardsDash = roleMods.map((m, i) => cardVm(m, coreMods.length + i));\n\n    const curRole = c.roles.find(r => r.id === s.role);\n\n    // ─── module vm ───\n    let mod = { blocks: [], quiz: [], people: [], checks: [], terms: [], hasQuiz: false, isRoster: false, isChecklist: false, isGlossary: false, kicker: '', title: '', intro: '' };\n    let quizPassed = false, quizFailed = false, quizUnchecked = true, quizIncomplete = true, completeDisabled = false, completeLabel = '', checklistHint = '';\n    const raw = s.modId ? c.modules.find(m => m.id === s.modId) : null;\n    if (raw) {\n      const idxInVis = vis.findIndex(v => v.id === raw.id);\n      const hasQuiz = quizRequired && raw.quiz && raw.quiz.length > 0;\n      quizPassed = s.passed;\n      quizFailed = s.checked && !s.passed;\n      quizUnchecked = !s.checked || s.passed === false && !s.checked;\n      quizUnchecked = !s.checked;\n      quizIncomplete = raw.quiz ? raw.quiz.some((q, qi) => s.answers[qi] === undefined) : true;\n\n      const quiz = (raw.quiz || []).map((q, qi) => ({\n        n: qi + 1, q: q.q,\n        opts: q.opts.map((label, oi) => {\n          const sel = s.answers[qi] === oi;\n          const isCorrect = oi === q.a;\n          let state = '', stateFg = 'transparent', bg = 'var(--color-bg)', border = '1px solid var(--color-divider)', dotBg = 'transparent';\n          if (sel) { dotBg = inkOn; border = '2px solid var(--color-text)'; }\n          if (s.checked && sel && isCorrect) { state = '✓ ' + ui.correct; stateFg = 'var(--color-text)'; bg = 'var(--color-neutral-200)'; }\n          if (s.checked && sel && !isCorrect) { state = '✕ ' + ui.wrong; stateFg = 'var(--color-accent-600)'; border = '2px solid var(--color-accent)'; bg = 'var(--color-accent-100)'; }\n          return { label, bg, border, dotBg, state, stateFg,\n            pick: () => { if (s.passed) return; const a = Object.assign({}, this.state.answers); a[qi] = oi; this.setState({ answers: a, checked: false }); } };\n        })\n      }));\n\n      // checklist vm\n      const checks = (raw.checks || []).map(ch => {\n        const on = !!s.checks[ch.id];\n        return { t: ch.t, d: ch.d, mark: on ? '✓' : '', boxBg: on ? inkOn : 'transparent',\n          rowBg: 'var(--color-bg)', deco: on ? 'line-through' : 'none',\n          toggle: () => { const k = Object.assign({}, this.state.checks); k[ch.id] = !k[ch.id]; this.set({ checks: k }); } };\n      });\n      const allChecked = (raw.checks || []).every(ch => s.checks[ch.id]);\n\n      const blocks = (raw.blocks || []).map((b, bi) => ({ num: b.h.match(/^\\d/) ? '' : ('0' + (bi + 1)).slice(-2), h: b.h, body: b.body, items: b.items || [] }));\n\n      const kindLabel = raw.core ? c.t('Core module', 'Módulo base') : c.t('Role module', 'Módulo de rol');\n      mod = {\n        kicker: kindLabel + ' ' + (idxInVis + 1 < 10 ? '0' : '') + (idxInVis + 1) + ' / ' + vis.length + ' · ' + raw.mins + ' ' + ui.minShort,\n        title: raw.title, intro: raw.intro, blocks,\n        isRoster: !!raw.isRoster, isChecklist: !!raw.isChecklist, isGlossary: !!raw.isGlossary,\n        hasCoverSvg: raw.id === 'files',\n        coverCaption: c.t('Anatomy of a Figma cover file: every working file opens with a cover carrying the project status (Paused / In progress…), head text and title, last-update date, platform tags (Web / App) with the UI Kit version, the contributor list and the Roof Hub logo.', 'Anatomía de un cover file de Figma: cada archivo de trabajo abre con una portada que lleva el estado del proyecto (Paused / In progress…), encabezado y título, fecha de última actualización, etiquetas de plataforma (Web / App) con la versión del UI Kit, la lista de colaboradores y el logo de Roof Hub.'),\n        hasLinks: !!raw.linkGroups, linkGroups: (raw.linkGroups || []).map(g => Object.assign({}, g, { links: g.links.map(l => Object.assign({}, l, { hasTag: !!l.tag })) })),\n        linksNote: c.t('Links open in a new tab. Tagged items ask for the shared password shown on the tag.', 'Los enlaces abren en una pestaña nueva. Los ítems etiquetados piden la contraseña compartida que muestra la etiqueta.'),\n        hasSprintSvg: raw.id === 'stories',\n        hasUikitSvg: raw.id === 'uikit',\n        hasFileImage: !!raw.hasFileImage, fileImageCaption: raw.fileImageCaption || '',\n        people: (raw.people || []).map(p => Object.assign({}, p, { hasContact: !!p.email, hasAsk: !!p.ask, chipBg: p.initials === '?' ? 'var(--color-neutral-300)' : 'var(--color-accent)', chipFg: p.initials === '?' ? 'var(--color-text)' : '#f3f2f2' })),\n        rosterNote: raw.rosterNote || '', hasRosterNote: !!raw.rosterNote,\n        checks, terms: raw.terms || [], quiz, hasQuiz\n      };\n      const isDone = !!s.done[raw.id];\n      completeDisabled = isDone ? false : (hasQuiz ? !s.passed : (raw.isChecklist ? !allChecked : false));\n      completeLabel = isDone ? c.t('Continue', 'Continuar') : c.t('Mark complete & continue', 'Marcar completado y continuar');\n      checklistHint = c.t('All items checked unlocks completion. Missing something? That is a message to your manager, today.', 'Marcar todo desbloquea la finalización. ¿Falta algo? Ese es un mensaje para tu manager, hoy.');\n    }\n\n    const hello = s.name ? (s.lang === 'es' ? 'Hola, ' + s.name + '.' : 'Hi, ' + s.name + '.') : (s.lang === 'es' ? 'Hola.' : 'Hi there.');\n\n    return {\n      ui,\n      rootClass: s.dark ? 'rh-dark' : '',\n      dark: s.dark, light: !s.dark,\n      toggleDark: () => this.set({ dark: !s.dark }),\n      setEn: () => this.set({ lang: 'en' }),\n      setEs: () => this.set({ lang: 'es' }),\n      enBg: s.lang === 'en' ? inkOn : 'transparent', enFg: s.lang === 'en' ? bgOn : inkOn,\n      esBg: s.lang === 'es' ? inkOn : 'transparent', esFg: s.lang === 'es' ? bgOn : inkOn,\n      roleTagVisible: !!s.role && s.view !== 'welcome',\n      roleLabel: curRole ? curRole.title : '',\n      changeRole: () => this.setState({ view: 'welcome' }),\n      isWelcome: s.view === 'welcome', isDash: s.view === 'dash', isMod: s.view === 'mod' && !!raw,\n      name: s.name,\n      onName: (e) => this.set({ name: e.target.value }),\n      roleCards,\n      start: () => { this.set({ view: 'dash' }); window.scrollTo(0, 0); },\n      startDisabled: !s.role,\n      dashHello: hello,\n      pct,\n      progressLabel: doneCount + ' / ' + vis.length,\n      allDone: vis.length > 0 && doneCount === vis.length,\n      certLine: s.lang === 'es' ? ('¡Felicitaciones' + (s.name ? ', ' + s.name : '') + '! Estás listo.') : ('Congratulations' + (s.name ? ', ' + s.name : '') + ' — you are ready.'),\n      coreCards, roleCardsDash,\n      roleHeading: (s.lang === 'es' ? 'Para tu rol — ' : 'For your role — ') + (curRole ? curRole.title : ''),\n      resetAll: (e) => { e.preventDefault(); if (confirm(s.lang === 'es' ? '¿Reiniciar todo el progreso?' : 'Reset all progress?')) { this.set({ done: {}, checks: {}, name: '', role: null, view: 'welcome', modId: null, answers: {}, checked: false, passed: false }); } },\n      backToDash: () => { this.setState({ view: 'dash', modId: null }); window.scrollTo(0, 0); },\n      mod,\n      uk: {\n        s1a: c.t('Draft', 'Borrador'), s1b: c.t('design', 'de diseño'),\n        s2a: c.t('Business', 'Presentación'), s2b: c.t('presentation', 'a negocio'),\n        s3a: c.t('Design adjustments', 'Ajustes de diseño'),\n        s4a: c.t('Development review', 'Revisión con desarrollo'), s4b: c.t('& feasibility', 'y factibilidad'),\n        s5a: c.t('Final UI Kit', 'Actualización final'), s5b: c.t('update', 'del UI Kit'),\n        review: c.t('REVIEW', 'REVISIÓN'),\n        changes: c.t('needs changes', 'requiere cambios'),\n        repeat: c.t('until approved', 'hasta aprobar'),\n        caption: c.t('Every new or modified component is validated by business before it joins the official UI Kit library and reaches development. The review loop (03) repeats until approval is granted; development review can also send a component back for adjustments.', 'Cada componente nuevo o modificado es validado por negocio antes de entrar a la librería oficial del UI Kit y llegar a desarrollo. El ciclo de revisión (03) se repite hasta obtener la aprobación; la revisión con desarrollo también puede devolver un componente a ajustes.')\n      },\n      sprintSvgKicker: c.t('UX Story types', 'Tipos de historias UX'),\n      sprintSvgCaption: c.t('The development sprint (agile). Quick fixes can land before, during or after a sprint — even post-release. New features start before the sprint and freeze once defined; Redesigns are planned for the next sprint.', 'El sprint de desarrollo (ágil). Los quick fixes pueden llegar antes, durante o después del sprint — incluso post-release. Las new features comienzan antes del sprint y se congelan al definirse; los redesigns se planifican para el próximo sprint.'),\n      quizUnchecked, quizIncomplete, quizFailed, quizPassed,\n      checkQuiz: () => {\n        const ok = raw.quiz.every((q, qi) => this.state.answers[qi] === q.a);\n        this.setState({ checked: true, passed: ok });\n      },\n      retryQuiz: () => this.setState({ checked: false, answers: {} }),\n      completeMod: () => this.completeModule(raw),\n      completeDisabled, completeLabel, checklistHint\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
