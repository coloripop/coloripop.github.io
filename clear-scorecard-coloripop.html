<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>C.L.E.A.R. Scorecard · coloripop</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f0eff8;font-family:'DM Sans',sans-serif;padding:24px 16px 32px;}
.wrap{max-width:640px;margin:0 auto;border-radius:14px;overflow:hidden;box-shadow:0 4px 24px rgba(33,31,84,0.13);}

/* HEADER */
.sc-header{background:#211F54;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.sc-header svg{height:32px;width:auto;flex-shrink:0;}
.sc-header-right{text-align:right;flex-shrink:0;}
.sc-header-tag{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:#B5AFFF;font-weight:700;white-space:nowrap;}
.sc-header-sub{font-size:11px;color:#E2E0FF;margin-top:2px;white-space:nowrap;}

/* BODY */
.sc-body{background:#ffffff;border-left:1px solid #e0dff5;border-right:1px solid #e0dff5;padding:16px 20px 12px;}

/* TOP ROW */
.sc-top-row{display:flex;align-items:flex-end;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
.sc-field{display:flex;flex-direction:column;gap:4px;flex:1;min-width:120px;}
.sc-field-sm{flex:0 1 180px;min-width:120px;}
.sc-label{font-size:10px;font-weight:500;letter-spacing:0.07em;text-transform:uppercase;color:#7b78a8;white-space:nowrap;}
.sc-screen-input{font-family:'DM Sans',sans-serif;font-size:13px;background:#f5f4ff;border:1px solid #d0ceee;border-radius:8px;padding:7px 11px;color:#211F54;width:100%;}
.sc-screen-input::placeholder{color:transparent;}
.sc-total-block{display:flex;align-items:baseline;gap:3px;flex-shrink:0;padding-bottom:2px;}
.sc-total-num{font-family:'Space Mono',monospace;font-size:28px;font-weight:700;color:#4A3AFF;transition:color 0.35s;min-width:38px;text-align:right;}
.sc-total-denom{font-size:13px;color:#7b78a8;}

/* PILLAR CARDS */
.sc-pillar{background:#fafafa;border:1px solid #e8e7f5;border-radius:10px;padding:10px 13px;margin-bottom:6px;}
.sc-pillar-top{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.sc-letter{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;width:24px;text-align:center;flex-shrink:0;}
.sc-pillar-info{flex:1;}
.sc-pillar-name{font-size:13px;font-weight:500;color:#211F54;}
.sc-pillar-desc{font-size:11px;color:#6b68a0;margin-top:1px;line-height:1.4;}
.sc-score-disp{font-family:'Space Mono',monospace;font-size:16px;font-weight:700;min-width:16px;text-align:right;transition:color 0.3s;color:#c0bedc;}

.sc-dots{display:flex;gap:5px;margin-bottom:5px;}
.sc-dot{width:24px;height:24px;border-radius:50%;border:1.5px solid #c8c6e8;cursor:pointer;background:transparent;transition:background 0.18s,transform 0.1s;font-family:'Space Mono',monospace;font-size:9px;font-weight:700;color:#9b98c8;display:flex;align-items:center;justify-content:center;}
.sc-dot:hover{transform:scale(1.13);}
.sc-dot.active{border-color:transparent;color:#fff;}

.sc-bar-wrap{height:3px;background:#ece9f8;border-radius:2px;margin-bottom:6px;overflow:hidden;}
.sc-bar{height:100%;border-radius:2px;transition:width 0.4s cubic-bezier(.4,0,.2,1),background 0.4s;width:0%;}

.sc-notes{width:100%;font-family:'DM Sans',sans-serif;font-size:11px;background:#f0eff8;border:1px solid #dddcf0;border-radius:7px;padding:5px 9px;color:#211F54;resize:none;height:30px;transition:height 0.2s;line-height:1.5;}
.sc-notes:focus{height:50px;outline:none;border-color:#4A3AFF;}
.sc-notes::placeholder{color:#a09ec0;}

/* VERDICT */
.sc-verdict{margin-top:10px;background:#f5f4ff;border:1px solid #dddcf0;border-radius:10px;padding:10px 13px;display:flex;align-items:center;gap:12px;}
.sc-verdict-score{font-family:'Space Mono',monospace;font-size:32px;font-weight:700;line-height:1;transition:color 0.4s;min-width:56px;color:#c0bedc;}
.sc-verdict-label{font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:#7b78a8;margin-bottom:2px;}
.sc-verdict-desc{font-size:12px;color:#211F54;line-height:1.5;}

.sc-weakest{margin-top:7px;font-size:11px;color:#6b68a0;padding:6px 10px;background:#fff0fb;border-radius:7px;border-left:3px solid #FE81E7;}

/* ACTIONS */
.sc-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;align-items:center;}
.sc-btn{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;border:1px solid #c8c6e8;border-radius:7px;background:#fff;color:#211F54;padding:6px 13px;cursor:pointer;transition:background 0.15s;}
.sc-btn:hover{background:#f0eff8;}
.sc-btn.primary{background:#4A3AFF;color:#fff;border-color:#4A3AFF;}
.sc-btn.primary:hover{background:#3c2fd4;}
.sc-btn.pink{background:#FE81E7;color:#211F54;border-color:#FE81E7;}
.sc-btn.pink:hover{background:#fc6add;}
.sc-status{font-size:11px;color:#6b68a0;opacity:0;transition:opacity 0.3s;align-self:center;}
.sc-status.show{opacity:1;}

/* FOOTER */
.sc-footer{background:#F5F4FF;border:1px solid #dddcf0;border-top:none;border-radius:0 0 14px 14px;padding:9px 24px;display:flex;align-items:center;justify-content:space-between;}
.sc-footer-left{font-size:11px;color:#7B5EA7;}
.sc-footer-left a{color:#4A3AFF;text-decoration:none;font-weight:500;}
.sc-footer-right{font-size:10px;color:#B5AFFF;letter-spacing:0.05em;}

/* PRINT */
@media print{
  body{background:#fff;padding:0;}
  .sc-actions{display:none!important;}
  .wrap{box-shadow:none;border-radius:0;}
  .sc-header,.sc-dot.active,.sc-bar,.sc-weakest,.sc-verdict,.sc-footer{
    -webkit-print-color-adjust:exact;print-color-adjust:exact;
  }
  @page{margin:12mm;size:A4;}
}
</style>

    <div id="pillars"></div>
    <div class="sc-verdict">
      <div class="sc-verdict-score" id="verdict-score">0</div>
      <div>
        <div class="sc-verdict-label">Diagnóstico</div>
        <div class="sc-verdict-desc" id="verdict-desc">Asigna puntajes para ver el diagnóstico.</div>
      </div>
    </div>
    <div id="weakest-wrap"></div>
    <div class="sc-actions">
      <button class="sc-btn primary" onclick="copyResults()">Copiar resultados</button>
      <button class="sc-btn pink" onclick="window.print()">Imprimir / PDF</button>
      <button class="sc-btn" onclick="resetAll()">Reiniciar</button>
      <span class="sc-status" id="sc-status"></span>
    </div>
  </div>

  <div class="sc-footer">
    <div class="sc-footer-left">Creado por <a href="https://coloripop.com" target="_blank">coloripop.com</a> · Basado en Growth.Design C.L.E.A.R.</div>
    <div class="sc-footer-right">© 2025</div>
  </div>

</div>

<script>
const PILLARS=[
  {key:'C',color:'#4A3AFF',name:'Copywriting',desc:'¿El texto es claro, específico y habla como una persona real?'},
  {key:'L',color:'#7B5EA7',name:'Layout',desc:'¿La estructura hace la pantalla fácil de entender a primera vista?'},
  {key:'E',color:'#FE81E7',name:'Emphasis',desc:'¿Lo más importante es imposible de ignorar?'},
  {key:'A',color:'#B5AFFF',name:'Accessibility',desc:'¿Es visible, operable y accionable sin adivinar?'},
  {key:'R',color:'#211F54',name:'Reward',desc:'¿La interacción hace sentir Control, Competencia o Reconocimiento?'}
];
const scores={C:0,L:0,E:0,A:0,R:0};
const notes={C:'',L:'',E:'',A:'',R:''};
function getVerdict(t){
  if(t===0)return{label:'Sin evaluar',desc:'Asigna puntajes para ver el diagnóstico.',color:'#c0bedc'};
  if(t<=8)return{label:'Necesita revisión profunda',desc:'Problemas fundamentales en múltiples pilares. Prioriza los más bajos.',color:'#E24B4A'};
  if(t<=14)return{label:'Funcional, pero mejorable',desc:'Hay base sólida, pero al menos un pilar lastima la experiencia.',color:'#EF9F27'};
  if(t<=19)return{label:'Buena experiencia',desc:'Funciona bien. Ajustes menores en los pilares bajos marcarán la diferencia.',color:'#1D9E75'};
  if(t<=23)return{label:'Muy buena UI',desc:'Diseño sólido y considerado. Pulir los pilares con menor puntaje.',color:'#4A3AFF'};
  return{label:'UI excepcional',desc:'¡Cada pilar bien trabajado! Úsala como referencia.',color:'#FE81E7'};
}
function bc(s){return s<=1?'#E24B4A':s<=3?'#EF9F27':s<=4?'#1D9E75':'#4A3AFF';}
function updateTotal(){
  const t=Object.values(scores).reduce((a,b)=>a+b,0);
  const v=getVerdict(t);
  document.getElementById('total-top').textContent=t;
  document.getElementById('total-top').style.color=v.color;
  document.getElementById('verdict-score').textContent=t;
  document.getElementById('verdict-score').style.color=v.color;
  document.getElementById('verdict-desc').textContent=v.desc;
  const minV=Math.min(...Object.values(scores));
  const wrap=document.getElementById('weakest-wrap');
  if(t>0){
    const wk=PILLARS.filter(p=>scores[p.key]===minV).map(p=>p.name).join(', ');
    wrap.innerHTML=`<div class="sc-weakest">Pilar más débil: <strong>${wk}</strong> (${minV}/5) — ¿cómo lo subirías 1 punto?</div>`;
  }else{wrap.innerHTML='';}
}
function setScore(key,val){
  scores[key]=val;
  document.querySelectorAll(`.dot-${key}`).forEach((d,i)=>{
    if(i<val){d.classList.add('active');d.style.background=bc(val);}
    else{d.classList.remove('active');d.style.background='';}
  });
  document.getElementById(`bar-${key}`).style.width=(val/5*100)+'%';
  document.getElementById(`bar-${key}`).style.background=bc(val);
  document.getElementById(`disp-${key}`).textContent=val;
  document.getElementById(`disp-${key}`).style.color=bc(val);
  updateTotal();
}
function renderPillars(){
  const c=document.getElementById('pillars');
  PILLARS.forEach(p=>{
    const el=document.createElement('div');
    el.className='sc-pillar';
    el.innerHTML=`
      <div class="sc-pillar-top">
        <div class="sc-letter" style="color:${p.color}">${p.key}</div>
        <div class="sc-pillar-info">
          <div class="sc-pillar-name">${p.name}</div>
          <div class="sc-pillar-desc">${p.desc}</div>
        </div>
        <div class="sc-score-disp" id="disp-${p.key}">0</div>
      </div>
      <div class="sc-dots">${[1,2,3,4,5].map(n=>`<button class="sc-dot dot-${p.key}" data-key="${p.key}" data-val="${n}">${n}</button>`).join('')}</div>
      <div class="sc-bar-wrap"><div class="sc-bar" id="bar-${p.key}"></div></div>
      <textarea class="sc-notes" placeholder="Observaciones para ${p.name.toLowerCase()}..." data-key="${p.key}"></textarea>`;
    c.appendChild(el);
  });
  document.querySelectorAll('.sc-dot').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const k=btn.dataset.key,v=parseInt(btn.dataset.val);
      setScore(k,scores[k]===v?0:v);
    });
  });
  document.querySelectorAll('.sc-notes').forEach(ta=>{
    ta.addEventListener('input',e=>{notes[e.target.dataset.key]=e.target.value;});
  });
}
function showStatus(msg){
  const s=document.getElementById('sc-status');
  s.textContent=msg;s.classList.add('show');
  setTimeout(()=>s.classList.remove('show'),2500);
}
function copyResults(){
  const name=document.getElementById('screen-name').value||'Pantalla sin nombre';
  const evaluator=document.getElementById('evaluator-name').value||'—';
  const t=Object.values(scores).reduce((a,b)=>a+b,0);
  const v=getVerdict(t);
  let txt=`C.L.E.A.R. Scorecard — ${name}\nEvaluador: ${evaluator}\n${'─'.repeat(38)}\n`;
  PILLARS.forEach(p=>{txt+=`${p.key}  ${p.name.padEnd(14)} ${scores[p.key]}/5${notes[p.key]?' → '+notes[p.key]:''}\n`;});
  txt+=`${'─'.repeat(38)}\nTotal: ${t}/25 — ${v.label}\ncoloripop.com`;
  navigator.clipboard.writeText(txt).then(()=>showStatus('¡Copiado!'));
}
function resetAll(){
  PILLARS.forEach(p=>setScore(p.key,0));
  document.getElementById('screen-name').value='';
  document.querySelectorAll('.sc-notes').forEach(ta=>{ta.value='';notes[ta.dataset.key]='';});
  updateTotal();
}
renderPillars();
updateTotal();
</script>
</body>
</html>
