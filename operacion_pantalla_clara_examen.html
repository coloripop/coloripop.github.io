<style>
:root {
  --bg: #0a0c0f; --bg2: #0f1318; --bg3: #141920;
  --border: #1e2830; --border2: #2a3540;
  --green: #00c875; --green2: #009958; --green-dim: rgba(0,200,117,0.08);
  --amber: #ffb300; --amber-dim: rgba(255,179,0,0.08);
  --red: #ff4444; --red-dim: rgba(255,68,68,0.08);
  --blue: #00aaff; --purple: #aa55ff;
  --text: #c8d4dc; --text-dim: #6a7f8a; --text-bright: #e8f0f4;
  --mono: 'Share Tech Mono', monospace;
  --cond: 'Barlow Condensed', sans-serif;
  --body: 'Barlow', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:var(--bg); color:var(--text);
  font-family:var(--body); font-size:14px; min-height:100vh; overflow-x:hidden;
}
body::before {
  content:''; position:fixed; inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);
  pointer-events:none; z-index:9999;
}
body::after {
  content:''; position:fixed; inset:0;
  background-image:linear-gradient(rgba(0,200,117,0.03) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(0,200,117,0.03) 1px,transparent 1px);
  background-size:40px 40px; pointer-events:none; z-index:0;
}
#root { position:relative; z-index:1; }

.mono { font-family:var(--mono); }
.cond { font-family:var(--cond); }

/* TOPBAR */
.topbar {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 24px; background:var(--bg2);
  border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:100;
}
.topbar-logo { font-family:var(--mono); font-size:13px; color:var(--green); display:flex; align-items:center; gap:10px; }
.topbar-logo .dot { width:8px; height:8px; border-radius:50%; background:var(--green); animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,200,117,0.4)} 50%{opacity:.6;box-shadow:0 0 0 6px rgba(0,200,117,0)} }
.topbar-right { font-family:var(--mono); font-size:11px; color:var(--text-dim); display:flex; align-items:center; gap:16px; }
.status-pill { padding:3px 10px; border-radius:2px; font-size:10px; letter-spacing:1px; text-transform:uppercase; }
.status-green { background:rgba(0,200,117,0.15); color:var(--green); border:1px solid rgba(0,200,117,0.3); }
.status-amber { background:rgba(255,179,0,0.15); color:var(--amber); border:1px solid rgba(255,179,0,0.3); }
.status-red { background:rgba(255,68,68,0.15); color:var(--red); border:1px solid rgba(255,68,68,0.3); }

/* LAYOUT */
.app-layout { display:grid; grid-template-columns:240px 1fr; min-height:calc(100vh - 49px); }

/* SIDEBAR */
.sidebar { background:var(--bg2); border-right:1px solid var(--border); padding:20px 0; }
.sidebar-section-label { font-family:var(--mono); font-size:9px; letter-spacing:2px; color:var(--text-dim); text-transform:uppercase; padding:0 20px 8px; margin-top:8px; }
.sidebar-item {
  display:flex; align-items:center; gap:10px; padding:10px 20px;
  cursor:pointer; transition:all 0.15s; font-family:var(--cond);
  font-size:15px; font-weight:600; color:var(--text-dim); letter-spacing:0.5px;
  border-left:2px solid transparent;
}
.sidebar-item:hover { background:rgba(255,255,255,0.03); color:var(--text); }
.sidebar-item.active { background:rgba(0,200,117,0.05); color:var(--green); border-left:2px solid var(--green); }
.sidebar-item .phase-badge {
  width:24px; height:24px; border-radius:2px;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--mono); font-size:11px; font-weight:700; flex-shrink:0;
}
.sidebar-item .check { font-size:11px; margin-left:auto; color:var(--green); }

/* MAIN */
.main { padding:32px; overflow-y:auto; }

/* CARDS */
.card { background:var(--bg2); border:1px solid var(--border); border-radius:2px; padding:24px; margin-bottom:16px; }

/* BRIEFING */
.briefing {
  background:var(--bg3); border:1px solid var(--border2);
  border-left:3px solid var(--amber); padding:16px 20px; margin-bottom:20px;
  font-family:var(--mono); font-size:13px; line-height:1.7; color:var(--text);
}
.briefing-label { font-size:9px; letter-spacing:2px; color:var(--amber); text-transform:uppercase; margin-bottom:8px; }

/* FORM */
.field-group { margin-bottom:20px; }
.field-label { font-family:var(--mono); font-size:11px; letter-spacing:1.5px; color:var(--text-dim); text-transform:uppercase; margin-bottom:8px; display:block; }
.field-question { font-family:var(--body); font-size:15px; color:var(--text-bright); margin-bottom:8px; line-height:1.5; }
textarea, input[type="text"] {
  width:100%; background:var(--bg3); border:1px solid var(--border2); border-radius:2px;
  padding:12px 14px; color:var(--text-bright); font-family:var(--body); font-size:15px;
  resize:vertical; outline:none; transition:border-color 0.15s;
}
textarea:focus, input[type="text"]:focus { border-color:var(--green); box-shadow:0 0 0 1px rgba(0,200,117,0.1); }
textarea { min-height:80px; }

/* UPLOAD */
.upload-zone {
  border:2px dashed var(--border2); border-radius:2px; padding:32px;
  text-align:center; cursor:pointer; transition:all 0.15s; background:var(--bg3);
}
.upload-zone:hover, .upload-zone.drag-over { border-color:var(--green); background:var(--green-dim); }
.upload-zone-icon { font-size:32px; margin-bottom:8px; opacity:0.5; }
.upload-zone-text { font-family:var(--mono); font-size:13px; color:var(--text-dim); letter-spacing:1px; }
.upload-preview { width:100%; border-radius:2px; border:1px solid var(--border2); max-height:300px; object-fit:contain; }

/* BUTTONS */
.btn {
  display:inline-flex; align-items:center; gap:8px; padding:10px 20px;
  border-radius:2px; border:none; cursor:pointer; font-family:var(--mono);
  font-size:12px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; transition:all 0.15s;
}
.btn-primary { background:var(--green); color:var(--bg); }
.btn-primary:hover { background:var(--green2); transform:translateY(-1px); }
.btn-primary:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
.btn-secondary { background:transparent; color:var(--text); border:1px solid var(--border2); }
.btn-secondary:hover { border-color:var(--text-dim); color:var(--text-bright); }
.btn-danger { background:var(--red-dim); color:var(--red); border:1px solid rgba(255,68,68,0.3); }
.btn-amber { background:var(--amber-dim); color:var(--amber); border:1px solid rgba(255,179,0,0.3); }

/* PROGRESS */
.phases-bar { display:flex; gap:4px; margin-bottom:32px; }
.phase-step { flex:1; height:4px; border-radius:2px; background:var(--border2); transition:all 0.3s; }
.phase-step.done { background:var(--green); }
.phase-step.active { background:var(--amber); }

/* MISSION HEADER */
.mission-header { margin-bottom:28px; }
.mission-codename { font-family:var(--mono); font-size:10px; color:var(--text-dim); letter-spacing:3px; text-transform:uppercase; margin-bottom:4px; }
.mission-title { font-family:var(--cond); font-size:36px; font-weight:900; color:var(--text-bright); letter-spacing:2px; text-transform:uppercase; line-height:1; }
.mission-title span { color:var(--green); }

/* INTEL */
.intel-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:24px; }
.intel-box { background:var(--bg3); border:1px solid var(--border); padding:14px; border-radius:2px; }
.intel-label { font-family:var(--mono); font-size:9px; color:var(--text-dim); letter-spacing:2px; text-transform:uppercase; margin-bottom:4px; }
.intel-value { font-family:var(--cond); font-size:18px; font-weight:700; color:var(--text-bright); }

/* SECTION DIVIDER */
.section-divider { display:flex; align-items:center; gap:12px; margin:24px 0 16px; }
.section-divider-line { flex:1; height:1px; background:var(--border); }
.section-divider-label { font-family:var(--mono); font-size:9px; letter-spacing:2px; color:var(--text-dim); text-transform:uppercase; }

/* ADMIN GRID */
.admin-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:12px; }
.student-card { background:var(--bg3); border:1px solid var(--border); border-radius:2px; padding:16px; }
.student-card-name { font-family:var(--cond); font-size:18px; font-weight:700; color:var(--text-bright); margin-bottom:8px; }
.phase-dots { display:flex; gap:4px; margin-bottom:12px; }
.phase-dot {
  width:28px; height:28px; border-radius:2px; display:flex; align-items:center; justify-content:center;
  font-family:var(--mono); font-size:10px; font-weight:700;
  border:1px solid var(--border2); color:var(--text-dim); background:var(--bg2);
}
.phase-dot.done { background:rgba(0,200,117,0.15); border-color:var(--green); color:var(--green); }
.phase-dot.reviewed { background:rgba(255,179,0,0.15); border-color:var(--amber); color:var(--amber); }

/* FEEDBACK CARD */
.feedback-card {
  background:var(--bg3); border:1px solid var(--border);
  border-left:3px solid var(--amber); border-radius:2px; padding:16px;
}

/* LOGIN */
.login-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; flex-direction:column; }
.login-bg { position:absolute; inset:0; background:radial-gradient(ellipse at 50% 0%,rgba(0,200,117,0.05) 0%,transparent 70%); pointer-events:none; }
.login-card { width:440px; background:var(--bg2); border:1px solid var(--border2); border-radius:2px; padding:40px; position:relative; z-index:1; }
.login-top-stripe { height:3px; background:linear-gradient(90deg,var(--green),var(--blue)); margin:-40px -40px 32px; border-radius:2px 2px 0 0; }
.login-title { font-family:var(--cond); font-size:32px; font-weight:900; color:var(--text-bright); text-transform:uppercase; letter-spacing:2px; line-height:1; margin-bottom:4px; }
.login-title .accent { color:var(--green); }
.role-select { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:20px; }
.role-btn { padding:12px; background:var(--bg3); border:1px solid var(--border2); border-radius:2px; cursor:pointer; text-align:center; transition:all 0.15s; font-family:var(--mono); font-size:11px; color:var(--text-dim); letter-spacing:1px; text-transform:uppercase; }
.role-btn:hover { border-color:var(--text-dim); color:var(--text); }
.role-btn.selected { border-color:var(--green); color:var(--green); background:var(--green-dim); }

/* TOAST */
.toast { position:fixed; bottom:24px; right:24px; background:var(--bg2); border:1px solid var(--green); border-radius:2px; padding:12px 20px; font-family:var(--mono); font-size:13px; color:var(--green); z-index:9998; animation:slideIn 0.3s ease; box-shadow:0 4px 24px rgba(0,0,0,0.4); }
.toast.error { border-color:var(--red); color:var(--red); }
@keyframes slideIn { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }

/* COMPLETE BANNER */
.complete-banner { background:linear-gradient(135deg,rgba(0,200,117,0.1),rgba(0,170,255,0.05)); border:1px solid rgba(0,200,117,0.3); border-radius:2px; padding:32px; text-align:center; margin-bottom:24px; }
.complete-icon { font-size:48px; margin-bottom:12px; }
.complete-title { font-family:var(--cond); font-size:28px; font-weight:900; color:var(--green); text-transform:uppercase; letter-spacing:2px; }

/* LOADING */
.loading { display:flex; align-items:center; justify-content:center; height:200px; font-family:var(--mono); font-size:13px; color:var(--text-dim); letter-spacing:2px; }

/* SCORE BUTTONS */
.score-btn {
  width:38px; height:38px; border-radius:50%; border:none; cursor:pointer;
  font-family:var(--mono); font-size:13px; font-weight:700; transition:all 0.15s;
}

input[type="file"] { display:none; }
@media(max-width:768px) { .app-layout{grid-template-columns:1fr} .sidebar{display:none} .intel-grid{grid-template-columns:1fr 1fr} }
</style>

// ─── TOAST ───
function Toast({ msg, type, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 3000); return () => clearTimeout(t); }, []);
  return <div className={`toast ${type==='error'?'error':''}`}>{msg}</div>;
}

// ─── IMAGE UPLOAD ───
function ImageUpload({ studentId, phase, missionId, existingUrl, onUploaded }) {
  const [uploading, setUploading] = useState(false);
  const [preview, setPreview] = useState(existingUrl || null);
  const [dragOver, setDragOver] = useState(false);
  const inputRef = useRef();

  const handleFile = async (file) => {
    if (!file || !file.type.startsWith('image/')) return;
    setUploading(true);
    const ext = file.name.split('.').pop();
    const path = `${missionId}/${studentId}/${phase}.${ext}`;
    const { error } = await sb.storage.from('submissions').upload(path, file, { upsert:true });
    if (error) { alert('Error subiendo imagen. ¿El bucket "submissions" existe en Supabase Storage?'); setUploading(false); return; }
    const { data } = sb.storage.from('submissions').getPublicUrl(path);
    setPreview(data.publicUrl);
    onUploaded(data.publicUrl);
    setUploading(false);
  };

  const onDrop = (e) => { e.preventDefault(); setDragOver(false); handleFile(e.dataTransfer.files[0]); };

  return (
    <div>
      {preview ? (
        <div>
          <img src={preview} alt="submission" className="upload-preview" style={{ marginBottom:8 }}/>
          <button className="btn btn-secondary" style={{ fontSize:10 }} onClick={() => inputRef.current.click()}>↑ REEMPLAZAR</button>
        </div>
      ) : (
        <div className={`upload-zone ${dragOver?'drag-over':''}`}
          onClick={() => inputRef.current.click()}
          onDrop={onDrop} onDragOver={e=>{e.preventDefault();setDragOver(true);}} onDragLeave={()=>setDragOver(false)}>
          <div className="upload-zone-icon">📡</div>
          <div className="upload-zone-text">{uploading ? 'TRANSMITIENDO...' : 'SOLTAR IMAGEN AQUÍ O HACER CLIC'}</div>
          <div style={{ fontFamily:'var(--mono)', fontSize:10, color:'var(--text-dim)', marginTop:4 }}>PNG, JPG, WEBP</div>
        </div>
      )}
      <input type="file" ref={inputRef} accept="image/*" onChange={e => handleFile(e.target.files[0])}/>
    </div>
  );
}

// ─── PHASE VIEW (Student) ───
function PhaseView({ phase, student, missionId, onSubmitted }) {
  const [answers, setAnswers] = useState({});
  const [imageUrl, setImageUrl] = useState('');
  const [saving, setSaving] = useState(false);
  const [existing, setExisting] = useState(null);
  const [feedback, setFeedback] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    const load = async () => {
      const [{ data: sub }, { data: fb }] = await Promise.all([
        sb.from('submissions').select('*').eq('student_id', student.id).eq('mission_id', missionId).eq('phase', phase.id).single(),
        sb.from('commander_feedback').select('*').eq('student_id', student.id).eq('mission_id', missionId).eq('phase', phase.id).single(),
      ]);
      if (sub) { setExisting(sub); setAnswers(sub.answers || {}); setImageUrl(sub.image_url || ''); }
      if (fb) setFeedback(fb);
      setLoading(false);
    };
    load();
  }, [phase.id, student.id, missionId]);

  const setAnswer = (key, val) => setAnswers(prev => ({ ...prev, [key]: val }));

  const handleSubmit = async () => {
    const allAnswered = phase.questions.every(q => (answers[q.key]||'').trim().length > 5);
    if (!allAnswered) { alert('Completa todas las respuestas antes de transmitir.'); return; }
    setSaving(true);
    const payload = { student_id: student.id, student_name: student.name, mission_id: missionId, phase: phase.id, image_url: imageUrl || null, answers };
    if (existing) { await sb.from('submissions').update(payload).eq('id', existing.id); }
    else { await sb.from('submissions').insert(payload); }
    setSaving(false);
    onSubmitted(phase.id);
  };

  if (loading) return <div className="loading">CARGANDO FASE</div>;

  return (
    <div>
      <div className="mission-header">
        <div className="mission-codename">// OPERACIÓN PANTALLA CLARA // MISIÓN {missionId}</div>
        <div className="mission-title">FASE {phase.id}: <span>{phase.name}</span></div>
        <div style={{ fontFamily:'var(--mono)', fontSize:11, color:'var(--text-dim)', marginTop:4, letterSpacing:1 }}>{phase.subtitle}</div>
      </div>

      <MissionBrief missionNumber={student.mission_number} compact={false} />

      <div className="briefing">
        <div className="briefing-label">◈ BRIEFING TÁCTICO</div>
        {phase.briefing}
      </div>

      <div className="intel-grid">
        <div className="intel-box">
          <div className="intel-label">OBJETIVO</div>
          <div style={{ fontFamily:'var(--body)', fontSize:13, color:'var(--text)', lineHeight:1.5 }}>{phase.objective}</div>
        </div>
        <div className="intel-box">
          <div className="intel-label">FASE</div>
          <div className="intel-value" style={{ color:phase.color }}>{phase.id} — {phase.name}</div>
        </div>
        <div className="intel-box">
          <div className="intel-label">ESTADO</div>
          <div className="intel-value" style={{ color: existing ? 'var(--green)' : 'var(--amber)', fontSize:14 }}>
            {existing ? '✓ TRANSMITIDO' : '⬡ PENDIENTE'}
          </div>
        </div>
      </div>

      <div className="card">
        <div className="section-divider"><div className="section-divider-line"/><div className="section-divider-label">EVIDENCIA VISUAL</div><div className="section-divider-line"/></div>
        <div className="field-question" style={{ marginBottom:12 }}>Sube una captura de tu pantalla o prototipo para esta fase.</div>
        <ImageUpload studentId={student.id} phase={phase.id} missionId={missionId} existingUrl={imageUrl} onUploaded={setImageUrl}/>
      </div>

      <div className="card">
        <div className="section-divider"><div className="section-divider-line"/><div className="section-divider-label">INFORME DE CAMPO</div><div className="section-divider-line"/></div>
        {phase.questions.map(q => (
          <div key={q.key} className="field-group">
            <label className="field-label" style={{ color:phase.color }}>{q.label}</label>
            <div className="field-question">{q.prompt}</div>
            <textarea value={answers[q.key]||''} onChange={e => setAnswer(q.key, e.target.value)} placeholder="Escribe tu respuesta aquí..." rows={3}/>
          </div>
        ))}
        <button className="btn btn-primary" onClick={handleSubmit} disabled={saving}>
          {saving ? 'TRANSMITIENDO...' : `→ TRANSMITIR FASE ${phase.id}`}
        </button>
        {existing && <span style={{ fontFamily:'var(--mono)', fontSize:11, color:'var(--green)', marginLeft:12 }}>✓ Última transmisión guardada</span>}
      </div>

      {feedback && (
        <div className="card">
          <CommanderFeedbackBadge feedback={feedback} />
        </div>
      )}
    </div>
  );
}

// ─── STUDENT APP ───
function StudentApp({ student, onLogout }) {
  const [activePhase, setActivePhase] = useState('C');
  const [completedPhases, setCompletedPhases] = useState(new Set());
  const [missionId] = useState('01');
  const [toast, setToast] = useState(null);

  useEffect(() => {
    sb.from('submissions').select('phase').eq('student_id', student.id).eq('mission_id', missionId)
      .then(({ data }) => { if (data) setCompletedPhases(new Set(data.map(d => d.phase))); });
  }, [student.id, missionId]);

  const handleSubmitted = (phaseId) => {
    setCompletedPhases(prev => new Set([...prev, phaseId]));
    setToast({ msg: `FASE ${phaseId} TRANSMITIDA`, type:'success' });
    const idx = PHASES.findIndex(p => p.id === phaseId);
    if (idx < PHASES.length - 1) setTimeout(() => setActivePhase(PHASES[idx+1].id), 800);
  };

  const allDone = PHASES.every(p => completedPhases.has(p.id));
  const currentPhase = PHASES.find(p => p.id === activePhase);

  return (
    <div>
      <div className="topbar">
        <div className="topbar-logo"><div className="dot"/>OP. PANTALLA CLARA</div>
        <div className="topbar-right">
          <span>AGENTE: {student.name.toUpperCase()}</span>
          <span className={`status-pill ${allDone?'status-green':'status-amber'}`}>{completedPhases.size}/5 FASES</span>
          <button className="btn btn-secondary" style={{ padding:'4px 10px', fontSize:10 }} onClick={onLogout}>SALIR</button>
        </div>
      </div>
      <div className="app-layout">
        <div className="sidebar">
          {student.mission_number && (
            <div style={{ padding:'0 12px', marginBottom:4 }}>
              <MissionBrief missionNumber={student.mission_number} compact={true}/>
            </div>
          )}
          <div className="sidebar-section-label">FASES DE OPERACIÓN</div>
          {PHASES.map(phase => {
            const done = completedPhases.has(phase.id);
            const active = activePhase === phase.id;
            return (
              <div key={phase.id} className={`sidebar-item ${active?'active':''}`}
                onClick={() => setActivePhase(phase.id)}
                style={active ? { borderLeftColor:phase.color, color:phase.color, background:phase.colorDim } : {}}>
                <div className="phase-badge" style={{ background:done?phase.colorDim:'var(--bg3)', border:`1px solid ${done?phase.color:'var(--border2)'}`, color:done?phase.color:'var(--text-dim)' }}>{phase.id}</div>
                {phase.name}
                {done && <span className="check">✓</span>}
              </div>
            );
          })}
          <div style={{ padding:'20px 20px 0', marginTop:'auto' }}>
            <div className="phases-bar">
              {PHASES.map(p => (
                <div key={p.id} className={`phase-step ${completedPhases.has(p.id)?'done':activePhase===p.id?'active':''}`}
                  style={completedPhases.has(p.id)?{background:p.color}:{}}/>
              ))}
            </div>
          </div>
        </div>
        <div className="main">
          {currentPhase && (
            <PhaseView key={activePhase} phase={currentPhase} student={student} missionId={missionId} onSubmitted={handleSubmitted}/>
          )}
          {allDone && (
            <div className="complete-banner">
              <div className="complete-icon">🎯</div>
              <div className="complete-title">MISIÓN COMPLETADA</div>
              <div style={{ fontFamily:'var(--mono)', fontSize:12, color:'var(--text-dim)', marginTop:8 }}>
                Espera el feedback del Comandante en cada fase.
              </div>
            </div>
          )}
        </div>
      </div>
      {toast && <Toast msg={toast.msg} type={toast.type} onDone={() => setToast(null)}/>}
    </div>
  );
}

// ─── COMMANDER FEEDBACK FORM ───
function CommanderFeedbackForm({ studentId, missionId, phase, existingFeedback, onSaved }) {
  const [score, setScore] = useState(existingFeedback?.score || 0);
  const [comment, setComment] = useState(existingFeedback?.comment || '');
  const [saving, setSaving] = useState(false);

  const handleSave = async () => {
    setSaving(true);
    const payload = { student_id: studentId, mission_id: missionId, phase: phase.id, score: score || null, comment: comment.trim() || null, updated_at: new Date().toISOString() };
    if (existingFeedback) { await sb.from('commander_feedback').update(payload).eq('id', existingFeedback.id); }
    else { await sb.from('commander_feedback').insert(payload); }
    setSaving(false);
    onSaved({ ...payload, id: existingFeedback?.id });
  };

  return (
    <div style={{ background:'rgba(255,179,0,0.04)', border:'1px solid rgba(255,179,0,0.2)', borderLeft:'3px solid var(--amber)', borderRadius:2, padding:'16px' }}>
      <div style={{ fontFamily:'var(--mono)', fontSize:9, letterSpacing:2, color:'var(--amber)', marginBottom:12 }}>◈ FEEDBACK DEL COMANDANTE</div>

      <div style={{ marginBottom:12 }}>
        <div className="field-label" style={{ marginBottom:8 }}>PUNTUACIÓN (1–5)</div>
        <div style={{ display:'flex', gap:8 }}>
          {[1,2,3,4,5].map(n => (
            <button key={n} className="score-btn"
              onClick={() => setScore(prev => prev===n ? 0 : n)}
              style={{ background: n<=score ? 'var(--amber)' : 'var(--bg3)', color: n<=score ? '#000' : 'var(--text-dim)', border:`1px solid ${n<=score?'var(--amber)':'var(--border2)'}`, outline: score===n ? '2px solid var(--amber)' : 'none', outlineOffset:2 }}>
              {n}
            </button>
          ))}
          {score > 0 && <span style={{ fontFamily:'var(--mono)', fontSize:14, fontWeight:700, color:'var(--amber)', alignSelf:'center', marginLeft:4 }}>{score}/5</span>}
        </div>
      </div>

      <div style={{ marginBottom:12 }}>
        <div className="field-label" style={{ marginBottom:8 }}>COMENTARIO</div>
        <textarea value={comment} onChange={e => setComment(e.target.value)} rows={3} placeholder="Escribe tu feedback para este agente..."/>
      </div>

      <button className="btn btn-amber" onClick={handleSave} disabled={saving || (!score && !comment.trim())}>
        {saving ? 'GUARDANDO...' : existingFeedback ? '↑ ACTUALIZAR FEEDBACK' : '→ ENVIAR FEEDBACK'}
      </button>
    </div>
  );
}

// ─── STUDENT DETAIL (Admin) ───
function StudentDetail({ student, submissions, feedbacks, onBack, onFeedbackSaved }) {
  return (
    <div>
      <button className="btn btn-secondary" style={{ marginBottom:20 }} onClick={onBack}>← VOLVER</button>
      <div className="mission-header">
        <div className="mission-codename">// INFORME DE AGENTE</div>
        <div className="mission-title">{student.name.toUpperCase()}</div>
      </div>
      {student.mission_number && <MissionBrief missionNumber={student.mission_number} compact={false}/>}

      <div className="section-divider"><div className="section-divider-line"/><div className="section-divider-label">ENTREGAS POR FASE</div><div className="section-divider-line"/></div>

      {PHASES.map(phase => {
        const sub = submissions.find(s => s.phase === phase.id);
        const fb = feedbacks.find(f => f.phase === phase.id);
        return (
          <div key={phase.id} className="card" style={{ borderLeft:`3px solid ${sub?phase.color:'var(--border2)'}`, marginBottom:12 }}>
            <div style={{ fontFamily:'var(--mono)', fontSize:10, color:sub?phase.color:'var(--text-dim)', letterSpacing:2, marginBottom:12 }}>
              FASE {phase.id} — {phase.name} {sub?'// TRANSMITIDO':'// PENDIENTE'}
            </div>
            {sub ? (
              <>
                {sub.image_url && <img src={sub.image_url} alt={phase.id} style={{ width:'100%', maxHeight:280, objectFit:'contain', borderRadius:2, marginBottom:12, border:'1px solid var(--border2)' }}/>}
                {phase.questions.map(q => (
                  <div key={q.key} style={{ marginBottom:12 }}>
                    <div style={{ fontFamily:'var(--mono)', fontSize:9, color:'var(--text-dim)', letterSpacing:1, marginBottom:4 }}>{q.label}</div>
                    <div style={{ fontFamily:'var(--body)', fontSize:14, color:'var(--text)', lineHeight:1.5, background:'var(--bg3)', padding:'8px 12px', borderRadius:2 }}>
                      {sub.answers?.[q.key] || '—'}
                    </div>
                  </div>
                ))}
                <CommanderFeedbackForm
                  studentId={student.id}
                  missionId={sub.mission_id}
                  phase={phase}
                  existingFeedback={fb || null}
                  onSaved={(saved) => onFeedbackSaved(phase.id, saved)}
                />
              </>
            ) : (
              <div style={{ fontFamily:'var(--mono)', fontSize:13, color:'var(--text-dim)' }}>Sin transmisión aún.</div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ─── ADMIN PANEL ───
function AdminPanel({ admin, onLogout }) {
  const [students, setStudents] = useState([]);
  const [submissions, setSubmissions] = useState([]);
  const [feedbacks, setFeedbacks] = useState([]);
  const [missionId] = useState('01');
  const [loading, setLoading] = useState(true);
  const [selectedStudent, setSelectedStudent] = useState(null);
  const [selectedFeedbacks, setSelectedFeedbacks] = useState([]);
  const [view, setView] = useState('dashboard');
  const [toast, setToast] = useState(null);
  const [showCreate, setShowCreate] = useState(false);
  const [newName, setNewName] = useState('');
  const [newMission, setNewMission] = useState('');
  const [creating, setCreating] = useState(false);

  const load = async () => {
    const [{ data: s }, { data: sub }, { data: fb }] = await Promise.all([
      sb.from('students').select('*').order('created_at'),
      sb.from('submissions').select('*').eq('mission_id', missionId),
      sb.from('commander_feedback').select('*').eq('mission_id', missionId),
    ]);
    setStudents(s||[]);
    setSubmissions(sub||[]);
    setFeedbacks(fb||[]);
    setLoading(false);
  };

  useEffect(() => { load(); const int = setInterval(load, 15000); return () => clearInterval(int); }, []);

  const getPhases = (studentId) => new Set(submissions.filter(s => s.student_id === studentId).map(s => s.phase));
  const getFeedbackCount = (studentId) => feedbacks.filter(f => f.student_id === studentId).length;

  const openStudent = (student) => {
    setSelectedStudent(student);
    setSelectedFeedbacks(feedbacks.filter(f => f.student_id === student.id));
    setView('detail');
  };

  const handleFeedbackSaved = (phaseId, saved) => {
    setSelectedFeedbacks(prev => {
      const existing = prev.find(f => f.phase === phaseId);
      if (existing) return prev.map(f => f.phase === phaseId ? { ...f, ...saved } : f);
      return [...prev, { ...saved, phase: phaseId }];
    });
    setFeedbacks(prev => {
      const existing = prev.find(f => f.student_id === selectedStudent.id && f.phase === phaseId);
      if (existing) return prev.map(f => f.student_id === selectedStudent.id && f.phase === phaseId ? { ...f, ...saved } : f);
      return [...prev, { ...saved, phase: phaseId }];
    });
    setToast({ msg: `FEEDBACK FASE ${phaseId} GUARDADO`, type:'success' });
  };

  const deleteStudent = async (student, e) => {
    e.stopPropagation();
    if (!window.confirm(`Eliminar al agente "${student.name}"?\n\nSe borrarán todas sus entregas y feedback.`)) return;
    await sb.from('commander_feedback').delete().eq('student_id', student.id);
    await sb.from('submissions').delete().eq('student_id', student.id);
    await sb.from('students').delete().eq('id', student.id);
    setToast({ msg: `AGENTE ELIMINADO`, type:'success' });
    await load();
  };

  const createAgent = async () => {
    if (!newName.trim()) { setToast({ msg:'INGRESA UN NOMBRE', type:'error' }); return; }
    if (!newMission) { setToast({ msg:'SELECCIONA UNA MISIÓN', type:'error' }); return; }
    if (students.find(s => s.name.toLowerCase() === newName.trim().toLowerCase())) { setToast({ msg:'ESE NOMBRE YA EXISTE', type:'error' }); return; }
    setCreating(true);
    const { data, error } = await sb.from('students').insert({ name: newName.trim(), mission_number: parseInt(newMission) }).select().single();
    setCreating(false);
    if (error) { setToast({ msg:'ERROR AL CREAR AGENTE', type:'error' }); return; }
    setNewName(''); setNewMission(''); setShowCreate(false);
    await load();
    setToast({ msg: `AGENTE "${data.name.toUpperCase()}" CREADO`, type:'success' });
  };

  if (loading) return (
    <div>
      <div className="topbar"><div className="topbar-logo"><div className="dot"/>COMANDANTE</div></div>
      <div className="loading">CARGANDO INTEL</div>
    </div>
  );

  const completedCount = students.filter(s => getPhases(s.id).size === 5).length;
  const totalSubs = submissions.length;
  const totalFb = feedbacks.length;

  return (
    <div>
      <div className="topbar">
        <div className="topbar-logo"><div className="dot"/>PANEL DE COMANDANTE — OP. PANTALLA CLARA</div>
        <div className="topbar-right">
          <span>{admin.name.toUpperCase()}</span>
          <span className="status-pill status-green">EN VIVO</span>
          <button className="btn btn-secondary" style={{ padding:'4px 10px', fontSize:10 }} onClick={onLogout}>SALIR</button>
        </div>
      </div>

      <div className="main">
        {view === 'detail' && selectedStudent ? (
          <StudentDetail
            student={selectedStudent}
            submissions={submissions.filter(s => s.student_id === selectedStudent.id)}
            feedbacks={selectedFeedbacks}
            onBack={() => { setView('dashboard'); load(); }}
            onFeedbackSaved={handleFeedbackSaved}
          />
        ) : view === 'missions' ? (
          <div>
            <button className="btn btn-secondary" style={{ marginBottom:20 }} onClick={() => setView('dashboard')}>← AGENTES</button>
            <div className="mission-header">
              <div className="mission-codename">// MAPA DE MISIONES</div>
              <div className="mission-title">MISIONES <span>ASIGNADAS</span></div>
            </div>
            <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))', gap:8 }}>
              {MISSIONS.map(m => {
                const assignedTo = students.find(s => s.mission_number === m.id);
                return (
                  <div key={m.id} style={{ background:'var(--bg3)', border:`1px solid ${assignedTo?'var(--border)':'rgba(0,200,117,0.2)'}`, borderLeft:`3px solid ${assignedTo?'var(--border2)':'var(--green)'}`, borderRadius:2, padding:'10px 14px', opacity:assignedTo?0.75:1 }}>
                    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:4 }}>
                      <div style={{ fontFamily:'var(--mono)', fontSize:10, fontWeight:700, color:assignedTo?'var(--text-dim)':'var(--green)' }}>M{String(m.id).padStart(2,'0')}</div>
                      <span className={`status-pill ${assignedTo?'status-amber':'status-green'}`} style={{ fontSize:8 }}>{assignedTo?'ASIGNADA':'LIBRE'}</span>
                    </div>
                    <div style={{ fontFamily:'var(--cond)', fontSize:13, fontWeight:700, color:'var(--text-bright)', marginBottom:2 }}>{m.title}</div>
                    {assignedTo && <div style={{ fontFamily:'var(--mono)', fontSize:9, color:'var(--text-dim)' }}>→ {assignedTo.name}</div>}
                  </div>
                );
              })}
            </div>
          </div>
        ) : (
          <>
            <div className="mission-header">
              <div className="mission-codename">// PANEL DE CONTROL // MISIÓN {missionId}</div>
              <div className="mission-title">INTEL <span>GENERAL</span></div>
            </div>

            <div className="intel-grid" style={{ gridTemplateColumns:'repeat(4,1fr)', marginBottom:24 }}>
              <div className="intel-box"><div className="intel-label">AGENTES</div><div className="intel-value">{students.length}</div></div>
              <div className="intel-box"><div className="intel-label">TRANSMISIONES</div><div className="intel-value" style={{ color:'var(--blue)' }}>{totalSubs}</div></div>
              <div className="intel-box"><div className="intel-label">COMPLETAS</div><div className="intel-value" style={{ color:'var(--green)' }}>{completedCount}</div></div>
              <div className="intel-box"><div className="intel-label">FEEDBACKS</div><div className="intel-value" style={{ color:'var(--amber)' }}>{totalFb}</div></div>
            </div>

            <div style={{ display:'flex', gap:12, marginBottom:24, flexWrap:'wrap' }}>
              <button className="btn btn-primary" onClick={() => setShowCreate(true)}>+ CREAR AGENTE</button>
              <button className="btn btn-secondary" onClick={load}>↻ ACTUALIZAR</button>
              <button className="btn btn-secondary" onClick={() => setView('missions')}>⬡ VER MISIONES</button>
            </div>

            {/* CREATE MODAL */}
            {showCreate && (
              <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.7)', zIndex:200, display:'flex', alignItems:'center', justifyContent:'center' }}
                onClick={e => { if(e.target===e.currentTarget) setShowCreate(false); }}>
                <div style={{ width:480, background:'var(--bg2)', border:'1px solid var(--border2)', borderRadius:2, overflow:'hidden', boxShadow:'0 24px 60px rgba(0,0,0,0.5)' }}>
                  <div style={{ padding:'16px 20px', borderBottom:'1px solid var(--border)', background:'var(--bg3)', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                    <div>
                      <div style={{ fontFamily:'var(--mono)', fontSize:9, color:'var(--text-dim)', letterSpacing:2, marginBottom:3 }}>// COMANDANTE</div>
                      <div style={{ fontFamily:'var(--cond)', fontSize:20, fontWeight:700, color:'var(--text-bright)', textTransform:'uppercase', letterSpacing:1 }}>Crear Agente Manual</div>
                    </div>
                    <button className="btn btn-secondary" style={{ padding:'4px 10px', fontSize:10 }} onClick={() => setShowCreate(false)}>✕</button>
                  </div>
                  <div style={{ padding:'24px 20px' }}>
                    <div className="field-group">
                      <label className="field-label">// NOMBRE DEL AGENTE</label>
                      <input type="text" value={newName} onChange={e => setNewName(e.target.value)} placeholder="Nombre completo" onKeyDown={e => e.key==='Enter' && createAgent()} autoFocus/>
                    </div>
                    <div className="field-group">
                      <label className="field-label">// MISIÓN ASIGNADA</label>
                      <div style={{ display:'grid', gridTemplateColumns:'repeat(5,1fr)', gap:6, maxHeight:280, overflowY:'auto', padding:'4px 0' }}>
                        {MISSIONS.map(m => {
                          const taken = students.find(s => s.mission_number === m.id);
                          const selected = newMission == m.id;
                          return (
                            <div key={m.id} onClick={() => !taken && setNewMission(m.id)}
                              style={{ padding:'8px 6px', borderRadius:2, cursor:taken?'not-allowed':'pointer', border:`1px solid ${selected?'var(--green)':taken?'var(--border)':'var(--border2)'}`, background:selected?'rgba(0,200,117,0.12)':taken?'rgba(255,255,255,0.02)':'var(--bg3)', opacity:taken?0.45:1, textAlign:'center', transition:'all 0.12s' }}>
                              <div style={{ fontFamily:'var(--mono)', fontSize:11, fontWeight:700, color:selected?'var(--green)':taken?'var(--text-dim)':'var(--text-bright)', marginBottom:3 }}>{String(m.id).padStart(2,'0')}</div>
                              <div style={{ fontFamily:'var(--body)', fontSize:9, color:'var(--text-dim)', lineHeight:1.2, wordBreak:'break-word' }}>{m.title.split(' · ')[0]}</div>
                              {taken && <div style={{ fontFamily:'var(--mono)', fontSize:7, color:'var(--amber)', marginTop:2 }}>TOMADA</div>}
                            </div>
                          );
                        })}
                      </div>
                      {newMission && (
                        <div style={{ marginTop:10, padding:'10px 14px', background:'rgba(0,200,117,0.06)', border:'1px solid rgba(0,200,117,0.2)', borderRadius:2 }}>
                          <div style={{ fontFamily:'var(--mono)', fontSize:9, color:'var(--green)', letterSpacing:1, marginBottom:4 }}>MISIÓN SELECCIONADA</div>
                          <div style={{ fontFamily:'var(--cond)', fontSize:14, fontWeight:700, color:'var(--text-bright)' }}>{MISSIONS.find(m => m.id==newMission)?.title}</div>
                          <div style={{ fontFamily:'var(--body)', fontSize:11, color:'var(--text-dim)', marginTop:2 }}>{MISSIONS.find(m => m.id==newMission)?.mission}</div>
                        </div>
                      )}
                    </div>
                    <div style={{ display:'flex', gap:10, justifyContent:'flex-end' }}>
                      <button className="btn btn-secondary" onClick={() => setShowCreate(false)}>CANCELAR</button>
                      <button className="btn btn-primary" onClick={createAgent} disabled={creating || !newName.trim() || !newMission}>
                        {creating ? 'CREANDO...' : '→ CREAR AGENTE'}
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            )}

            <div className="section-divider"><div className="section-divider-line"/><div className="section-divider-label">ESTADO POR AGENTE</div><div className="section-divider-line"/></div>

            <div className="admin-grid">
              {students.map(student => {
                const phases = getPhases(student.id);
                const fbCount = getFeedbackCount(student.id);
                return (
                  <div key={student.id} className="student-card" style={{ cursor:'pointer' }} onClick={() => openStudent(student)}>
                    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8 }}>
                      <div className="student-card-name" style={{ marginBottom:0 }}>{student.name}</div>
                      <button className="btn btn-danger" style={{ padding:'3px 8px', fontSize:9 }} onClick={e => deleteStudent(student, e)}>✕</button>
                    </div>
                    {student.mission_number && (
                      <div style={{ fontFamily:'var(--mono)', fontSize:9, color:'var(--amber)', marginBottom:6, background:'rgba(255,179,0,0.06)', border:'1px solid rgba(255,179,0,0.2)', borderRadius:2, padding:'3px 8px', display:'inline-block' }}>
                        M{String(student.mission_number).padStart(2,'0')} · {MISSIONS.find(m=>m.id===student.mission_number)?.title||''}
                      </div>
                    )}
                    <div className="phase-dots">
                      {PHASES.map(p => {
                        const done = phases.has(p.id);
                        const hasFb = feedbacks.find(f => f.student_id === student.id && f.phase === p.id);
                        return (
                          <div key={p.id} className={`phase-dot ${done?'done':''} ${done&&hasFb?'reviewed':''}`}
                            style={done&&hasFb?{background:'rgba(255,179,0,0.15)',borderColor:'var(--amber)',color:'var(--amber)'}:done?{background:`rgba(0,200,117,0.15)`,borderColor:p.color,color:p.color}:{}}>
                            {p.id}
                          </div>
                        );
                      })}
                    </div>
                    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                      <span style={{ fontFamily:'var(--mono)', fontSize:10, color:'var(--text-dim)' }}>{phases.size}/5 fases</span>
                      {fbCount > 0 && (
                        <span className="status-pill status-amber" style={{ fontSize:9 }}>
                          {fbCount}/5 feedback
                        </span>
                      )}
                    </div>
                  </div>
                );
              })}
              {students.length === 0 && (
                <div style={{ fontFamily:'var(--mono)', fontSize:13, color:'var(--text-dim)', padding:20 }}>Esperando agentes...</div>
              )}
            </div>
          </>
        )}
      </div>
      {toast && <Toast msg={toast.msg} type={toast.type} onDone={() => setToast(null)}/>}
    </div>
  );
}

// ─── LOGIN ───
function LoginScreen({ onLogin }) {
  const [name, setName] = useState('');
  const [role, setRole] = useState('student');
  const [adminCode, setAdminCode] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const handleEnter = async () => {
    if (!name.trim()) { setError('Ingresa tu nombre de agente'); return; }
    if (role === 'admin' && adminCode !== ADMIN_CODE) { setError('Código de comandante incorrecto'); return; }
    setLoading(true);
    if (role === 'admin') { onLogin({ id:'admin', name:name.trim(), role:'admin' }); return; }
    const { data: existing } = await sb.from('students').select('*').eq('name', name.trim()).limit(1);
    if (existing && existing.length > 0) {
      onLogin({ ...existing[0], role:'student' });
    } else {
      const { data: allStudents } = await sb.from('students').select('mission_number');
      const usedNums = (allStudents||[]).map(s=>s.mission_number).filter(Boolean);
      const available = MISSIONS.map(m=>m.id).filter(id=>!usedNums.includes(id));
      const missionNumber = available.length > 0 ? available[Math.floor(Math.random()*available.length)] : MISSIONS[Math.floor(Math.random()*MISSIONS.length)].id;
      const { data, error: err } = await sb.from('students').insert({ name: name.trim(), mission_number: missionNumber }).select().single();
      if (err) { setError('Error al registrar agente.'); setLoading(false); return; }
      onLogin({ ...data, role:'student' });
    }
  };

  return (
    <div className="login-screen">
      <div className="login-bg"/>
      <div style={{ fontFamily:'Share Tech Mono', fontSize:10, color:'var(--text-dim)', letterSpacing:4, marginBottom:24, textAlign:'center' }}>◈ SISTEMA TÁCTICO DE DISEÑO ◈</div>
      <div className="login-card">
        <div className="login-top-stripe"/>
        <div style={{ fontFamily:'var(--mono)', fontSize:10, color:'var(--text-dim)', letterSpacing:3, marginBottom:8 }}>// OPERACIÓN</div>
        <div className="login-title">PANTALLA <span className="accent">CLARA</span></div>
        <div style={{ fontFamily:'var(--mono)', fontSize:11, color:'var(--text-dim)', marginTop:8, marginBottom:28, lineHeight:1.6 }}>
          Una pantalla. Una decisión.<br/>Si el usuario duda, la misión fracasa.
        </div>
        <div style={{ height:1, background:'var(--border)', marginBottom:20 }}/>
        <div style={{ marginBottom:16 }}>
          <span className="field-label">// SELECCIONA TU ROL</span>
          <div className="role-select">
            <div className={`role-btn ${role==='student'?'selected':''}`} onClick={() => setRole('student')}>◈ AGENTE</div>
            <div className={`role-btn ${role==='admin'?'selected':''}`} onClick={() => setRole('admin')}>⬡ COMANDANTE</div>
          </div>
        </div>
        <div className="field-group">
          <label className="field-label">// NOMBRE DE AGENTE</label>
          <input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="Tu nombre completo" onKeyDown={e=>e.key==='Enter'&&handleEnter()}/>
        </div>
        {role==='admin' && (
          <div className="field-group">
            <label className="field-label">// CÓDIGO DE COMANDANTE</label>
            <input type="text" value={adminCode} onChange={e=>setAdminCode(e.target.value)} placeholder="Código de acceso" onKeyDown={e=>e.key==='Enter'&&handleEnter()}/>
          </div>
        )}
        {error && <div style={{ fontFamily:'var(--mono)', fontSize:11, color:'var(--red)', marginBottom:12 }}>⚠ {error}</div>}
        <button className="btn btn-primary" style={{ width:'100%', justifyContent:'center' }} onClick={handleEnter} disabled={loading}>
          {loading ? 'VERIFICANDO...' : '→ INGRESAR A LA OPERACIÓN'}
        </button>
      </div>
      <div style={{ fontFamily:'Share Tech Mono', fontSize:9, color:'var(--text-dim)', letterSpacing:2, marginTop:20, textAlign:'center' }}>MÉTODO C.L.E.A.R. // COLORIPOP</div>
    </div>
  );
}

// ─── APP ROOT ───
function App() {
  const [user, setUser] = useState(() => {
    try { const s = localStorage.getItem('opc_v2_user'); return s ? JSON.parse(s) : null; }
    catch { return null; }
  });
  const handleLogin = (u) => { localStorage.setItem('opc_v2_user', JSON.stringify(u)); setUser(u); };
  const handleLogout = () => { localStorage.removeItem('opc_v2_user'); setUser(null); };
  if (!user) return <LoginScreen onLogin={handleLogin}/>;
  if (user.role === 'admin') return <AdminPanel admin={user} onLogout={handleLogout}/>;
  return <StudentApp student={user} onLogout={handleLogout}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
