<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tabla Periódica — Bingo de Acrónimos</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="shared/styles.css"/>
<style>
  .wrap{max-width:1200px;margin:0 auto;padding:0 1.4rem 4rem;display:flex;flex-direction:column;gap:1.4rem}
  .header-row{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;flex-wrap:wrap;padding-top:.4rem}
  .page-title{font-family:var(--f-display);font-size:clamp(28px,5vw,52px);font-weight:800;letter-spacing:-1.5px;line-height:1.05}

  /* search */
  .search-box{position:relative;flex:1;min-width:200px;max-width:340px}
  .search-box input{
    width:100%;background:var(--surface);border:1.5px solid var(--border);
    border-radius:var(--r-pill);color:var(--text);font-family:var(--f-body);
    font-size:14px;padding:10px 18px 10px 40px;outline:none;
    transition:border-color .2s, background .2s;
  }
  .search-box input::placeholder{color:var(--faint)}
  .search-box input:focus{border-color:var(--border-strong)}
  .search-box svg{
    position:absolute;left:14px;top:50%;transform:translateY(-50%);
    width:16px;height:16px;opacity:.4;pointer-events:none;
  }

  /* category filters */
  .filters{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
  .f-all{
    border:none;padding:6px 16px;border-radius:var(--r-pill);
    font-size:11px;font-weight:700;cursor:pointer;font-family:var(--f-body);
    background:var(--text);color:var(--bg);transition:transform .15s, opacity .2s;
  }
  .f-all:hover{transform:scale(1.05)}
  .f-all.off{background:transparent;color:var(--faint);border:1.5px solid var(--border)}
  .f-cat{
    border:1.5px solid transparent;padding:6px 14px;border-radius:var(--r-pill);
    font-size:11px;font-weight:700;cursor:pointer;font-family:var(--f-body);
    transition:transform .15s, opacity .2s;
  }
  .f-cat:hover{transform:scale(1.05)}
  .f-cat.ghost{background:transparent !important; color:var(--faint) !important}

  .count{text-align:center;font-family:var(--f-mono);font-size:11px;color:var(--faint)}

  /* periodic-table grid */
  .pt-outer{
    overflow-x:auto;
    padding:6px 0 12px;
    display:flex;justify-content:center;
  }
  .pt-grid{
    display:grid;
    grid-template-columns:repeat(var(--cols, 10), minmax(78px, 1fr));
    grid-auto-rows:minmax(72px, 84px);
    gap:6px;
    width:100%;
    max-width:1100px;
  }
  @media(max-width:900px){
    .pt-grid{
      grid-template-columns:repeat(var(--cols, 10), 70px);
      grid-auto-rows:64px;
    }
  }

  .pt-card{
    border-radius:9px;
    padding:8px 5px 7px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;cursor:pointer;position:relative;
    transition:transform .18s, opacity .25s, box-shadow .2s, filter .25s;
    user-select:none;
    overflow:hidden;
  }
  .pt-card:hover{transform:scale(1.08);box-shadow:0 8px 24px rgba(0,0,0,.5);z-index:5}
  .pt-card.dim{opacity:.10;pointer-events:none;filter:grayscale(.4)}
  .pt-num{
    font-family:var(--f-mono);font-size:8px;opacity:.55;
    position:absolute;top:5px;left:7px;letter-spacing:.5px;
  }
  .pt-acro{font-family:var(--f-mono);font-size:15px;font-weight:700;line-height:1;margin-bottom:4px;letter-spacing:-.5px}
  .pt-name{font-size:8.5px;font-weight:500;line-height:1.3;opacity:.88;padding:0 2px}
  @media(min-width:1100px){
    .pt-acro{font-size:16px}
    .pt-name{font-size:9px}
  }

  /* legend */
  .legend{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;padding-top:6px}
  .legend-chip{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);font-weight:500}
  .legend-chip i{width:11px;height:11px;border-radius:3px;display:inline-block}

  /* modal */
  .modal-content{display:flex;flex-direction:column;gap:14px;max-width:480px}
  .modal-tag{
    display:inline-flex;align-items:center;width:fit-content;
    padding:5px 14px;border-radius:var(--r-pill);
    font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;
  }
  .modal-acro{
    font-family:var(--f-mono);font-size:54px;font-weight:700;line-height:1;
    letter-spacing:-2px;color:var(--text);
  }
  .modal-full{font-size:16px;font-weight:600;color:var(--muted);line-height:1.3}
  .modal-desc{font-size:14px;color:var(--text);line-height:1.6;opacity:.85}
  .modal-num{
    font-family:var(--f-mono);font-size:11px;color:var(--faint);
    letter-spacing:1px;
  }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="page">

  <header class="topbar">
    <a class="brand" href="index.html" style="text-decoration:none">
      <div class="brand-mark"></div>
      <span id="brand-name">Acronym Bingo</span>
    </a>
    <div class="topbar-right">
      <a class="btn btn-sm btn-ghost" href="index.html" id="btn-back">← Hub</a>
      <div class="lang-wrap">
        <button class="lang-btn active" id="btn-es" onclick="setLang('es')">ES</button>
        <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
      </div>
    </div>
  </header>

  <main class="wrap">

    <div class="header-row">
      <div class="col" style="gap:6px;max-width:560px">
        <span class="label" id="lbl-role"></span>
        <h1 class="page-title" id="page-title"></h1>
        <span style="font-size:14px;color:var(--muted);line-height:1.5" id="page-sub"></span>
      </div>
      <div class="search-box">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor">
          <circle cx="8.5" cy="8.5" r="5.5" stroke-width="2"/>
          <line x1="12.5" y1="12.5" x2="17" y2="17" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input type="text" id="search" oninput="doFilter()"/>
      </div>
    </div>

    <div class="filters" id="filters"></div>
    <div class="count" id="count"></div>

    <div class="pt-outer">
      <div class="pt-grid" id="grid"></div>
    </div>

    <div class="legend" id="legend"></div>

  </main>
</div>

<!-- modal -->
<div class="overlay" id="overlay" onclick="if(event.target===this) closeModal()">
  <div class="overlay-box modal-content" id="modal-box">
    <div class="row between" style="align-items:center">
      <span class="modal-tag" id="m-tag">CAT</span>
      <span class="modal-num" id="m-num">#01</span>
    </div>
    <div style="display:flex;flex-direction:column;gap:4px">
      <div class="modal-acro" id="m-acro">—</div>
      <div class="modal-full" id="m-full">—</div>
    </div>
    <div class="modal-desc" id="m-desc">—</div>
    <div class="row" style="justify-content:flex-end;padding-top:6px">
      <button class="btn btn-sm btn-ghost" onclick="closeModal()" id="m-close">Cerrar</button>
    </div>
  </div>
</div>

<script src="shared/data.js"></script>
<script src="shared/translations.js"></script>
<script>
let lang = localStorage.getItem('bingo-lang') || 'es';
let activeCats = new Set(Object.keys(CATS));
let allActive = true;
let searchQuery = '';

function setLang(l){
  lang = l;
  localStorage.setItem('bingo-lang', l);
  document.getElementById('btn-es').classList.toggle('active', l==='es');
  document.getElementById('btn-en').classList.toggle('active', l==='en');
  document.documentElement.lang = l;
  apply();
}

function apply(){
  const t = T[lang];
  document.getElementById('brand-name').textContent = t.appName;
  document.getElementById('lbl-role').textContent = lang==='es' ? 'Glosario' : 'Glossary';
  document.getElementById('page-title').textContent = lang==='es' ? 'Tabla Periódica de Acrónimos' : 'Periodic Table of Acronyms';
  document.getElementById('page-sub').textContent = lang==='es'
    ? 'Toca cualquier acrónimo para ver su definición. Filtra por categoría o busca por nombre.'
    : 'Tap any acronym to see its definition. Filter by category or search by name.';
  document.getElementById('search').placeholder = lang==='es' ? 'Buscar acrónimo o nombre…' : 'Search acronym or name…';
  document.getElementById('btn-back').textContent = t.backHome;
  document.getElementById('m-close').textContent = lang==='es' ? 'Cerrar' : 'Close';
  renderFilters();
  renderGrid();
  renderLegend();
}

function renderFilters(){
  const el = document.getElementById('filters');
  let html = `<button class="f-all ${allActive?'':'off'}" onclick="toggleAll()">${lang==='es'?'Todos':'All'}</button>`;
  Object.entries(CATS).forEach(([key, c])=>{
    const on = activeCats.has(key);
    html += `<button class="f-cat ${on?'':'ghost'}" style="background:${c.bg};color:${c.text};border-color:${c.bg}" onclick="toggleCat('${key}')">${c.label[lang]}</button>`;
  });
  el.innerHTML = html;
}

function toggleAll(){
  if(allActive){ activeCats.clear(); allActive=false; }
  else { activeCats = new Set(Object.keys(CATS)); allActive=true; }
  renderFilters(); renderGrid();
}
function toggleCat(key){
  if(activeCats.has(key)) activeCats.delete(key);
  else activeCats.add(key);
  allActive = activeCats.size === Object.keys(CATS).length;
  renderFilters(); renderGrid();
}

function doFilter(){
  searchQuery = document.getElementById('search').value.trim().toLowerCase();
  renderGrid();
}

function renderGrid(){
  const grid = document.getElementById('grid');
  grid.style.setProperty('--cols', PT_LAYOUT.cols);
  let visible = 0;
  grid.innerHTML = ACRONYMS.map((item, i)=>{
    const c = CATS[item.cat];
    const matchCat = activeCats.has(item.cat);
    const matchSearch = !searchQuery
      || item.a.toLowerCase().includes(searchQuery)
      || item.f.toLowerCase().includes(searchQuery);
    const dim = !(matchCat && matchSearch);
    if(!dim) visible++;
    // grid is 1-indexed; col/row start at 0
    const gridCol = item.col + 1;
    const gridRow = item.row + 1;
    return `<div class="pt-card ${dim?'dim':''}" style="background:${c.bg};color:${c.text};grid-column:${gridCol};grid-row:${gridRow}" onclick="openModal(${i})">
      <span class="pt-num" style="color:${c.text}">${String(i+1).padStart(2,'0')}</span>
      <div class="pt-acro">${item.a}</div>
      <div class="pt-name">${item.f}</div>
    </div>`;
  }).join('');
  document.getElementById('count').textContent = lang==='es'
    ? `${visible} de ${ACRONYMS.length} acrónimos`
    : `${visible} of ${ACRONYMS.length} acronyms`;
}

function renderLegend(){
  const el = document.getElementById('legend');
  el.innerHTML = Object.entries(CATS).map(([key,c])=>{
    return `<span class="legend-chip"><i style="background:${c.bg}"></i>${c.label[lang]}</span>`;
  }).join('');
}

function openModal(i){
  const item = ACRONYMS[i];
  const c = CATS[item.cat];
  document.getElementById('m-tag').textContent = c.label[lang];
  document.getElementById('m-tag').style.background = c.bg;
  document.getElementById('m-tag').style.color = c.text;
  document.getElementById('m-num').textContent = '#' + String(i+1).padStart(2,'0');
  document.getElementById('m-acro').textContent = item.a;
  document.getElementById('m-acro').style.color = c.bg;
  document.getElementById('m-full').textContent = item.f;
  document.getElementById('m-desc').textContent = item[lang];
  document.getElementById('overlay').classList.add('show');
}
function closeModal(){ document.getElementById('overlay').classList.remove('show'); }

document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

setLang(lang);
</script>
</body>
</html>
