<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bingo de Acrónimos</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="shared/styles.css"/>
<style>
  .hub-wrap{max-width:980px;margin:0 auto;padding:0 1.4rem 4rem;display:flex;flex-direction:column;gap:2.5rem}
  .hub-hero{padding:3rem 0 1rem;text-align:center;display:flex;flex-direction:column;gap:.5rem;align-items:center}
  .hub-hero .hero-title{max-width:18ch}
  .hub-hero .hero-sub{max-width:48ch}

  .room-card{
    display:flex;align-items:center;gap:14px;flex-wrap:wrap;
    padding:1.4rem 1.6rem;justify-content:space-between;
  }
  .room-input-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .room-code-input{
    width:120px;text-align:center;
  }

  /* role grid */
  .roles{
    display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;
  }
  @media(max-width:760px){.roles{grid-template-columns:1fr}}

  .role{
    position:relative;
    padding:2rem 1.6rem;
    border-radius:var(--r-lg);
    border:1.5px solid var(--border);
    background:var(--surface);
    cursor:pointer;
    transition:transform .2s, border-color .2s, background .2s;
    display:flex;flex-direction:column;gap:14px;
    min-height:240px;
    text-decoration:none;color:inherit;
    overflow:hidden;
  }
  .role:hover{transform:translateY(-4px);border-color:var(--border-strong);background:var(--surface-strong)}
  .role-icon{
    width:54px;height:54px;border-radius:14px;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--f-mono);font-size:18px;font-weight:700;
  }
  .role-name{font-family:var(--f-display);font-size:30px;font-weight:800;letter-spacing:-1px}
  .role-desc{font-size:13px;color:var(--muted);line-height:1.5}
  .role-arrow{
    position:absolute;bottom:1.4rem;right:1.4rem;
    width:36px;height:36px;border-radius:50%;
    background:var(--surface-strong);
    display:flex;align-items:center;justify-content:center;
    transition:transform .2s, background .2s;
  }
  .role:hover .role-arrow{transform:translateX(4px);background:var(--text);color:var(--bg)}

  .role.player{background:linear-gradient(135deg, rgba(131,67,207,.18), rgba(131,67,207,.04))}
  .role.player .role-icon{background:#8343cf;color:#f0e8ff}
  .role.caller{background:linear-gradient(135deg, rgba(244,214,4,.16), rgba(244,214,4,.04))}
  .role.caller .role-icon{background:#f4d604;color:#2a2200}
  .role.verify{background:linear-gradient(135deg, rgba(74,235,219,.16), rgba(74,235,219,.04))}
  .role.verify .role-icon{background:#4aebdb;color:#003330}
  .role.table-role{background:linear-gradient(135deg, rgba(240,59,114,.18), rgba(240,59,114,.04))}
  .role.table-role .role-icon{background:#f03b72;color:#fff0f4}
  @media(max-width:1000px){.roles{grid-template-columns:repeat(2,1fr) !important}}
  @media(max-width:560px){.roles{grid-template-columns:1fr !important}}

  /* active rooms list */
  .rooms-section{display:flex;flex-direction:column;gap:.8rem}
  .rooms-list{display:flex;flex-direction:column;gap:6px}
  .room-row{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:.85rem 1.1rem;
    border:1.5px solid var(--border);border-radius:var(--r-md);
    background:var(--surface);
    transition:background .2s, border-color .2s;
  }
  .room-row:hover{background:var(--surface-strong);border-color:var(--border-strong)}
  .room-row .code{
    font-family:var(--f-mono);font-size:18px;font-weight:700;letter-spacing:3px;
  }
  .room-row .meta{font-size:12px;color:var(--muted);display:flex;gap:14px;flex-wrap:wrap}
  .room-row .meta .pill{padding:3px 10px;font-size:10px}
  .room-row-actions{display:flex;gap:6px}

  /* footer rules */
  .rules-card{display:flex;flex-direction:column;gap:6px;padding:1.4rem 1.6rem}
  .rules-card .rules-title{font-family:var(--f-display);font-size:20px;font-weight:800}
  .rules-card .rules-body{font-size:13px;color:var(--muted);line-height:1.6}
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="page">

  <header class="topbar">
    <div class="brand">
      <div class="brand-mark"></div>
      <span id="brand-name">Acronym Bingo</span>
    </div>
    <div class="topbar-right">
      <div class="lang-wrap">
        <button class="lang-btn active" id="btn-es" onclick="setLang('es')">ES</button>
        <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
      </div>
    </div>
  </header>

  <main class="hub-wrap">

    <section class="hub-hero fade-up">
      <div class="hero-title" id="hero-title"></div>
      <div class="hero-sub" id="hero-sub"></div>
    </section>

    <!-- room code entry -->
    <section class="surface-card room-card fade-up" style="animation-delay:.05s">
      <div class="col" style="gap:4px">
        <div class="label" id="lbl-room"></div>
        <div class="row" style="gap:6px">
          <input class="input input-mono room-code-input" id="room-code" maxlength="4" placeholder="XXXX" autocomplete="off"/>
          <span style="font-size:11px;color:var(--faint);font-family:var(--f-mono)">↳ <span id="lbl-share"></span></span>
        </div>
      </div>
      <div class="row" style="gap:8px;flex-wrap:wrap">
        <button class="btn btn-ghost" onclick="createNewRoom()" id="btn-create"></button>
      </div>
    </section>

    <!-- 4 roles -->
    <section class="roles" style="grid-template-columns:repeat(4,1fr)">
      <a class="role player" href="player.html" id="role-player" data-role="player">
        <div class="role-icon">P</div>
        <div class="col" style="gap:6px">
          <div class="role-name" id="role-player-name"></div>
          <div class="role-desc" id="role-player-desc"></div>
        </div>
        <div class="role-arrow">→</div>
      </a>
      <a class="role caller" href="caller.html" id="role-caller" data-role="caller">
        <div class="role-icon">C</div>
        <div class="col" style="gap:6px">
          <div class="role-name" id="role-caller-name"></div>
          <div class="role-desc" id="role-caller-desc"></div>
        </div>
        <div class="role-arrow">→</div>
      </a>
      <a class="role verify" href="verify.html" id="role-verify" data-role="verify">
        <div class="role-icon">✓</div>
        <div class="col" style="gap:6px">
          <div class="role-name" id="role-verify-name"></div>
          <div class="role-desc" id="role-verify-desc"></div>
        </div>
        <div class="role-arrow">→</div>
      </a>
      <a class="role table-role" href="table.html" id="role-table" data-role="table">
        <div class="role-icon">⌗</div>
        <div class="col" style="gap:6px">
          <div class="role-name" id="role-table-name"></div>
          <div class="role-desc" id="role-table-desc"></div>
        </div>
        <div class="role-arrow">→</div>
      </a>
    </section>

    <!-- active rooms -->
    <section class="rooms-section fade-up" style="animation-delay:.15s">
      <div class="row between">
        <div class="label" id="lbl-active"></div>
        <span class="pill" id="pill-count">0</span>
      </div>
      <div class="rooms-list" id="rooms-list"></div>
    </section>

    <!-- rules -->
    <section class="surface-card rules-card fade-up" style="animation-delay:.25s">
      <div class="rules-title" id="rules-title"></div>
      <div class="rules-body" id="rules-body"></div>
    </section>

  </main>
</div>

<script src="shared/data.js"></script>
<script src="shared/translations.js"></script>
<script src="shared/sync.js"></script>
<script>
let lang = localStorage.getItem('bingo-lang') || 'es';
const codeInput = document.getElementById('room-code');

function setLang(l, silent){
  lang = l;
  localStorage.setItem('bingo-lang', l);
  document.getElementById('btn-es').classList.toggle('active', l==='es');
  document.getElementById('btn-en').classList.toggle('active', l==='en');
  document.documentElement.lang = l;
  apply();
}

function apply(){
  const t = T[lang];
  document.getElementById('brand-name').textContent = t.appName;
  document.getElementById('hero-title').innerHTML =
    lang==='es'
      ? '<span class="accent">Bingo</span> de Acrónimos'
      : 'Acronym <span class="accent">Bingo</span>';
  document.getElementById('hero-sub').textContent = t.hubSub;
  document.getElementById('lbl-room').textContent = t.roomCode;
  document.getElementById('lbl-share').textContent = lang==='es' ? 'comparte el código con tus jugadores' : 'share code with your players';
  document.getElementById('btn-create').textContent = '+ ' + t.createRoom;
  document.getElementById('role-player-name').textContent = t.rolePlayer;
  document.getElementById('role-player-desc').textContent = t.rolePlayerDesc;
  document.getElementById('role-caller-name').textContent = t.roleCaller;
  document.getElementById('role-caller-desc').textContent = t.roleCallerDesc;
  document.getElementById('role-verify-name').textContent = t.roleVerify;
  document.getElementById('role-verify-desc').textContent = t.roleVerifyDesc;
  document.getElementById('role-table-name').textContent = lang==='es' ? 'Tabla' : 'Table';
  document.getElementById('role-table-desc').textContent = lang==='es' ? 'Glosario completo de acrónimos' : 'Full acronym glossary';
  document.getElementById('lbl-active').textContent = t.activeRooms;
  document.getElementById('rules-title').textContent = t.rules;
  document.getElementById('rules-body').textContent = t.rulesText;
  refreshRooms();
  syncRoleLinks();
}

codeInput.addEventListener('input', e=>{
  e.target.value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,4);
  localStorage.setItem('bingo-current-room', e.target.value);
  syncRoleLinks();
});

function syncRoleLinks(){
  const code = codeInput.value.trim();
  const q = code ? '?room='+code : '';
  document.getElementById('role-player').href = 'player.html'+q;
  document.getElementById('role-caller').href = 'caller.html'+q;
  document.getElementById('role-verify').href = 'verify.html'+q;
  document.getElementById('role-table').href = 'table.html';
}

function createNewRoom(){
  const code = Sync.createRoom({lang});
  codeInput.value = code;
  localStorage.setItem('bingo-current-room', code);
  syncRoleLinks();
  refreshRooms();
  // auto-jump to caller
  setTimeout(()=>{ window.location.href = 'caller.html?room='+code; }, 200);
}

function refreshRooms(){
  const t = T[lang];
  const rooms = Sync.listRooms().sort((a,b)=>b.updatedAt-a.updatedAt);
  document.getElementById('pill-count').textContent = rooms.length;
  const list = document.getElementById('rooms-list');
  if(rooms.length === 0){
    list.innerHTML = `<div style="font-size:13px;color:var(--faint);padding:1rem;text-align:center">${t.noRooms}</div>`;
    return;
  }
  list.innerHTML = rooms.map(r=>{
    const players = Object.keys(r.players||{}).length;
    const ago = formatAgo(Date.now()-r.updatedAt);
    return `
      <div class="room-row">
        <div class="row" style="gap:14px;flex-wrap:wrap">
          <div class="code">${r.code}</div>
          <div class="meta">
            <span>👥 ${players}</span>
            <span>🎱 ${r.called.length}</span>
            <span>${ago}</span>
          </div>
        </div>
        <div class="room-row-actions">
          <a class="btn btn-sm btn-ghost" href="caller.html?room=${r.code}">${t.roleCaller}</a>
          <a class="btn btn-sm btn-primary" href="player.html?room=${r.code}">${t.rolePlayer}</a>
        </div>
      </div>`;
  }).join('');
}

function formatAgo(ms){
  const s = Math.floor(ms/1000);
  if(s < 60) return s+'s';
  const m = Math.floor(s/60);
  if(m < 60) return m+'m';
  const h = Math.floor(m/60);
  return h+'h';
}

// init
const last = localStorage.getItem('bingo-current-room');
if(last) codeInput.value = last;
setLang(lang, true);
syncRoleLinks();
setInterval(refreshRooms, 3000);
</script>
</body>
</html>
