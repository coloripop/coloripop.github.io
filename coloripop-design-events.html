<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>coloripop · Eventos de Diseño</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,900;1,900&family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&display=swap" rel="stylesheet">
<style>
/* ─── RESET ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body { font-family: 'Inter', sans-serif; transition: background .3s, color .3s; min-height: 100vh; }

/* ─── THEMES ─── */
:root {
  --purple: #4A3AFF;
  --navy:   #211F54;
  --pink:   #FE81E7;
  --lav:    #B5AFFF;
  --lavl:   #E2E0FF;
  --lavll:  #EEEDFE;
}

/* LIGHT (default) */
[data-theme="light"] {
  --bg:        #FFFFFF;
  --bg2:       #F8F7FF;
  --bg3:       #F2F0FF;
  --surface:   #FFFFFF;
  --border:    #E2E0FF;
  --border2:   #C8C4F0;
  --text:      #211F54;
  --text2:     #5550A0;
  --text3:     #9994CC;
  --muted:     #B5AFFF;
  --accent:    #4A3AFF;
  --accent-h:  #211F54;
  --today-bg:  #EEEDFE;
  --other-bg:  #FAFAFA;
  --other-num: #D0CEFF;
  --num-color: #211F54;
  --num-op:    0.055;
  --today-num-op: 0.13;
  --shadow:    0 4px 24px rgba(74,58,255,.12);
  --shadow-lg: 0 12px 48px rgba(74,58,255,.18);
  /* category colors */
  --ux-bg:#DDDAFF;   --ux-border:#4A3AFF;   --ux-text:#2D20CC;
  --gr-bg:#FBEAF0;   --gr-border:#D4537E;   --gr-text:#7A1A40;
  --tc-bg:#D1F0E6;   --tc-border:#1D9E75;   --tc-text:#0A5C3E;
  --mo-bg:#FDE8C8;   --mo-border:#BA7517;   --mo-text:#7A3D00;
  --re-bg:#E6F1FB;   --re-border:#378ADD;   --re-text:#0C447C;
  /* tag colors */
  --tag-online-bg:#D1F0E6; --tag-online-text:#0A5C3E;
  --tag-pres-bg:#FDE8C8;   --tag-pres-text:#7A3D00;
  --tag-free-bg:#DDDAFF;   --tag-free-text:#2D20CC;
  --tag-paid-bg:#F0EFF8;   --tag-paid-text:#211F54; --tag-paid-border:#C8C4F0;
}

/* DARK */
[data-theme="dark"] {
  --bg:        #0E0D1F;
  --bg2:       #15132B;
  --bg3:       #1C1A38;
  --surface:   #1A1834;
  --border:    #2E2A5A;
  --border2:   #4A3AFF44;
  --text:      #E8E6FF;
  --text2:     #B5AFFF;
  --text3:     #7A74CC;
  --muted:     #5550A0;
  --accent:    #7A6EFF;
  --accent-h:  #B5AFFF;
  --today-bg:  #211F54;
  --other-bg:  #110F22;
  --other-num: #2E2A5A;
  --num-color: #B5AFFF;
  --num-op:    0.09;
  --today-num-op: 0.25;
  --shadow:    0 4px 24px rgba(0,0,0,.4);
  --shadow-lg: 0 12px 48px rgba(0,0,0,.6);
  --ux-bg:#1E1A4A;   --ux-border:#7A6EFF;   --ux-text:#B5AFFF;
  --gr-bg:#2A1222;   --gr-border:#D4537E;   --gr-text:#F4C0D1;
  --tc-bg:#0A2018;   --tc-border:#1D9E75;   --tc-text:#9FE1CB;
  --mo-bg:#221500;   --mo-border:#BA7517;   --mo-text:#FAC775;
  --re-bg:#081828;   --re-border:#378ADD;   --re-text:#B5D4F4;
  --tag-online-bg:#0A2018; --tag-online-text:#9FE1CB;
  --tag-pres-bg:#221500;   --tag-pres-text:#FAC775;
  --tag-free-bg:#1E1A4A;   --tag-free-text:#B5AFFF;
  --tag-paid-bg:#15132B;   --tag-paid-text:#B5AFFF; --tag-paid-border:#2E2A5A;
}

/* COLORIPOP (purple dark) */
[data-theme="coloripop"] {
  --bg:        #211F54;
  --bg2:       #2A2768;
  --bg3:       #342F7A;
  --surface:   #2A2768;
  --border:    #4A3AFF44;
  --border2:   #4A3AFF88;
  --text:      #FFFFFF;
  --text2:     #E2E0FF;
  --text3:     #B5AFFF;
  --muted:     #7A74CC;
  --accent:    #FE81E7;
  --accent-h:  #FFFFFF;
  --today-bg:  #4A3AFF;
  --other-bg:  #1A1840;
  --other-num: #342F7A;
  --num-color: #B5AFFF;
  --num-op:    0.12;
  --today-num-op: 0.3;
  --shadow:    0 4px 24px rgba(0,0,0,.4);
  --shadow-lg: 0 12px 60px rgba(74,58,255,.5);
  --ux-bg:#342F7A;   --ux-border:#B5AFFF;   --ux-text:#E2E0FF;
  --gr-bg:#3A1830;   --gr-border:#FE81E7;   --gr-text:#FE81E7;
  --tc-bg:#0D2B20;   --tc-border:#5DCAA5;   --tc-text:#9FE1CB;
  --mo-bg:#2E1E00;   --mo-border:#EF9F27;   --mo-text:#FAC775;
  --re-bg:#0A1E30;   --re-border:#85B7EB;   --re-text:#B5D4F4;
  --tag-online-bg:#0D2B20; --tag-online-text:#9FE1CB;
  --tag-pres-bg:#2E1E00;   --tag-pres-text:#FAC775;
  --tag-free-bg:#342F7A;   --tag-free-text:#E2E0FF;
  --tag-paid-bg:#1A1840;   --tag-paid-text:#B5AFFF; --tag-paid-border:#4A3AFF44;
}

/* ─── LAYOUT ─── */
body { background: var(--bg); color: var(--text); }

.app { max-width: 1100px; margin: 0 auto; padding: 0 1.25rem 3rem; }

/* ─── HEADER ─── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.1rem 0 .9rem;
  border-bottom: 1.5px solid var(--border);
  flex-wrap: wrap;
  gap: .75rem;
}

.brand {
  display: flex;
  align-items: center;
  gap: .5rem;
}
.brand-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--accent);
  display: inline-block;
}
.brand-name {
  font-size: 12px;
  font-weight: 800;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--accent);
}
.brand-sep { color: var(--border2); font-weight: 300; margin: 0 2px; }
.brand-sub { font-size: 11px; font-weight: 500; color: var(--text3); letter-spacing: .04em; }

.header-controls {
  display: flex;
  align-items: center;
  gap: .5rem;
  flex-wrap: wrap;
}

/* Theme switcher */
.theme-switcher {
  display: flex;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.theme-btn {
  background: none;
  border: none;
  padding: 5px 10px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text3);
  transition: all .15s;
  font-family: 'Inter', sans-serif;
  border-right: 1px solid var(--border);
}
.theme-btn:last-child { border-right: none; }
.theme-btn.active, .theme-btn:hover { background: var(--accent); color: #fff; }
[data-theme="coloripop"] .theme-btn.active { color: var(--bg); }

/* Lang switcher */
.lang-switcher {
  display: flex;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.lang-btn {
  background: none;
  border: none;
  padding: 5px 10px;
  cursor: pointer;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .06em;
  color: var(--text3);
  transition: all .15s;
  font-family: 'Inter', sans-serif;
  border-right: 1px solid var(--border);
}
.lang-btn:last-child { border-right: none; }
.lang-btn.active { background: var(--accent); color: #fff; }
.lang-btn:not(.active):hover { background: var(--bg3); color: var(--text); }

/* ─── TOOLBAR ─── */
.toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: .8rem 0;
  gap: .75rem;
  flex-wrap: wrap;
}

.nav-group { display: flex; align-items: center; gap: .5rem; }
.nav-btn {
  background: none;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  width: 32px; height: 32px;
  cursor: pointer;
  font-size: 18px;
  color: var(--accent);
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
  font-family: 'Inter', sans-serif;
}
.nav-btn:hover { background: var(--bg3); border-color: var(--accent); }
.month-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  min-width: 160px;
  text-align: center;
  letter-spacing: .01em;
}

/* Filters */
.filters { display: flex; gap: .3rem; flex-wrap: wrap; align-items: center; }
.fpill {
  font-size: 10px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  transition: all .15s;
  font-family: 'Inter', sans-serif;
}
.fpill.on { background: var(--accent); color: #fff; border-color: var(--accent); }
.fpill:not(.on):hover { background: var(--bg3); border-color: var(--border2); color: var(--text); }

/* ─── CALENDAR TABLE ─── */
.cal-wrap {
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}

.cal {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
  background: var(--surface);
}

/* DOW header */
.dow-row th {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
  padding: 9px 10px 7px;
  background: var(--bg2);
  text-align: left;
}
.dow-row th.mcol { width: 50px; border-right: 1px solid var(--border); }
.dow-row th:last-child { border-right: none; }

/* Week rows */
.wrow td {
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
  vertical-align: top;
  height: 140px;
  padding: 8px 9px 6px;
  position: relative;
  background: var(--surface);
  transition: background .3s;
}
.wrow td:last-child { border-right: none; }
.wrow:last-child td { border-bottom: none; }

.wrow td.mcol {
  width: 50px;
  border-right: 1px solid var(--border);
  background: var(--bg2);
  vertical-align: middle;
  text-align: center;
  padding: 0;
}
.wrow td.other-m { background: var(--other-bg); }
.wrow td.today-c { background: var(--today-bg); }

/* Month side label */
.mside {
  font-size: 8px;
  font-weight: 800;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--muted);
  writing-mode: vertical-rl;
  transform: rotate(180deg);
  white-space: nowrap;
}

/* Big watermark number */
.dnum {
  position: absolute;
  bottom: 0px;
  right: 6px;
  font-size: 80px;
  font-weight: 900;
  font-style: italic;
  font-family: 'Playfair Display', Georgia, serif;
  line-height: 1;
  color: var(--num-color);
  opacity: var(--num-op);
  user-select: none;
  pointer-events: none;
  line-height: .9;
}
.other-m .dnum { opacity: calc(var(--num-op) * 0.5); }
.today-c .dnum { opacity: var(--today-num-op); }

/* ─── EVENT BLOCKS ─── */
.evb {
  position: relative;
  z-index: 2;
  margin-bottom: 5px;
  cursor: pointer;
  padding: 3px 5px 4px;
  border-left: 2.5px solid;
  border-radius: 0 4px 4px 0;
  transition: opacity .15s, transform .1s;
}
.evb:hover { opacity: .88; transform: translateX(1px); }

.evname {
  font-size: 10px;
  font-weight: 700;
  line-height: 1.3;
  margin-bottom: 1px;
  display: flex;
  align-items: flex-start;
  gap: 3px;
  flex-wrap: wrap;
}
.evname .eflag { font-size: 11px; flex-shrink: 0; }
.evsub {
  font-size: 9px;
  font-weight: 400;
  margin-bottom: 3px;
  opacity: .7;
}
.evtags { display: flex; gap: 3px; flex-wrap: wrap; }

/* tags */
.tg {
  font-size: 8px;
  font-weight: 700;
  padding: 2px 5px;
  border-radius: 3px;
  line-height: 1.2;
  white-space: nowrap;
}
.tg-online { background: var(--tag-online-bg); color: var(--tag-online-text); }
.tg-pres   { background: var(--tag-pres-bg);   color: var(--tag-pres-text); }
.tg-free   { background: var(--tag-free-bg);   color: var(--tag-free-text); }
.tg-paid   { background: var(--tag-paid-bg);   color: var(--tag-paid-text); border: 1px solid var(--tag-paid-border); }

.more-ev {
  font-size: 9px;
  font-weight: 700;
  color: var(--accent);
  cursor: pointer;
  margin-top: 2px;
  display: inline-block;
}

/* ─── LEGEND ─── */
.legend {
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
  padding: .65rem 0 0;
  font-size: 10px;
  color: var(--text3);
  align-items: center;
}
.ldot {
  width: 8px; height: 8px;
  border-radius: 2px;
  display: inline-block;
  margin-right: 4px;
  vertical-align: middle;
}

/* ─── MODAL ─── */
.mbg {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.55);
  z-index: 9999;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}
.mbg.open { display: flex; }

.mbox {
  background: var(--surface);
  border-radius: 18px;
  padding: 2rem;
  max-width: 420px;
  width: 100%;
  position: relative;
  border: 1.5px solid var(--border);
  box-shadow: var(--shadow-lg);
  animation: popIn .2s ease;
  max-height: 90vh;
  overflow-y: auto;
}
@keyframes popIn {
  from { transform: scale(.93) translateY(10px); opacity: 0; }
  to   { transform: scale(1) translateY(0); opacity: 1; }
}

.mclose {
  position: absolute;
  top: 14px; right: 14px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 50%;
  width: 28px; height: 28px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text2);
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.mclose:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

.mcat-bar {
  height: 4px;
  border-radius: 2px;
  margin-bottom: 1rem;
}
.mflag { font-size: 36px; margin-bottom: .5rem; display: block; }
.mtitle { font-size: 20px; font-weight: 800; color: var(--text); margin-bottom: .2rem; line-height: 1.2; }
.mloc { font-size: 12px; color: var(--text3); margin-bottom: .75rem; }

.mtags-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: .85rem; }
.mtag {
  font-size: 11px;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 20px;
}

.mdates {
  font-size: 12px;
  color: var(--accent);
  font-weight: 600;
  margin-bottom: .6rem;
  display: flex;
  align-items: center;
  gap: .4rem;
}
.mdesc {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.7;
  margin-bottom: 1.25rem;
}
.mlink {
  display: inline-flex;
  align-items: center;
  gap: .4rem;
  background: var(--accent);
  color: #fff;
  font-size: 12px;
  font-weight: 700;
  padding: 10px 22px;
  border-radius: 10px;
  text-decoration: none;
  transition: background .15s;
  letter-spacing: .02em;
}
.mlink:hover { background: var(--accent-h); }
[data-theme="coloripop"] .mlink { color: var(--navy); }

/* ─── FOOTER ─── */
footer {
  text-align: center;
  padding: 1.5rem 0 .5rem;
  font-size: 10px;
  color: var(--text3);
  letter-spacing: .06em;
}

/* ─── RESPONSIVE ─── */

/* ─── LOGO SVG ─── */
.logo-link { display: inline-flex; align-items: center; text-decoration: none; }
.logo-svg { height: 44px; width: auto; display: block; }

/* Purple letters: always #4A3AFF on light, lighter on dark/coloripop */
[data-theme="light"]     .logo-purple  { fill: #4A3AFF; }
[data-theme="dark"]      .logo-purple  { fill: #7A6EFF; }
[data-theme="coloripop"] .logo-purple  { fill: #B5AFFF; }

/* Pink letters: always #FE81E7 — works on all themes */
.logo-pink { fill: #FE81E7; }

/* Tagline text: dark on light, white on dark, lavender on coloripop */
[data-theme="light"]     .logo-tagline { fill: #211F54; }
[data-theme="dark"]      .logo-tagline { fill: #E8E6FF; }
[data-theme="coloripop"] .logo-tagline { fill: #E2E0FF; }


/* ─── VIEW TOGGLE ─── */
.view-toggle {
  display: flex;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  margin-left: .25rem;
}
.view-btn {
  background: none;
  border: none;
  padding: 5px 11px;
  cursor: pointer;
  font-size: 14px;
  color: var(--text3);
  transition: all .15s;
  font-family: 'Inter', sans-serif;
  border-right: 1px solid var(--border);
  display: flex; align-items: center; gap: 4px;
  font-size: 11px; font-weight: 600; letter-spacing: .03em;
}
.view-btn:last-child { border-right: none; }
.view-btn.active { background: var(--accent); color: #fff; }
.view-btn:not(.active):hover { background: var(--bg3); color: var(--text); }

/* ─── AGENDA VIEW ─── */
.agenda-wrap { display: none; }
.agenda-wrap.visible { display: block; }
.cal-wrap.hidden { display: none; }

.agenda-empty {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--text3);
  font-size: 13px;
}

.agenda-month-group { margin-bottom: 2rem; }

.agenda-month-hd {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--muted);
  padding: .5rem 0 .6rem;
  border-bottom: 1.5px solid var(--border);
  margin-bottom: .75rem;
  display: flex;
  align-items: center;
  gap: .5rem;
}
.today-month-badge {
  font-size: 9px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--accent);
  color: #fff;
  letter-spacing: 0;
  margin-left: 4px;
}
.agenda-month-hd .count-badge {
  font-size: 9px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 20px;
  background: var(--bg3);
  color: var(--text3);
  letter-spacing: 0;
}

.agenda-row {
  display: grid;
  grid-template-columns: 72px 1fr;
  gap: 0;
  margin-bottom: 2px;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: transform .12s, box-shadow .12s;
  border: 1px solid var(--border);
}
.agenda-row:hover { transform: translateX(3px); box-shadow: var(--shadow); }

.agenda-date-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: .75rem .5rem;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  min-width: 72px;
}
.agenda-date-col .ad-day {
  font-size: 26px;
  font-weight: 900;
  font-style: italic;
  font-family: 'Playfair Display', Georgia, serif;
  line-height: 1;
  color: var(--text);
}
.agenda-date-col .ad-dow {
  font-size: 8.5px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 2px;
}
.agenda-date-col .ad-range {
  font-size: 8px;
  color: var(--text3);
  margin-top: 3px;
  text-align: center;
  line-height: 1.4;
}

.agenda-content {
  padding: .75rem 1rem;
  background: var(--surface);
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 4px;
  border-left: 3px solid transparent;
}

.agenda-title-row {
  display: flex;
  align-items: center;
  gap: .4rem;
  flex-wrap: wrap;
}
.agenda-flag { font-size: 16px; }
.agenda-name {
  font-size: 14px;
  font-weight: 800;
  line-height: 1.2;
}
.agenda-city {
  font-size: 11px;
  color: var(--text3);
  font-weight: 400;
}
.agenda-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 2px; }

/* today highlight in agenda */
.agenda-row.is-today .agenda-date-col { background: var(--today-bg); }
.agenda-row.is-today .agenda-date-col .ad-day { color: var(--accent); }

/* multiday spanning badge */
.ad-span-badge {
  font-size: 8px;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 3px;
  background: var(--bg3);
  color: var(--text3);
  white-space: nowrap;
}

/* agenda mobile handled in main 600px block */

/* ─── PAGE TITLE ─── */
.page-title {
  padding: 1.5rem 0 .25rem;
}
.page-title h1 {
  font-size: 28px;
  font-weight: 900;
  font-style: italic;
  color: var(--text);
  line-height: 1.1;
  letter-spacing: -.02em;
}
.page-title h1 span.accent { color: var(--accent); }
.page-title .subtitle {
  font-size: 12px;
  font-weight: 500;
  color: var(--text3);
  margin-top: 4px;
  letter-spacing: .04em;
}
/* page title mobile handled in main 600px block */

/* ══════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════ */

/* ── Tablet ── */
@media (max-width: 860px) {
  .logo-svg { height: 36px; }
  .wrow td { height: 110px; }
  .tg { font-size: 7.5px; padding: 1px 4px; }
}

/* ── Mobile ≤ 600px ── */
@media (max-width: 600px) {

  /* Layout */
  .app { padding: 0 .75rem 2rem; }

  /* Header */
  header { padding: .65rem 0; gap: .35rem; }
  .logo-svg { height: 26px; }
  .header-controls { gap: .3rem; }
  .theme-btn { padding: 4px 7px; font-size: 11px; }
  .lang-btn  { padding: 4px 8px; font-size: 10px; }

  /* Title */
  .page-title { padding: .75rem 0 .1rem; }
  .page-title h1 { font-size: 17px; }

  /* Toolbar */
  .toolbar { padding: .5rem 0; gap: .35rem; }
  .month-title { font-size: 12px; min-width: 100px; }
  .nav-btn { width: 26px; height: 26px; font-size: 14px; }
  .fpill { font-size: 9.5px; padding: 4px 9px; }
  .vbtn-cal-txt,
  .vbtn-agenda-txt { display: none; }
  .view-btn { padding: 5px 8px; }

  /* ── Calendar table: ultra compact ── */
  /* Hide the month-label column entirely */
  .wrow td.mcol,
  .dow-row th.mcol { display: none; }

  /* Make the 7 day columns fill the full width */
  .cal { table-layout: fixed; width: 100%; }

  /* Cells: very short, no padding for content */
  .wrow td {
    height: 52px;
    padding: 3px 2px 2px;
    overflow: hidden;
  }

  /* Hide everything inside cells except the day number and dots */
  .evb      { display: none; }
  .more-ev  { display: none; }
  .evsub    { display: none; }

  /* Watermark number: much smaller */
  .dnum {
    font-size: 28px;
    right: 2px;
    bottom: 0;
    opacity: .06;
  }

  /* Day number: tiny, top-left */
  /* We'll render it via JS as a small badge */
  .dow-row th {
    font-size: 8px;
    padding: 5px 2px 4px;
    text-align: center;
  }

  /* Mobile dot row below each cell */
  .mob-dots {
    display: flex;
    gap: 2px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 1px;
  }
  .mob-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Mobile event list (shown below the calendar on mobile) */
  .mob-ev-list { display: flex; flex-direction: column; gap: 6px; margin-top: .75rem; }
  .mob-ev-hd {
    font-size: 9px;
    font-weight: 800;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--muted);
    padding-bottom: 5px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 2px;
  }
  .mob-ev-item {
    display: grid;
    grid-template-columns: 36px 1fr;
    gap: 0;
    border-radius: 8px;
    border: 1px solid var(--border);
    overflow: hidden;
    cursor: pointer;
    transition: opacity .12s;
  }
  .mob-ev-item:active { opacity: .7; }
.mob-ev-item:hover { transform: translateX(3px); box-shadow: var(--shadow); border-color: var(--border2); }
  .mob-ev-date {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--bg2);
    font-size: 16px;
    font-weight: 900;
    font-style: italic;
    font-family: 'Playfair Display', Georgia, serif;
    color: var(--text);
    padding: 6px 2px;
    border-right: 1px solid var(--border);
    line-height: 1;
  }
  .mob-ev-date small {
    font-size: 7px;
    font-weight: 700;
    font-style: normal;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 2px;
  }
  .mob-ev-body {
    padding: 6px 8px;
    background: var(--surface);
    border-left: 3px solid;
  }
  .mob-ev-name {
    font-size: 12px;
    font-weight: 700;
    line-height: 1.25;
  }
  .mob-ev-city {
    font-size: 10px;
    color: var(--text3);
    margin-top: 1px;
  }
  .mob-ev-tags { display: flex; gap: 3px; margin-top: 4px; flex-wrap: wrap; }

  /* Agenda on mobile: tighter */
  .agenda-row { grid-template-columns: 52px 1fr; }
  .agenda-date-col { padding: .6rem .4rem; }
  .agenda-date-col .ad-day { font-size: 20px; }
  .agenda-name { font-size: 12px; }
  .agenda-content { padding: .6rem .75rem; }
  .agenda-city { font-size: 10px; }

  /* Legend */
  .legend { font-size: 9px; gap: .5rem; }

  /* Modal */
  .mbox { padding: 1.25rem; border-radius: 14px; }
  .mtitle { font-size: 15px; }
  .mdesc { font-size: 12px; }
}

@keyframes spin { to { transform: rotate(360deg); } }


/* ─── SEARCH BAR ─── */
.toolbar-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: .6rem 0 .4rem;
  gap: .75rem;
  flex-wrap: wrap;
  border-bottom: 1px solid var(--border);
}
/* view-toggle in toolbar-top takes natural width, nav and search fill the rest */
.toolbar-top .view-toggle { flex-shrink: 0; }
.toolbar-top .nav-group { flex-shrink: 0; }
.toolbar-top .search-wrap { flex: 1; min-width: 140px; max-width: 260px; }
.toolbar-bottom {
  display: flex;
  align-items: center;
  gap: .35rem;
  padding: .3rem 0 0;
  flex-wrap: wrap;
}
.search-wrap {
  position: relative;
  flex: 1;
  min-width: 180px;
  max-width: 320px;
}
.search-wrap svg {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  pointer-events: none;
}
.search-input {
  width: 100%;
  padding: 6px 12px 6px 32px;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  background: var(--bg2);
  color: var(--text);
  font-size: 12px;
  font-family: 'Inter', sans-serif;
  outline: none;
  transition: border-color .15s;
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--muted); }
.search-results-wrap {
  display: none;
  flex-direction: column;
  gap: 6px;
  margin-top: .5rem;
}
.search-results-wrap.visible { display: flex; }
.search-results-hd {
  font-size: 9px;
  font-weight: 800;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted);
  padding-bottom: 5px;
  border-bottom: 1px solid var(--border);
}
.search-empty {
  text-align: center;
  padding: 2rem;
  color: var(--text3);
  font-size: 13px;
}
mark {
  background: #FDE8C8;
  color: #7A3D00;
  border-radius: 2px;
  padding: 0 1px;
}
[data-theme="dark"] mark { background: #3A2800; color: #FAC775; }
[data-theme="coloripop"] mark { background: #3A2800; color: #FAC775; }

/* ─── ANNUAL VIEW ─── */
.annual-wrap { display: none; }
.annual-wrap.visible { display: block; }

.annual-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 1rem;
  margin-top: .5rem;
}

.mini-month {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.mini-month-hd {
  background: var(--navy);
  padding: 6px 10px;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
[data-theme="light"] .mini-month-hd { background: var(--navy); }
[data-theme="dark"]  .mini-month-hd { background: var(--bg3); color: var(--lav); }
[data-theme="coloripop"] .mini-month-hd { background: var(--purple); }

.mini-month-hd .ev-count {
  font-size: 8px;
  background: rgba(255,255,255,.2);
  padding: 1px 6px;
  border-radius: 10px;
  font-weight: 600;
}

.mini-cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 0;
}
.mini-dow {
  font-size: 7px;
  font-weight: 700;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--muted);
  text-align: center;
  padding: 4px 0 2px;
  background: var(--bg2);
}
.mini-day {
  font-size: 9px;
  font-family: 'Playfair Display', Georgia, serif;
  font-weight: 700;
  text-align: center;
  padding: 3px 1px;
  line-height: 1;
  cursor: default;
  position: relative;
  color: var(--text2);
  min-height: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
}
.mini-day.has-ev { cursor: pointer; color: var(--text); font-weight: 900; }
.mini-day.has-ev:hover { background: var(--bg3); border-radius: 3px; }
.mini-day.is-today { color: #fff !important; }
.mini-day.is-today span.dn {
  background: var(--accent);
  border-radius: 50%;
  width: 16px; height: 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 8px;
}
.mini-day.other { color: var(--muted); opacity: .4; }
.mini-day-dots {
  display: flex; gap: 1px; justify-content: center; flex-wrap: wrap; max-width: 18px;
}
.mini-day-dot { width: 3px; height: 3px; border-radius: 50%; flex-shrink: 0; }

.annual-ev-list {
  margin-top: 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.annual-ev-hd {
  font-size: 9px;
  font-weight: 800;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted);
  padding-bottom: 5px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 2px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.annual-ev-hd span {
  font-size: 10px;
  font-weight: 700;
  color: var(--accent);
}

/* hide month nav when annual */
.annual-wrap.visible ~ * .nav-group { pointer-events: none; opacity: .4; }
.hide-on-annual { transition: opacity .2s; }

@media (max-width: 600px) {
  .annual-grid { grid-template-columns: repeat(2, 1fr); gap: .6rem; }
  .search-wrap { max-width: 100%; min-width: 140px; }
  .vbtn-annual-txt { display: none; }
}


/* ─── EMPTY STATE ─── */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 3.5rem 1rem;
  text-align: center;
  gap: .75rem;
}
.empty-state > div:first-child {
  opacity: .9;
  color: var(--text3);
}
.empty-state .es-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--text2);
}
.empty-state .es-sub {
  font-size: 13px;
  color: var(--text3);
  max-width: 260px;
  line-height: 1.6;
}
.empty-state .es-pill {
  font-size: 11px;
  font-weight: 600;
  padding: 5px 14px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  color: var(--accent);
  cursor: pointer;
  background: none;
  font-family: 'Inter', sans-serif;
  margin-top: .25rem;
  transition: all .15s;
}
.empty-state .es-pill:hover { background: var(--accent); color: #fff; border-color: var(--accent); }


  100% { background-position: -200% 0; }
}




/* ─── FAVORITES ─── */
.fav-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 18px;
  line-height: 1;
  padding: 2px;
  transition: transform .15s;
  color: var(--muted);
}
.fav-btn:hover { transform: scale(1.2); }
.fav-btn.active { color: #FE81E7; }
.fpill[data-f="favs"] .fav-count {
  display: inline-block;
  background: var(--accent);
  color: #fff;
  font-size: 9px;
  font-weight: 700;
  padding: 0 5px;
  border-radius: 10px;
  margin-left: 3px;
  min-width: 16px;
  text-align: center;
}


/* ─── FULL SCREEN LOADER ─── */
#app-loader {
  position: fixed;
  inset: 0;
  z-index: 99999;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1rem;
  transition: opacity .4s ease;
}
#app-loader.fade-out {
  opacity: 0;
  pointer-events: none;
}
#app-loader .loader-anim {
  width: 80px;
  height: 80px;
}
#app-loader .loader-brand {
  display: flex;
  flex-direction: column;

  gap: .35rem;
}
#app-loader .loader-brand svg {
  height: 32px;
  width: auto;
}
#app-loader .loader-txt {
  font-size: 12px;
  font-weight: 500;
  color: var(--text3);
  letter-spacing: .06em;
  font-family: 'Inter', sans-serif;
}

function parseD(s) { const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function sameDay(a,b) { return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }

function getEvs(day) {
  return EVENTS.filter(ev => {
    const s=parseD(ev.start), e=parseD(ev.end);
    if (!(day>=s && day<=e)) return false;
    if (activeFilter==="online")     return ev.online;
    if (activeFilter==="presencial") return !ev.online;
    if (activeFilter==="free")       return ev.free;
    if (activeFilter==="paid")       return !ev.free;
    if (activeFilter==="latam") {
      const loc = ((ev.city||'')+(ev.country_en||'')).toLowerCase();
      return loc.includes('latin') || loc.includes('latam') || loc.includes('bolivia') ||
             loc.includes('colombia') || loc.includes('argentina') || loc.includes('chile') ||
             loc.includes('peru') || loc.includes('mexico') || loc.includes('brasil') ||
             loc.includes('brazil') || loc.includes('venezuela') || loc.includes('ecuador') ||
             ev.flag==='🌎';
    }
    if (activeFilter==="favs") return isFav(ev.id);
    if (activeFilter==="europe") {
      const loc = ((ev.city||'')+(ev.country_en||'')).toLowerCase();
      return loc.includes('uk') || loc.includes('london') || loc.includes('germany') ||
             loc.includes('berlin') || loc.includes('spain') || loc.includes('barcelona') ||
             loc.includes('france') || loc.includes('paris') || loc.includes('netherlands') ||
             loc.includes('amsterdam') || loc.includes('denmark') || loc.includes('copenhagen') ||
             loc.includes('ireland') || loc.includes('dublin') || loc.includes('switzerland') ||
             loc.includes('sweden') || loc.includes('norway') || loc.includes('portugal') ||
             loc.includes('italy') || loc.includes('europe') || loc.includes('european');
    }
    return true;
  });
}

function renderFilters() {
  const t = I18N[lang];
  document.querySelectorAll('.fpill').forEach(btn => {
    const f = btn.dataset.f;
    const map = { all:t.all, online:t.online, presencial:t.pres, free:t.free, paid:t.paid };
    btn.textContent = map[f] || btn.dataset[lang==='es'?'es':'en'];
  });
}

function renderLegend() {
  const t = I18N[lang];
  const legend = document.getElementById('legend');
  const cats = [
    { key:'ux',      bg:'var(--ux-bg)',   border:'var(--ux-border)' },
    { key:'graphic', bg:'var(--gr-bg)',   border:'var(--gr-border)' },

    `<span><span class="ldot" style="background:${c.bg};border:1px solid ${c.border}"></span>${t.cats[c.key]}</span>`
  ).join('');
}

function renderCal() {
  const t = I18N[lang];
  const MONTHS = lang==='es' ? MONTHS_ES : MONTHS_EN;
  const DAYS   = lang==='es' ? DAYS_ES   : DAYS_EN;

  const mtEl = gel('monthTitle'); if(mtEl) mtEl.textContent = MONTHS[curMonth] + ' ' + curYear;
  const ftTxt = gel('ft-txt'); if(ftTxt) ftTxt.textContent = t.footer;
  document.title = 'coloripop · ' + t.sub;
  const tmEl = gel('title-main'); if(tmEl) tmEl.textContent = t.title_main;
  const tsEl = gel('title-sub');  if(tsEl)  tsEl.textContent = t.title_sub;

  renderFilters();
  renderLegend();

  const tbl = document.getElementById('calTable');
  tbl.innerHTML = '';

  // Header row
  const hr = document.createElement('tr');
  hr.className = 'dow-row';
  const th0 = document.createElement('th'); th0.className = 'mcol'; hr.appendChild(th0);
  DAYS.forEach(d => { const th=document.createElement('th'); th.textContent=d; hr.appendChild(th); });
  tbl.appendChild(hr);

  // Check if there are any events this month at all
  const monthHasEvents = EVENTS.some(ev => {
    const s = parseD(ev.start), e = parseD(ev.end);
    const ms = new Date(curYear, curMonth, 1);
    const me = new Date(curYear, curMonth+1, 0, 23, 59, 59);
    if (!(s <= me && e >= ms)) return false;
    if (activeFilter==="online")     return ev.online;
    if (activeFilter==="presencial") return !ev.online;
    if (activeFilter==="free")       return ev.free;
    if (activeFilter==="paid")       return !ev.free;
    return true;
  });

  if (!monthHasEvents) {
    const emptyRow = document.createElement('tr');
    const emptyTd = document.createElement('td');
    emptyTd.colSpan = 8;
    emptyTd.style.border = 'none';
    emptyTd.appendChild(makeEmptyState(
      'Sin eventos este mes',
      'No events this month',
      'No hay eventos de diseño registrados para este período.',
      'No design events registered for this period.',
      true
    ));
    emptyRow.appendChild(emptyTd);
    tbl.appendChild(emptyRow);
    return;
  }

  const today = new Date();
  const firstDay = new Date(curYear, curMonth, 1);
  const lastDay  = new Date(curYear, curMonth+1, 0);
  let startDow = firstDay.getDay();
  startDow = startDow===0 ? 6 : startDow-1;

  let cur = new Date(curYear, curMonth, 1-startDow);
  const shownMonths = new Set();
  let safety = 0;

  while (safety < 10) {
    safety++;
    const wr = document.createElement('tr'); wr.className = 'wrow';

    // Month label cell
    const mtd = document.createElement('td'); mtd.className = 'mcol';
    for (let di=0; di<7; di++) {
      const d = new Date(cur.getFullYear(), cur.getMonth(), cur.getDate()+di);
      if (d.getDate()===1) {
        const mk = d.getFullYear()+'-'+d.getMonth();
        if (!shownMonths.has(mk)) {
          shownMonths.add(mk);
          const sp = document.createElement('span'); sp.className='mside';
          sp.textContent = MONTHS[d.getMonth()].toUpperCase();
          mtd.appendChild(sp); break;
        }
      }
    }
    wr.appendChild(mtd);

    for (let di=0; di<7; di++) {
      const day = new Date(cur.getFullYear(), cur.getMonth(), cur.getDate()+di);
      const td = document.createElement('td');
      if (day.getMonth()!==curMonth) td.classList.add('other-m');
      if (sameDay(day, today)) td.classList.add('today-c');

      const evs = getEvs(day);
      const dn = document.createElement('div');
      dn.className='dnum';
      dn.textContent=day.getDate();
      if (evs.length > 0) dn.style.opacity = '0.03';
      td.appendChild(dn);
      evs.slice(0,2).forEach(ev => {
        const cs = CAT_STYLE[ev.cat]||CAT_STYLE.ux;
        const block = document.createElement('div'); block.className='evb';
        block.style.borderLeftColor = cs.border;
        block.style.background = cs.bg;

        const nm = document.createElement('div'); nm.className='evname';
        nm.style.color = cs.text;
        nm.innerHTML = `<span class="eflag">${ev.flag}</span><span>${ev.title}</span>`;

        const sub = document.createElement('div'); sub.className='evsub';
        sub.textContent = (ev.online ? t.allday : t.allday) + ' · ' + ev.city;

        const tags = document.createElement('div'); tags.className='evtags';
        const t1 = document.createElement('span');
        t1.className = 'tg ' + (ev.online ? 'tg-online':'tg-pres');
        t1.textContent = ev.online ? t.online_tag : t.pres_tag;
        const t2 = document.createElement('span');
        t2.className = 'tg ' + (ev.free ? 'tg-free':'tg-paid');
        t2.textContent = ev.free ? t.free_tag : t.paid_tag;
        tags.appendChild(t1); tags.appendChild(t2);

        block.appendChild(nm); block.appendChild(sub);
        // tags hidden in calendar — shown in modal/agenda
        block.addEventListener('click', () => openModal(ev));
        td.appendChild(block);
      });

      if (evs.length > 2) {
        const more = document.createElement('div'); more.className='more-ev';
        more.textContent = '+' + (evs.length-2) + ' ' + t.more;
        td.appendChild(more);
      }

      wr.appendChild(td);
    }
    tbl.appendChild(wr);

    cur = new Date(cur.getFullYear(), cur.getMonth(), cur.getDate()+7);
    if (cur > lastDay && (cur.getDay()===1 || cur.getDate()<=7)) break;
    if (cur.getMonth() > curMonth+1 && curMonth < 11) break;
    if (cur.getMonth() === 0 && curMonth === 11) break;
  }
}

function openModal(ev) {
  const t = I18N[lang];
  const s = parseD(ev.start), e = parseD(ev.end);
  const loc = lang==='es' ? 'es' : 'en';
  const fmt = d => d.toLocaleDateString(lang==='es'?'es-ES':'en-GB',{day:'numeric',month:'long',year:'numeric'});
  const cs = CAT_STYLE[ev.cat]||CAT_STYLE.ux;

  document.getElementById('mcat-bar').style.background = cs.border;
  const catNames = lang==='es' ? { ux:'UX / UI', graphic:'Graphic Design', tech:'Tech / Dev', motion:'Motion / Creative', research:'UX Research' } : { ux:'UX / UI', graphic:'Graphic Design', tech:'Tech / Dev', motion:'Motion / Creative', research:'UX Research' };
  const catBar = document.getElementById('mcat-bar');
  catBar.style.background = cs.border;
  catBar.title = catNames[ev.cat] || ev.cat;
  // Show category pill in modal
  const existingCatPill = document.getElementById('mcat-pill');
  if (existingCatPill) existingCatPill.remove();
  const catPill = document.createElement('div');
  catPill.id = 'mcat-pill';
  catPill.style.cssText = `display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;background:${cs.bg};color:${cs.text};margin-bottom:.5rem;letter-spacing:.04em;text-transform:uppercase;`;
  catPill.textContent = catNames[ev.cat] || ev.cat;
  catBar.insertAdjacentElement('afterend', catPill);
  document.getElementById('mflag').textContent = ev.flag;
  document.getElementById('mtitle').textContent = ev.title;
  document.getElementById('mloc').textContent = ev.city + ' · ' + ev[t.country];
  const daysCount = Math.round((e - s) / 86400000) + 1;
  const daysStr = daysCount > 1 ? ` · ${daysCount} ${lang==='es'?'días':'days'}` : '';
  document.getElementById('mdates').textContent = '📅 ' + fmt(s) + (sameDay(s,e)?'':' → '+fmt(e)) + daysStr;
  document.getElementById('mdesc').textContent = ev[t.desc];
  document.getElementById('mlink').href = ev.url;
  const mlinkTxt = document.getElementById('mlink-txt'); if(mlinkTxt) mlinkTxt.textContent = t.go;

  const tagsEl = document.getElementById('mtags'); tagsEl.innerHTML='';
  [[ev.online?'🌐 '+t.online_tag:'📍 '+t.pres_tag, ev.online?'tg-online':'tg-pres'],
   [ev.free?'✓ '+t.free_tag:'$ '+t.paid_tag, ev.free?'tg-free':'tg-paid']].forEach(([txt,cls])=>{
    const tag = document.createElement('span');
    tag.className = 'mtag '+cls; tag.textContent = txt; tagsEl.appendChild(tag);
  });

  document.getElementById('mbg').classList.add('open');
}

const AT_TOKEN_KEY  = 'cp_at_token';
const AT_BASE_KEY   = 'cp_at_base';
const AT_TABLE_KEY  = 'cp_at_table';

let usingAirtable = false;

// Map Airtable field names → our internal event format
function mapAirtableRecord(rec) {
  const f = rec.fields;

  // Type → online
  const typeVal = (f['Type'] || '').toString().toLowerCase();
  const online  = typeVal.includes('virtual') || typeVal.includes('online');

  // Price → free
  const priceVal = (f['Price'] || '').toString().toLowerCase();
  const free = priceVal === 'free' || priceVal === '' || priceVal === '0';

  // Date → start / end (Airtable Date field is YYYY-MM-DD)
  const rawDate = f['Date'] || '';
  const start   = rawDate.substring(0, 10) || new Date().toISOString().substring(0,10);
  const end     = f['End Date'] ? (f['End Date']+'').substring(0,10) : start;

  // Country → flag emoji (best effort)
  const country = (f['Country'] || 'Global').toString();
  const flag    = countryToFlag(country);

  // Category: try to infer from Type or Description
  const desc = (f['Description'] || '').toLowerCase();
  const cat  = inferCat(typeVal, desc, f['Event'] || '');

  return {
    id:         rec.id,
    title:      f['Event']       || 'Untitled',
    flag:       flag,
    country_es: country,
    country_en: country,
    city:       country,
    start:      start,
    end:        end,
    online:     online,
    free:       free,
    cat:        cat,
    desc_es:    f['Description'] || '',
    desc_en:    f['Description'] || '',
    url:        f['Website']     || '#',
    status:     f['Status']      || '',
  };
}

function countryToFlag(country) {
  const map = {
    'global':'🌐','online':'🌐','virtual':'🌐',
    'united states':'🇺🇸','usa':'🇺🇸','us':'🇺🇸',
    'united kingdom':'🇬🇧','uk':'🇬🇧','england':'🇬🇧',
    'spain':'🇪🇸','españa':'🇪🇸',
    'germany':'🇩🇪','alemania':'🇩🇪',
    'france':'🇫🇷','francia':'🇫🇷',
    'netherlands':'🇳🇱','países bajos':'🇳🇱','holland':'🇳🇱',
    'ireland':'🇮🇪','irlanda':'🇮🇪',
    'denmark':'🇩🇰','dinamarca':'🇩🇰',
    'switzerland':'🇨🇭','suiza':'🇨🇭',
    'australia':'🇦🇺',
    'canada':'🇨🇦',
    'brazil':'🇧🇷','brasil':'🇧🇷',
    'mexico':'🇲🇽','méxico':'🇲🇽',
    'argentina':'🇦🇷',
    'colombia':'🇨🇴',
    'chile':'🇨🇱',
    'bolivia':'🇧🇴',
    'peru':'🇵🇪','perú':'🇵🇪',
    'portugal':'🇵🇹',
    'italy':'🇮🇹','italia':'🇮🇹',
    'sweden':'🇸🇪','suecia':'🇸🇪',
    'norway':'🇳🇴','noruega':'🇳🇴',
    'japan':'🇯🇵','japón':'🇯🇵',
    'latin america':'🌎','latinoamérica':'🌎','latam':'🌎',
  };
  const key = country.toLowerCase().trim();
  return map[key] || '🌐';
}

function inferCat(type, desc, title) {
  const all = (type + ' ' + desc + ' ' + title).toLowerCase();
  if (/motion|animation|animat|creative|art|3d|cinema|film|video|offf|reason/.test(all)) return 'motion';
  if (/brand|graphic|typography|typo|print|identity|logo|visual/.test(all)) return 'graphic';
  if (/css|code|dev|frontend|backend|engineer|tech|web dev|html|javascript/.test(all)) return 'tech';
  if (/research|usability|testing|survey|insight|nn\/g|nielsen/.test(all)) return 'research';
  return 'ux';
}

// ── URL de tu Cloudflare Worker — se actualiza desde el modal de config ──
let WORKER_URL = 'https://coloripop-events.coloripop.workers.dev/';

async function fetchAirtable(token, baseId, tableName) {
  // Si hay Worker configurado, úsalo (sin token en el browser)
  if (WORKER_URL) {
    const res = await fetch(WORKER_URL);
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || 'Error ' + res.status);
    }
    const data = await res.json();
    return (data.records || []).map(mapAirtableRecord);
  }

  // Fallback: llamada directa con token (requiere HTTPS + CORS ok)
  const baseUrl = `https://api.airtable.com/v0/${baseId}/${encodeURIComponent(tableName)}?pageSize=100`;

  async function doFetch(url) {
    const res = await fetch(url, {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || 'Error ' + res.status);
    }
    return res.json();
  }

  const data = await doFetch(baseUrl);
  let records = data.records || [];
  let offset = data.offset;
  while (offset) {
    const d2 = await doFetch(baseUrl + '&offset=' + offset);
    records = records.concat(d2.records || []);
    offset = d2.offset;
  }
  return records.map(mapAirtableRecord);
}

  if (!query) return text;
  const re = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return text.replace(re, '<mark>$1</mark>');

// ─── EMPTY STATE HELPER ───
function makeEmptyState(titleEs, titleEn, subEs, subEn, showFilterBtn) {
  const wrap = document.createElement('div');
  wrap.className = 'empty-state';

  // Lottie animation
  const lottieDiv = document.createElement('div');
  lottieDiv.style.cssText = 'width:60px;height:60px;flex-shrink:0;';
  wrap.appendChild(lottieDiv);
  requestAnimationFrame(() => {
    if (typeof lottie !== 'undefined') {
      // Recolor the Lottie JSON: replace all black [0,0,0] colors with --text3 RGB
      function recolorLottie(data, r, g, b) {
        const str = JSON.stringify(data);
        // Replace "c":{"a":0,"k":[0,0,0]} — black in Lottie's 0-1 RGB format
        const recolored = str
          .replace(/"c":\{"a":0,"k":\[0,0,0\]}/g,
            `"c":{"a":0,"k":[${r},${g},${b}]}`);
        return JSON.parse(recolored);
      }
      // Get --text3 color from CSS variable and convert to 0-1 range
      const text3 = getComputedStyle(document.body).getPropertyValue('--text3').trim();
      // Parse hex color to RGB 0-1
      function hexToLottie(hex) {
        hex = hex.replace('#','');
        if (hex.length === 3) hex = hex.split('').map(x=>x+x).join('');
        const r = parseInt(hex.slice(0,2),16)/255;
        const g = parseInt(hex.slice(2,4),16)/255;
        const b = parseInt(hex.slice(4,6),16)/255;
        return [r,g,b];
      }
      const [lr,lg,lb] = hexToLottie(text3 || '#9994CC');
      const coloredData = recolorLottie(LOTTIE_CALENDAR, lr, lg, lb);

      const anim = lottie.loadAnimation({
        container: lottieDiv,
        renderer: 'svg',
        loop: true,
        autoplay: true,
        animationData: coloredData,
      });
      anim.setSpeed(0.4);
    }
  });

  const title = document.createElement('div');
  title.className = 'es-title';
  title.textContent = lang === 'es' ? titleEs : titleEn;

  const sub = document.createElement('div');
  sub.className = 'es-sub';
  sub.textContent = lang === 'es' ? subEs : subEn;

  wrap.appendChild(title);
  wrap.appendChild(sub);

  if (showFilterBtn && activeFilter !== 'all') {
    const btn = document.createElement('button');
    btn.className = 'es-pill';
    btn.textContent = lang === 'es' ? '✕ Quitar filtro' : '✕ Clear filter';
    btn.addEventListener('click', () => {
      activeFilter = 'all';
      document.querySelectorAll('.fpill').forEach(p => p.classList.remove('on'));
      document.querySelector('[data-f="all"]').classList.add('on');
      renderView();
    });
    wrap.appendChild(btn);
  }

  return wrap;
}

    hd.innerHTML = MONTHS[group.month].toUpperCase() + ' ' + group.year +
      ' <span class="count-badge">' + group.events.length + (lang==='es' ? ' eventos' : ' events') + '</span>' +
      (isCurrentMonth ? ' <span class="today-month-badge">' + (lang==='es' ? 'Este mes' : 'This month') + '</span>' : '');
    section.appendChild(hd);

    group.events.forEach(ev => {
      const cs = CAT_STYLE[ev.cat] || CAT_STYLE.ux;
      const s = parseD(ev.start), e = parseD(ev.end);
      const isToday = sameDay(s, today);
      const isMulti = !sameDay(s, e);
      const endInMonth = e.getMonth() === curMonth;

      const row = document.createElement('div');
      row.className = 'agenda-row' + (isToday ? ' is-today' : '');
      row.style.marginBottom = '8px';

      // Date col
      const dateCol = document.createElement('div');
      dateCol.className = 'agenda-date-col';

      const dayEl = document.createElement('div');
      dayEl.className = 'ad-day';
      dayEl.textContent = s.getDate();

      const dowEl = document.createElement('div');
      dowEl.className = 'ad-dow';
      dowEl.textContent = DAYS_LONG[s.getDay()].substring(0,3).toUpperCase();

      dateCol.appendChild(dayEl);
      dateCol.appendChild(dowEl);

      if (isMulti) {
        const rangeEl = document.createElement('div');
        rangeEl.className = 'ad-range';
        const fmtShort = d => d.getDate() + ' ' + (lang==='es'?MONTHS_ES:MONTHS_EN)[d.getMonth()].substring(0,3);
        rangeEl.textContent = fmtShort(s) + ' →\n' + fmtShort(e);
        dateCol.appendChild(rangeEl);
      }

      // Content col
      const content = document.createElement('div');
      content.className = 'agenda-content';
      content.style.borderLeftColor = cs.border;
      content.style.background = cs.bg + '33'; // subtle tint

      const titleRow = document.createElement('div');
      titleRow.className = 'agenda-title-row';

      const flagEl = document.createElement('span');
      flagEl.className = 'agenda-flag';
      flagEl.textContent = ev.flag;

      const nameEl = document.createElement('span');
      nameEl.className = 'agenda-name';
      nameEl.style.color = cs.text;
      nameEl.textContent = ev.title;

      titleRow.appendChild(flagEl);
      titleRow.appendChild(nameEl);

      const cityEl = document.createElement('div');
      cityEl.className = 'agenda-city';
      cityEl.textContent = ev.city + ' · ' + ev[t.country];

      const tagsEl = document.createElement('div');
      tagsEl.className = 'agenda-tags';
      const t1 = document.createElement('span');
      t1.className = 'tg ' + (ev.online ? 'tg-online' : 'tg-pres');
      t1.textContent = ev.online ? t.online_tag : t.pres_tag;
      const t2 = document.createElement('span');
      t2.className = 'tg ' + (ev.free ? 'tg-free' : 'tg-paid');
      t2.textContent = ev.free ? t.free_tag : t.paid_tag;
      if (isMulti) {
        const t3 = document.createElement('span');
        t3.className = 'tg';
        t3.style.cssText = 'background:var(--bg3);color:var(--text3);';
        const days = Math.round((e - s) / 86400000) + 1;
        t3.textContent = days + (lang==='es' ? ' días' : ' days');
        tagsEl.appendChild(t3);
      }
      tagsEl.appendChild(t1);
      tagsEl.appendChild(t2);

      content.appendChild(titleRow);
      content.appendChild(cityEl);
      content.appendChild(tagsEl);

      row.appendChild(dateCol);
      row.appendChild(content);
      row.addEventListener('click', () => openModal(ev));
      section.appendChild(row);
    });

    wrap.appendChild(section);
  });
}



const CAT_SHAPES = {
  ux:      { color:'#4A3AFF', shape:'circle' },
  graphic: { color:'#D4537E', shape:'square' },
  tech:    { color:'#1D9E75', shape:'diamond' },
  motion:  { color:'#BA7517', shape:'triangle' },
  research:{ color:'#378ADD', shape:'pentagon' },
};
function makeDot(cat) {
  const s = CAT_SHAPES[cat] || CAT_SHAPES.ux;
  const d = document.createElement('div');
  d.className = 'mob-dot';
  d.style.background = s.color;
  d.title = cat;
  if (s.shape==='square')   { d.style.borderRadius='1px'; }
  if (s.shape==='diamond')  { d.style.borderRadius='1px'; d.style.transform='rotate(45deg)'; d.style.width='5px'; d.style.height='5px'; }
  if (s.shape==='triangle') { d.style.background='none'; d.style.width='0'; d.style.height='0'; d.style.borderLeft='3px solid transparent'; d.style.borderRight='3px solid transparent'; d.style.borderBottom='6px solid '+s.color; }
  return d;
}

// ─── MOBILE EVENT LIST (dots + list below compact table) ───
const MOB_DOT_COLOR = {
  ux:'#4A3AFF', graphic:'#D4537E', tech:'#1D9E75', motion:'#BA7517', research:'#378ADD'
};

function removeMobileEventList() {
  const old = document.getElementById('mob-ev-list-wrap');
  if (old) old.remove();
  // remove dots from cells
  document.querySelectorAll('.mob-dots').forEach(el => el.remove());
}

function renderMobileEventList() {
  removeMobileEventList();

  // Only run on narrow screens
  if (window.innerWidth > 600) return;

  const t = I18N[lang];
  const DAYS_SHORT_ES = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const DAYS_SHORT_EN = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const DAYS_SHORT = lang==='es' ? DAYS_SHORT_ES : DAYS_SHORT_EN;

  // Add colored dots to each table cell that has events
  const rows = document.querySelectorAll('.wrow');
  rows.forEach(row => {
    const cells = row.querySelectorAll('td:not(.mcol)');
    cells.forEach(cell => {
      // find day number from dnum element
      const dnumEl = cell.querySelector('.dnum');
      if (!dnumEl) return;
      const dayNum = parseInt(dnumEl.textContent);
      const day = new Date(curYear, curMonth, dayNum);
      if (cell.classList.contains('other-m')) return;
      const evs = getEvs(day);
      if (evs.length === 0) return;
      const dotsEl = document.createElement('div');
      dotsEl.className = 'mob-dots';
      const unique = [...new Set(evs.map(e=>e.cat))].slice(0,4);
      unique.forEach(cat => {
        const d = document.createElement('div');
        d.className = 'mob-dot';
        d.style.background = MOB_DOT_COLOR[cat] || '#4A3AFF';
        dotsEl.appendChild(d);
      });
      cell.appendChild(dotsEl);
      cell.style.cursor = 'pointer';
    });
  });

  // Build the event list for the whole month
  const today = new Date();
  let monthEvs = EVENTS.filter(ev => {
    const s = parseD(ev.start), e = parseD(ev.end);
    const ms = new Date(curYear, curMonth, 1);
    const me = new Date(curYear, curMonth+1, 0, 23, 59, 59);
    if (!(s <= me && e >= ms)) return false;
    if (activeFilter==="online")     return ev.online;
    if (activeFilter==="presencial") return !ev.online;
    if (activeFilter==="free")       return ev.free;
    if (activeFilter==="paid")       return !ev.free;
    return true;
  }).sort((a,b) => parseD(a.start) - parseD(b.start));

  const wrap = document.createElement('div');
  wrap.id = 'mob-ev-list-wrap';
  wrap.className = 'mob-ev-list';

  if (monthEvs.length === 0) {
    wrap.appendChild(makeEmptyState(
      'Sin eventos este mes',
      'No events this month',
      'No hay eventos de diseño registrados para este período.',
      'No design events registered for this period.',
      true
    ));
    const calWrap = document.querySelector('.cal-wrap');
    calWrap.insertAdjacentElement('afterend', wrap);
    return;
  }

  const hd = document.createElement('div');
  hd.className = 'mob-ev-hd';
  hd.textContent = monthEvs.length + (lang==='es' ? ' eventos este mes' : ' events this month');
  wrap.appendChild(hd);

  monthEvs.forEach(ev => {
    const cs = CAT_STYLE[ev.cat] || CAT_STYLE.ux;
    const s = parseD(ev.start), e = parseD(ev.end);
    const isMulti = !sameDay(s, e);

    const item = document.createElement('div');
    item.className = 'mob-ev-item';
    item.id = 'mob-ev-' + ev.id;

    const dateEl = document.createElement('div');
    dateEl.className = 'mob-ev-date';
    dateEl.innerHTML = s.getDate() + (isMulti ? '<br><small>→'+e.getDate()+'</small>' : '') +
      '<small>' + DAYS_SHORT[s.getDay()].toUpperCase() + '</small>';

    const body = document.createElement('div');
    body.className = 'mob-ev-body';
    body.style.borderLeftColor = cs.border;
    body.style.background = cs.bg + '55';

    const nameEl = document.createElement('div');
    nameEl.className = 'mob-ev-name';
    nameEl.style.color = cs.text;
    nameEl.textContent = ev.flag + ' ' + ev.title;

    const cityEl = document.createElement('div');
    cityEl.className = 'mob-ev-city';
    cityEl.textContent = ev.city;

    const tagsEl = document.createElement('div');
    tagsEl.className = 'mob-ev-tags';
    const t1 = document.createElement('span');
    t1.className = 'tg '+(ev.online?'tg-online':'tg-pres');
    t1.textContent = ev.online ? t.online_tag : t.pres_tag;
    const t2 = document.createElement('span');
    t2.className = 'tg '+(ev.free?'tg-free':'tg-paid');
    t2.textContent = ev.free ? t.free_tag : t.paid_tag;
    tagsEl.appendChild(t1); tagsEl.appendChild(t2);

    body.appendChild(nameEl);
    body.appendChild(cityEl);
    body.appendChild(tagsEl);
    item.appendChild(dateEl);
    item.appendChild(body);
    item.addEventListener('click', () => openModal(ev));
    wrap.appendChild(item);
  });

  // Insert after cal-wrap
  const calWrap = document.querySelector('.cal-wrap');
  calWrap.insertAdjacentElement('afterend', wrap);
}

// Re-render mobile list on resize
window.addEventListener('resize', () => {
  if (currentView === 'cal') renderMobileEventList();
  else removeMobileEventList();
});

function renderView() {
  const calWrap    = document.querySelector('.cal-wrap');
  const agendaWrap = document.getElementById('agendaWrap');

  // hide all first
  calWrap.classList.add('hidden');
  agendaWrap.classList.remove('visible');
  removeMobileEventList();

  if (currentView === 'cal') {
    calWrap.classList.remove('hidden');
    renderCal();
    renderMobileEventList();
  } else if (currentView === 'agenda') {
    agendaWrap.classList.add('visible');
    renderAgenda();
  } else if (currentView === 'upcoming') {
    document.getElementById('upcomingWrap').classList.add('visible');
    renderUpcoming();
  }

  // update view button labels
  const calTxt = lang==='es' ? 'Calendario' : 'Calendar';
  const agdTxt = lang==='es' ? 'Agenda' : 'Agenda';
  document.querySelectorAll('.vbtn-cal-txt').forEach(el => el.textContent = calTxt);
  document.querySelectorAll('.vbtn-agenda-txt').forEach(el => el.textContent = agdTxt);
  const annualTxt = lang==='es' ? 'Anual' : 'Annual';
  document.querySelectorAll('.vbtn-annual-txt').forEach(el => el.textContent = annualTxt);
  const si = gel('searchInput'); if(si) si.placeholder = lang==='es' ? 'Buscar evento...' : 'Search event...';
}

// ─── VIEW TOGGLE EVENTS ───
document.getElementById('viewToggle').addEventListener('click', e => {
  const b = e.target.closest('.view-btn'); if(!b) return;
  currentView = b.dataset.view;
  document.querySelectorAll('.view-btn').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  renderView();
});


// ─── DEEP LINKS ───
function openEventById(id) {
  const ev = EVENTS.find(e => String(e.id) === String(id));
  if (ev) {
    const s = parseD(ev.start);
    curYear = s.getFullYear();
    curMonth = s.getMonth();
    renderView();
    setTimeout(() => openModal(ev), 300);
  }
}

// Set hash when opening modal
const _origOpenModal = openModal;
window.openModal = function(ev) {
  _origOpenModal(ev);
  history.replaceState(null, '', '#evento-' + ev.id);
};

// Clear hash when closing modal
document.getElementById('mclose').addEventListener('click', () => {
  history.replaceState(null, '', window.location.pathname + window.location.search);
});

// Check hash on load
function checkHash() {
  const hash = window.location.hash;
  if (hash && hash.startsWith('#evento-')) {
    const id = hash.replace('#evento-', '');
    setTimeout(() => openEventById(id), 600);
  }
}

// ─── INIT ───
// Auto-conectar al Worker al cargar la app
(async () => {
  // ── Loader setup ──────────────────────────────────────────
  const loaderEl   = document.getElementById('app-loader');
  const loaderAnim = document.getElementById('loaderAnim');
  const appEl      = document.querySelector('.app');

  function dismissLoader() {
    if (loaderEl) {
      loaderEl.classList.add('fade-out');
      setTimeout(() => { loaderEl.style.display = 'none'; }, 450);
    }
    if (appEl) appEl.style.visibility = 'visible';
  }

  // Hide app while loading
  if (appEl) appEl.style.visibility = 'hidden';

  // Init Lottie loader animation
  if (typeof lottie !== 'undefined' && loaderAnim) {
    try {
      const loaderColored = JSON.parse(
        JSON.stringify(LOTTIE_LOADER)
          .replace(/"c":\{"a":0,"k":\[0,0,0\]}/g,
            '"c":{"a":0,"k":[0.290,0.227,1]}')
      );
      lottie.loadAnimation({
        container: loaderAnim,
        renderer: 'svg',
        loop: true,
        autoplay: true,
        animationData: loaderColored,
      });
    } catch(e) { console.warn('Loader anim error:', e); }
  }
  
  try {
    const records = await fetchAirtable('', '', '');
    if (records.length > 0) {
      EVENTS.length = 0;
      records.forEach(r => EVENTS.push(r));
      // always stay on today's month
      
    } else {
      
    }
  } catch(e) {
    
  }
  renderView();
  checkHash();
  dismissLoader();
})();
</script>
