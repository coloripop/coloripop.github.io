<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Línea de Tiempo Tech</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0B0B14;
  --panel:#15151F;
  --panel-2:#1C1C29;
  --line:#2A2A3A;
  --text:#F4F1EA;
  --text-dim:#8B8B9E;
  --text-faint:#56566B;
  --accent:#F4A300;

  --c-hardware:#4A3AFF;
  --c-software:#211F54;
  --c-ux:#FE81E7;
  --c-social:#FF8C42;
  --c-web:#2BB3A3;
  --c-mobile:#B5AFFF;
  --c-wearables:#E63946;
  --c-vrar:#6A4C93;
  --c-gaming:#F4A300;
  --c-ia:#00B4D8;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0; height:100%;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',system-ui,sans-serif;
  overflow:hidden;
  height:100%;
  display:flex; flex-direction:column;
  padding-bottom:var(--year-range-h, 150px);
}
.bg-noise{
  position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image:
    radial-gradient(circle at 15% 20%, rgba(74,58,255,0.07), transparent 40%),
    radial-gradient(circle at 85% 75%, rgba(0,180,216,0.06), transparent 40%);
}

/* ===== HEADER ===== */
header{
  position:relative; z-index:2;
  padding:28px 40px 18px;
  border-bottom:1px solid var(--line);
  display:flex; align-items:flex-end; justify-content:space-between;
  gap:24px; flex-wrap:wrap;
}
.brand{display:flex; flex-direction:column; gap:2px;}
.brand .eyebrow{
  font-family:'JetBrains Mono',monospace;
  font-size:11px; letter-spacing:0.18em; text-transform:uppercase;
  color:var(--text-faint);
}
.brand h1{
  font-family:'Bebas Neue',sans-serif;
  font-size:34px; letter-spacing:0.02em; margin:0;
  line-height:1;
}
.brand h1 span{color:var(--accent);}
.header-meta{
  font-size:12px; color:var(--text-dim); text-align:right;
  font-family:'JetBrains Mono',monospace;
}

/* ===== CONTROLS ===== */
.controls{
  position:relative; z-index:3;
  padding:18px 40px;
  display:flex; align-items:center; gap:14px; flex-wrap:wrap;
  border-bottom:1px solid var(--line);
  background:linear-gradient(180deg, rgba(21,21,31,0.6), transparent);
}
.search-box{
  display:flex; align-items:center; gap:8px;
  background:var(--panel); border:1px solid var(--line);
  border-radius:10px; padding:0 14px; height:46px;
  min-width:220px; flex:0 1 260px;
}
.search-box svg{flex-shrink:0; opacity:0.5;}
.search-box input{
  background:transparent; border:none; outline:none;
  color:var(--text); font-family:'Inter',sans-serif; font-size:14px;
  width:100%; height:100%;
}
.search-box input::placeholder{color:var(--text-faint);}

.toggle-group{display:flex; gap:8px;}
.toggle-btn{
  display:flex; align-items:center; gap:9px;
  background:var(--panel); border:1px solid var(--line);
  border-radius:10px; padding:0 18px; height:46px;
  cursor:pointer; transition:all .15s ease;
  font-family:'Inter',sans-serif; font-weight:600; font-size:13.5px;
  color:var(--text-dim); white-space:nowrap;
}
.toggle-btn .dot{width:9px; height:9px; border-radius:50%; flex-shrink:0; background:var(--text-faint); transition:background .15s ease;}
.toggle-btn:hover{border-color:var(--text-faint); color:var(--text);}
.toggle-btn.active{
  background:var(--btn-color, var(--panel-2));
  border-color:var(--btn-color, var(--line));
  color:#0B0B14;
}
.toggle-btn.active .dot{background:#0B0B14;}

.more-wrap{position:relative;}
.more-btn{
  display:flex; align-items:center; gap:8px;
  background:var(--panel); border:1px solid var(--line);
  border-radius:10px; padding:0 16px; height:46px;
  cursor:pointer; color:var(--text-dim); font-weight:600; font-size:13.5px;
  font-family:'Inter',sans-serif; transition:all .15s ease;
}
.more-btn:hover{border-color:var(--text-faint); color:var(--text);}
.more-btn.has-active{border-color:var(--text); color:var(--text);}
.more-count{
  background:var(--accent); color:#0B0B14; font-size:11px; font-weight:800;
  border-radius:999px; min-width:18px; height:18px; display:flex;
  align-items:center; justify-content:center; padding:0 5px;
}
.chev{transition:transform .15s ease;}
.more-wrap.open .chev{transform:rotate(180deg);}

.more-dropdown{
  position:absolute; top:calc(100% + 10px); left:0; z-index:50;
  background:var(--panel-2); border:1px solid var(--line);
  border-radius:12px; padding:8px; width:240px;
  box-shadow:0 16px 40px rgba(0,0,0,0.5);
  display:none; flex-direction:column; gap:2px;
}
.more-wrap.open .more-dropdown{display:flex;}
.more-dropdown::before{
  content:''; position:absolute; top:-6px; left:24px;
  width:12px; height:12px; background:var(--panel-2);
  border-left:1px solid var(--line); border-top:1px solid var(--line);
  transform:rotate(45deg);
}
.check-row{
  display:flex; align-items:center; gap:10px;
  padding:9px 10px; border-radius:8px; cursor:pointer;
  font-size:13.5px; font-weight:500; color:var(--text-dim);
  transition:background .12s ease;
}
.check-row:hover{background:rgba(255,255,255,0.04);}
.check-row .box{
  width:16px; height:16px; border-radius:5px; border:1.5px solid var(--line);
  flex-shrink:0; display:flex; align-items:center; justify-content:center;
  transition:all .12s ease;
}
.check-row.checked .box{border-color:var(--chk-color); background:var(--chk-color);}
.check-row.checked{color:var(--text);}
.check-row .box svg{display:none; width:10px; height:10px;}
.check-row.checked .box svg{display:block;}
.check-row .swatch{width:9px; height:9px; border-radius:50%; margin-left:auto; flex-shrink:0;}

.clear-btn{
  margin-left:auto;
  background:transparent; border:1px solid var(--line); border-radius:10px;
  padding:0 16px; height:46px; cursor:pointer;
  color:var(--text-faint); font-family:'Inter',sans-serif; font-weight:600; font-size:13px;
  transition:all .15s ease;
}
.clear-btn:hover{color:var(--text); border-color:var(--text-faint);}

.region-select-wrap{
  display:flex; align-items:center; gap:8px;
  background:var(--panel); border:1px solid var(--line);
  border-radius:10px; padding:0 14px; height:46px;
  color:var(--text-faint);
}
.region-select-wrap svg{flex-shrink:0; opacity:0.6;}
.region-select-wrap select{
  background:transparent; border:none; outline:none;
  color:var(--text-dim); font-family:'Inter',sans-serif; font-weight:600; font-size:13.5px;
  cursor:pointer; height:100%; max-width:170px;
}
.region-select-wrap select option{background:var(--panel-2); color:var(--text);}

.result-count{
  font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--text-faint);
  padding:0 40px; margin-top:10px; flex-shrink:0;
}
.result-count b{color:var(--text);}

/* ===== TIMELINE ===== */
.timeline-wrap{
  position:relative; z-index:1;
  padding:24px 0;
  flex:1; overflow:hidden;
  display:flex; flex-direction:column;
}
.scroll-progress-wrap{
  position:absolute; top:0; left:40px; right:40px; height:3px;
  background:var(--line); border-radius:999px; z-index:2;
}
.scroll-progress-bar{
  position:absolute; top:0; left:0; height:100%; width:0%;
  background:var(--accent); border-radius:999px;
  transition:width .08s linear;
}
.scroll-position-label{
  position:absolute; top:0; left:50%; transform:translateX(-50%);
  font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-faint);
  background:var(--bg); padding:0 8px;
}
.timeline-scroll{
  overflow-x:auto; overflow-y:hidden;
  padding:0 40px;
  flex:1;
  scrollbar-width:thin; scrollbar-color:var(--line) transparent;
}
.timeline-scroll::-webkit-scrollbar{height:8px;}
.timeline-scroll::-webkit-scrollbar-thumb{background:var(--line); border-radius:4px;}
.timeline-scroll::-webkit-scrollbar-track{background:transparent;}

.timeline-track{
  position:relative;
  display:flex; align-items:stretch;
  height:var(--track-h, 480px);
  width:max-content;
}
.spine{
  position:absolute; left:0; right:0; top:50%;
  height:2px; background:var(--line); z-index:0;
}

.event-col{
  position:relative;
  display:flex; flex-direction:column;
  width:230px; flex-shrink:0;
  height:100%;
  z-index:1;
}
.col-half{
  height:50%; width:100%;
  display:flex; flex-direction:column; align-items:center;
  position:relative;
}
.col-half.half-top{justify-content:flex-end;}
.col-half.half-bottom{justify-content:flex-start;}
.event-col.top .half-top .card-slot{margin-bottom:calc(var(--conn-h, 30px) + 19px);}
.event-col.bottom .half-bottom .card-slot{margin-top:calc(var(--conn-h, 30px) + 19px);}

.connector{
  position:absolute; left:50%; width:1px; background:var(--line);
  transform:translateX(-50%); z-index:0;
}
.half-top .connector{bottom:0; height:var(--conn-h, 30px);}
.half-bottom .connector{top:0; height:var(--conn-h, 30px);}

.node{
  position:absolute; left:50%; transform:translate(-50%,-50%);
  width:38px; height:38px; border-radius:50%;
  background:var(--node-color, var(--panel-2)); border:2px solid var(--bg);
  z-index:3;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 0 0 1px var(--line);
  cursor:pointer;
  transition:transform .15s ease;
}
.half-top .node{bottom:0;}
.half-bottom .node{top:0;}
.node:hover{transform:translate(-50%,-50%) scale(1.12);}
.node svg{width:19px; height:19px; color:#0B0B14;}
.node.imp-3{width:44px; height:44px; box-shadow:0 0 0 1px var(--line), 0 0 16px -2px var(--node-color, transparent);}
.node.imp-3 svg{width:22px; height:22px;}

.card-slot{width:100%; display:flex; justify-content:center;}
.card{
  background:var(--panel); border:1px solid var(--line);
  border-radius:13px; padding:14px 15px 13px;
  width:210px; cursor:pointer; position:relative;
  transition:transform .16s ease, border-color .16s ease, box-shadow .16s ease;
}
.card:hover{transform:translateY(-3px); border-color:var(--text-faint);}
.card .cat-stripe{
  position:absolute; left:0; top:0; bottom:0; width:4px;
  border-radius:13px 0 0 13px; display:flex; flex-direction:column; overflow:hidden;
}
.card .cat-stripe i{flex:1;}
.card .date{
  font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-faint);
  margin-bottom:6px; padding-left:6px;
}
.card .title{
  font-size:14px; font-weight:700; line-height:1.3; margin:0 0 8px;
  padding-left:6px;
}
.card .tags{display:flex; gap:5px; flex-wrap:wrap; padding-left:6px;}
.card .tag{
  font-size:9.5px; font-weight:700; letter-spacing:0.03em; text-transform:uppercase;
  padding:3px 7px; border-radius:5px; color:#0B0B14;
}
.card .imp-badge{
  position:absolute; top:10px; right:10px;
  font-size:9px; color:var(--text-faint); font-family:'JetBrains Mono',monospace;
}

/* ===== MODAL ===== */
.modal-overlay{
  position:fixed; inset:0; z-index:100;
  background:rgba(5,5,10,0.78); backdrop-filter:blur(3px);
  display:none; align-items:center; justify-content:center;
  padding:30px;
}
.modal-overlay.open{display:flex;}
.modal-card{
  background:var(--panel-2); border:1px solid var(--line);
  border-radius:18px; max-width:520px; width:100%;
  padding:32px 32px 28px; position:relative;
  box-shadow:0 30px 80px rgba(0,0,0,0.6);
  max-height:85vh; overflow-y:auto;
  animation:modalIn .18s ease;
}
@keyframes modalIn{from{opacity:0; transform:translateY(8px) scale(0.98);} to{opacity:1; transform:none;}}
.modal-close{
  position:absolute; top:18px; right:18px;
  width:32px; height:32px; border-radius:50%;
  background:var(--panel); border:1px solid var(--line);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; color:var(--text-dim); transition:all .15s ease;
}
.modal-close:hover{color:var(--text); border-color:var(--text-faint);}
.modal-icon{
  width:64px; height:64px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  margin-bottom:18px;
}
.modal-icon svg{width:32px; height:32px; color:#0B0B14;}
.modal-date{
  font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--text-faint);
  margin-bottom:6px;
}
.modal-title{
  font-size:24px; font-weight:800; line-height:1.2; margin:0 0 14px;
}
.modal-tags{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:18px;}
.modal-tags .tag{
  font-size:10.5px; font-weight:700; letter-spacing:0.03em; text-transform:uppercase;
  padding:4px 10px; border-radius:6px; color:#0B0B14;
}
.modal-desc{
  font-size:15px; line-height:1.65; color:var(--text); margin:0 0 18px;
}
.modal-meta{
  display:flex; flex-direction:column; gap:6px;
  padding-top:16px; border-top:1px solid var(--line);
  font-size:12px; color:var(--text-faint);
}
.modal-meta b{color:var(--text-dim); font-weight:600;}

.era-marker{
  position:relative; flex-shrink:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  width:120px; z-index:1;
}
.era-marker .year-big{
  font-family:'Bebas Neue',sans-serif; font-size:46px; color:var(--text);
  line-height:1; white-space:nowrap;
}
.era-marker .era-label{
  font-family:'JetBrains Mono',monospace; font-size:9.5px; color:var(--text-faint);
  text-transform:uppercase; letter-spacing:0.06em; margin-top:4px; text-align:center;
  max-width:110px; white-space:normal;
}

.empty-state{
  padding:80px 40px; text-align:center; color:var(--text-faint);
  font-size:14px;
}

/* ===== YEAR SLIDER ===== */
.year-range{
  position:fixed; bottom:0; left:0; right:0;
  z-index:20;
  padding:14px 40px 0;
  border-top:1px solid var(--line);
  background:var(--bg);
}
.year-range-labels{
  display:flex; justify-content:space-between; align-items:flex-end;
  margin-bottom:6px;
}
.year-range-side{display:flex; flex-direction:column; gap:2px;}
.year-range-side.to{align-items:flex-end;}
.year-range-eyebrow{
  font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text-faint);
  text-transform:uppercase; letter-spacing:0.14em;
}
.year-range-value{
  font-family:'Bebas Neue',sans-serif; font-size:32px; color:var(--text);
  line-height:1;
}
.range-slider{
  position:relative; height:40px; margin:6px 0 4px;
}
.range-track-bg{
  position:absolute; top:50%; left:0; right:0; height:4px;
  transform:translateY(-50%);
  background:var(--line); border-radius:999px;
}
.range-track-fill{
  position:absolute; top:50%; height:4px;
  transform:translateY(-50%);
  background:linear-gradient(90deg, var(--c-web), var(--c-mobile));
  border-radius:999px;
}
.range-era-tick{
  position:absolute; top:50%; transform:translate(-50%,-50%);
  width:9px; height:9px; border-radius:50%;
  background:var(--bg); border:2px solid var(--text-faint);
  z-index:2; cursor:pointer;
  transition:all .15s ease;
}
.range-era-tick:hover{border-color:var(--text); transform:translate(-50%,-50%) scale(1.3);}
.range-era-labels{
  position:relative; height:16px; margin-top:6px;
}
.range-era-label{
  position:absolute; top:0; transform:translateX(-50%);
  font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--text-faint);
  white-space:nowrap; cursor:pointer; text-transform:uppercase; letter-spacing:0.04em;
  transition:color .15s ease;
}
.range-era-label:hover{color:var(--accent);}
.range-slider input[type="range"]{
  position:absolute; top:0; left:0; width:100%; height:40px;
  margin:0; background:transparent;
  -webkit-appearance:none; appearance:none;
  pointer-events:none;
}
.range-slider input[type="range"]::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:22px; height:22px; border-radius:50%;
  background:var(--bg); border:3px solid var(--text);
  cursor:pointer; pointer-events:auto;
  position:relative; z-index:3;
  transition:transform .12s ease;
}
.range-slider input[type="range"]::-webkit-slider-thumb:hover{transform:scale(1.15);}
.range-slider input[type="range"]::-moz-range-thumb{
  width:22px; height:22px; border-radius:50%;
  background:var(--bg); border:3px solid var(--text);
  cursor:pointer; pointer-events:auto;
}
.range-slider input[type="range"]::-webkit-slider-runnable-track{background:transparent;}
.range-slider input[type="range"]::-moz-range-track{background:transparent;}

footer{
  padding:5px 40px 8px; text-align:center;
  font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--text-faint);
}

@media (max-width: 700px){
  header,.controls,.year-range{padding-left:18px; padding-right:18px;}
  .timeline-scroll{padding-left:18px; padding-right:18px;}
  .brand h1{font-size:26px;}
}
</style>
</head>
<body>
<div class="bg-noise"></div>

<header>
  <div class="brand">
    <span class="eyebrow">Taller de Diseño Digital</span>
    <h1>Línea de tiempo <span>Tech</span></h1>
  </div>
  <div class="header-meta" id="headerMeta">127 eventos · 1837–2026</div>
</header>

<div class="controls">
  <div class="search-box">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="searchInput" placeholder="Buscar evento...">
  </div>

  <div class="toggle-group" id="mainToggles">
    <button class="toggle-btn" data-cat="Mobile" style="--btn-color:var(--c-mobile)">
      <span class="dot"></span>Mobile
    </button>
    <button class="toggle-btn" data-cat="Web/Internet" style="--btn-color:var(--c-web)">
      <span class="dot"></span>Web
    </button>
    <button class="toggle-btn" data-cat="UX/UI" style="--btn-color:var(--c-ux)">
      <span class="dot"></span>UX/UI
    </button>
  </div>

  <div class="more-wrap" id="moreWrap">
    <button class="more-btn" id="moreBtn">
      <span>Más categorías</span>
      <span class="more-count" id="moreCount" style="display:none;">0</span>
      <svg class="chev" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    <div class="more-dropdown" id="moreDropdown"></div>
  </div>

  <div class="region-select-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><ellipse cx="12" cy="12" rx="4" ry="9"/><line x1="3" y1="12" x2="21" y2="12"/></svg>
    <select id="regionSelect">
      <option value="">Todas las regiones</option>
    </select>
  </div>

  <button class="clear-btn" id="clearBtn">Limpiar filtros</button>
</div>

<div class="result-count" id="resultCount"></div>

<div class="timeline-wrap">
  <div class="scroll-progress-wrap">
    <div class="scroll-progress-bar" id="scrollProgressBar"></div>
  </div>
  <div class="timeline-scroll" id="timelineScroll">
    <div class="timeline-track" id="timelineTrack">
      <div class="spine"></div>
    </div>
  </div>
  <div class="scroll-position-label" id="scrollPositionLabel"></div>
</div>

<div class="year-range">
  <div class="year-range-labels">
    <div class="year-range-side from">
      <span class="year-range-eyebrow">Desde</span>
      <span class="year-range-value" id="yearFromLabel">1837</span>
    </div>
    <div class="year-range-side to">
      <span class="year-range-eyebrow">Hasta</span>
      <span class="year-range-value" id="yearToLabel">2026</span>
    </div>
  </div>
  <div class="range-slider">
    <div class="range-track-bg"></div>
    <div class="range-track-fill" id="rangeFill"></div>
    <div id="eraTicks"></div>
    <input type="range" id="rangeFrom" min="1837" max="2026" value="1837" step="1">
    <input type="range" id="rangeTo" min="1837" max="2026" value="2026" step="1">
  </div>
  <div class="range-era-labels" id="eraLabels"></div>
  <footer>Coloripop · Datos: investigación histórica de tecnología digital, 1837–2026</footer>
</div>

<div class="modal-overlay" id="modalOverlay">

// ===== CONFIG =====
const CATEGORY_COLORS = {
  'Hardware': 'var(--c-hardware)',
  'Software': 'var(--c-software)',
  'UX/UI': 'var(--c-ux)',
  'Social Networks': 'var(--c-social)',
  'Web/Internet': 'var(--c-web)',
  'Mobile': 'var(--c-mobile)',
  'Wearables': 'var(--c-wearables)',
  'VR/AR': 'var(--c-vrar)',
  'Gaming/Gamification': 'var(--c-gaming)',
  'IA': 'var(--c-ia)'
};
const MAIN_CATS = ['Mobile', 'Web/Internet', 'UX/UI'];
const MORE_CATS = ['Hardware', 'Software', 'Social Networks', 'Wearables', 'VR/AR', 'Gaming/Gamification', 'IA'];
const CAT_SHORT = {
  'Social Networks': 'Social',
  'Gaming/Gamification': 'Gaming',
  'Web/Internet': 'Web',
  'VR/AR': 'VR/AR'
};

const EVENTS = JSON.parse(document.getElementById('events-data').textContent);
const YEAR_MIN = Math.min(...EVENTS.map(e => e.year));
const YEAR_MAX = Math.max(...EVENTS.map(e => e.year));

// ===== STATE =====
let activeFilters = new Set();
let searchQuery = '';
let yearFrom = YEAR_MIN;
let yearTo = YEAR_MAX;
let selectedRegion = '';

// ===== BUILD MORE-DROPDOWN =====
const moreDropdown = document.getElementById('moreDropdown');
MORE_CATS.forEach(cat => {
  const row = document.createElement('div');
  row.className = 'check-row';
  row.dataset.cat = cat;
  row.style.setProperty('--chk-color', CATEGORY_COLORS[cat]);
  row.innerHTML = `
    <span class="box"><svg viewBox="0 0 24 24" fill="none" stroke="#0B0B14" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></span>
    <span>${cat}</span>
    <span class="swatch" style="background:${CATEGORY_COLORS[cat]}"></span>
  `;
  row.addEventListener('click', () => {
    toggleFilter(cat);
    row.classList.toggle('checked', activeFilters.has(cat));
    updateMoreBtn();
  });
  moreDropdown.appendChild(row);
});

function updateMoreBtn(){
  const activeMoreCount = MORE_CATS.filter(c => activeFilters.has(c)).length;
  const countEl = document.getElementById('moreCount');
  const btn = document.getElementById('moreBtn');
  if(activeMoreCount > 0){
    countEl.style.display = 'flex';
    countEl.textContent = activeMoreCount;
    btn.classList.add('has-active');
  } else {
    countEl.style.display = 'none';
    btn.classList.remove('has-active');
  }
}

// ===== REGION FILTER =====
const regionSelect = document.getElementById('regionSelect');
(function buildRegionOptions(){
  const counts = {};
  EVENTS.forEach(ev => { counts[ev.region] = (counts[ev.region] || 0) + 1; });
  const regions = Object.keys(counts).sort((a,b) => counts[b] - counts[a]);
  regions.forEach(r => {
    const opt = document.createElement('option');
    opt.value = r;
    opt.textContent = `${r} (${counts[r]})`;
    regionSelect.appendChild(opt);
  });
})();
regionSelect.addEventListener('change', () => {
  selectedRegion = regionSelect.value;
  render();
});

document.getElementById('moreBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  document.getElementById('moreWrap').classList.toggle('open');
});
document.addEventListener('click', (e) => {
  const wrap = document.getElementById('moreWrap');
  if(!wrap.contains(e.target)) wrap.classList.remove('open');
});

// ===== MAIN TOGGLES =====
document.querySelectorAll('#mainToggles .toggle-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const cat = btn.dataset.cat;
    toggleFilter(cat);
    btn.classList.toggle('active', activeFilters.has(cat));
  });
});

function toggleFilter(cat){
  if(activeFilters.has(cat)) activeFilters.delete(cat);
  else activeFilters.add(cat);
  render();
}

document.getElementById('clearBtn').addEventListener('click', () => {
  activeFilters.clear();
  searchQuery = '';
  yearFrom = YEAR_MIN;
  yearTo = YEAR_MAX;
  selectedRegion = '';
  regionSelect.value = '';
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.check-row').forEach(r => r.classList.remove('checked'));
  updateMoreBtn();
  rangeFrom.value = YEAR_MIN;
  rangeTo.value = YEAR_MAX;
  updateRangeUI();
  render();
});

document.getElementById('searchInput').addEventListener('input', (e) => {
  searchQuery = e.target.value.trim().toLowerCase();
  render();
});

// ===== FILTER LOGIC =====
function getFiltered(){
  let result = EVENTS.filter(ev => ev.year >= yearFrom && ev.year <= yearTo);
  if(activeFilters.size > 0){
    result = result.filter(ev => ev.categories.some(c => activeFilters.has(c)));
  }
  if(selectedRegion){
    result = result.filter(ev => ev.region === selectedRegion);
  }
  if(searchQuery){
    result = result.filter(ev =>
      ev.title.toLowerCase().includes(searchQuery) ||
      ev.desc.toLowerCase().includes(searchQuery) ||
      ev.era.toLowerCase().includes(searchQuery) ||
      String(ev.year).includes(searchQuery)
    );
  }
  return result;
}

// ===== RENDER TIMELINE =====
function highlightMatch(text){
  if(!searchQuery) return escapeHTML(text);
  const escaped = escapeHTML(text);
  const idx = escaped.toLowerCase().indexOf(searchQuery.toLowerCase());
  if(idx === -1) return escaped;
  return escaped.slice(0, idx) + '<mark>' + escaped.slice(idx, idx + searchQuery.length) + '</mark>' + escaped.slice(idx + searchQuery.length);
}
function escapeHTML(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function buildCard(ev){
  const visibleCats = ev.categories.slice(0, 2);
  const extraCount = ev.categories.length - visibleCats.length;
  const stripeHTML = visibleCats.map(c => `<i style="background:${CATEGORY_COLORS[c]}"></i>`).join('');
  const tagsHTML = visibleCats.map(c =>
    `<span class="tag" style="background:${CATEGORY_COLORS[c]}">${CAT_SHORT[c] || c}</span>`
  ).join('') + (extraCount > 0 ? `<span class="tag tag-more">+${extraCount}</span>` : '');

  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <span class="cat-stripe">${stripeHTML}</span>
    <span class="imp-badge">${'★'.repeat(ev.importance)}</span>
    <div class="date">${ev.year}</div>
    <div class="title">${highlightMatch(ev.title)}</div>
    <div class="tags">${tagsHTML}</div>
  `;
  card.addEventListener('click', () => openModal(ev));
  return card;
}

function buildNode(ev){
  const node = document.createElement('div');
  const mainCat = ev.categories[0];
  node.className = 'node imp-' + ev.importance;
  if(mainCat){
    node.style.setProperty('--node-color', CATEGORY_COLORS[mainCat]);
    node.innerHTML = CATEGORY_ICONS[mainCat] || '';
  }
  node.addEventListener('click', () => openModal(ev));
  return node;
}

// ===== MODAL =====
function openModal(ev){
  const overlay = document.getElementById('modalOverlay');
  const card = document.getElementById('modalCard');
  const mainCat = ev.categories[0];
  const tagsHTML = ev.categories.map(c =>
    `<span class="tag" style="background:${CATEGORY_COLORS[c]}">${c}</span>`
  ).join('');

  card.innerHTML = `
    <div class="modal-close" id="modalCloseBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>
    <div class="modal-icon" style="background:${CATEGORY_COLORS[mainCat] || 'var(--panel)'}">${CATEGORY_ICONS[mainCat] || ''}</div>
    <div class="modal-date">${ev.year} · ${ev.era}</div>
    <h2 class="modal-title">${ev.title}</h2>
    <div class="modal-tags">${tagsHTML}</div>
    <p class="modal-desc">${ev.desc}</p>
    <div class="modal-meta">
      <span><b>Región / origen:</b> ${ev.region || '—'}</span>
      <span><b>Importancia:</b> ${'★'.repeat(ev.importance)}${'☆'.repeat(3-ev.importance)}</span>
      <span><b>Fuente:</b> ${ev.source}</span>
    </div>
  `;
  overlay.classList.add('open');
  document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
}
function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
}
document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if(e.target.id === 'modalOverlay') closeModal();
});
document.addEventListener('keydown', (e) => {
  if(e.key === 'Escape') closeModal();
});

function render(){
  const filtered = getFiltered();
  const track = document.getElementById('timelineTrack');
  const resultCount = document.getElementById('resultCount');
  const headerMeta = document.getElementById('headerMeta');

  resultCount.innerHTML = `Mostrando <b>${filtered.length}</b> de ${EVENTS.length} eventos`;
  if(filtered.length){
    headerMeta.textContent = `${filtered.length} eventos · ${filtered[0].year}–${filtered[filtered.length-1].year}`;
  }

  track.innerHTML = '<div class="spine"></div>';

  if(filtered.length === 0){
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.style.width = '100%';
    empty.textContent = 'No hay eventos que coincidan con estos filtros.';
    track.appendChild(empty);
    return;
  }

  let lastEra = null;
  let alternate = 0;

  filtered.forEach((ev) => {
    if(ev.era !== lastEra){
      const marker = document.createElement('div');
      marker.className = 'era-marker';
      marker.innerHTML = `
        <span class="year-big">${ev.year}</span>
        <span class="era-label">${ev.era}</span>
      `;
      track.appendChild(marker);
      lastEra = ev.era;
    }

    const col = document.createElement('div');
    const isTop = alternate % 2 === 0;
    col.className = 'event-col ' + (isTop ? 'top' : 'bottom');
    col.dataset.year = ev.year;

    const connH = ev.importance === 3 ? 26 : 22;
    col.style.setProperty('--conn-h', connH + 'px');

    const halfTop = document.createElement('div');
    halfTop.className = 'col-half half-top';
    const halfBottom = document.createElement('div');
    halfBottom.className = 'col-half half-bottom';

    const activeHalf = isTop ? halfTop : halfBottom;

    const connector = document.createElement('div');
    connector.className = 'connector';
    activeHalf.appendChild(connector);

    activeHalf.appendChild(buildNode(ev));

    const slot = document.createElement('div');
    slot.className = 'card-slot';
    slot.appendChild(buildCard(ev));
    activeHalf.appendChild(slot);

    col.appendChild(halfTop);
    col.appendChild(halfBottom);

    track.appendChild(col);
    alternate++;
  });

  updateScrollProgress();
}

// ===== YEAR RANGE SLIDER =====
const rangeFrom = document.getElementById('rangeFrom');
const rangeTo = document.getElementById('rangeTo');
const yearFromLabel = document.getElementById('yearFromLabel');
const yearToLabel = document.getElementById('yearToLabel');
const rangeFill = document.getElementById('rangeFill');
const eraTicksWrap = document.getElementById('eraTicks');
const eraLabelsWrap = document.getElementById('eraLabels');
const MIN_GAP = 1;

rangeFrom.min = YEAR_MIN; rangeFrom.max = YEAR_MAX; rangeFrom.value = YEAR_MIN;
rangeTo.min = YEAR_MIN; rangeTo.max = YEAR_MAX; rangeTo.value = YEAR_MAX;

// Build ordered list of unique eras with their starting year (from dataset order)
const ERA_SHORT = {
  'Pre-1900': 'Pre-1900',
  '1900-1939: Fundamentos teóricos': '1900s',
  '1940s: Primeras computadoras': '1940s',
  '1950s: Computación comercial': '1950s',
  '1960s: Redes e interfaz': '1960s',
  '1970s: Microprocesador y arcade': '1970s',
  '1980s: PC e Internet temprano': '1980s',
  '1990s: Web y redes sociales tempranas': '1990s',
  '2000s: Banda ancha y smartphones': '2000s',
  '2010s: Gamificación y VR/AR moderno': '2010s',
  '2020s: IA generativa y agentes': '2020s'
};
const eraStarts = [];
const seenEras = new Set();
EVENTS.slice().sort((a,b) => a.year - b.year).forEach(ev => {
  if(!seenEras.has(ev.era)){
    seenEras.add(ev.era);
    eraStarts.push({ era: ev.era, year: ev.year, label: ERA_SHORT[ev.era] || ev.era });
  }
});

function buildEraTicks(){
  const min = YEAR_MIN, max = YEAR_MAX;
  eraStarts.forEach(e => {
    const pct = ((e.year - min) / (max - min)) * 100;

    const tick = document.createElement('div');
    tick.className = 'range-era-tick';
    tick.style.left = pct + '%';
    tick.title = e.era + ' (' + e.year + ')';
    tick.addEventListener('click', () => jumpToEra(e.year));
    eraTicksWrap.appendChild(tick);

    const label = document.createElement('div');
    label.className = 'range-era-label';
    label.style.left = pct + '%';
    label.textContent = e.label;
    label.title = e.era;
    label.addEventListener('click', () => jumpToEra(e.year));
    eraLabelsWrap.appendChild(label);
  });
}

function jumpToEra(year){
  yearFrom = year;
  if(yearTo <= yearFrom) yearTo = YEAR_MAX;
  rangeFrom.value = yearFrom;
  rangeTo.value = yearTo;
  updateRangeUI();
  render();
}

function formatYear(y){
  return y < 0 ? Math.abs(y) + ' a.C.' : String(y);
}

function updateRangeUI(){
  const min = Number(rangeFrom.min);
  const max = Number(rangeFrom.max);
  const pctFrom = ((yearFrom - min) / (max - min)) * 100;
  const pctTo = ((yearTo - min) / (max - min)) * 100;
  rangeFill.style.left = pctFrom + '%';
  rangeFill.style.width = (pctTo - pctFrom) + '%';
  yearFromLabel.textContent = formatYear(yearFrom);
  yearToLabel.textContent = formatYear(yearTo);
}

rangeFrom.addEventListener('input', () => {
  yearFrom = Math.min(Number(rangeFrom.value), yearTo - MIN_GAP);
  rangeFrom.value = yearFrom;
  updateRangeUI();
  render();
});
rangeTo.addEventListener('input', () => {
  yearTo = Math.max(Number(rangeTo.value), yearFrom + MIN_GAP);
  rangeTo.value = yearTo;
  updateRangeUI();
  render();
});

// assign unique ids
EVENTS.forEach((ev, i) => ev._uid = i);

// ===== SCROLL PROGRESS INDICATOR =====
const timelineScrollEl = document.getElementById('timelineScroll');
const scrollProgressBar = document.getElementById('scrollProgressBar');
const scrollPositionLabel = document.getElementById('scrollPositionLabel');

function updateScrollProgress(){
  const el = timelineScrollEl;
  const maxScroll = el.scrollWidth - el.clientWidth;
  const pct = maxScroll > 0 ? (el.scrollLeft / maxScroll) * 100 : 0;
  scrollProgressBar.style.width = Math.min(100, Math.max(0, pct)) + '%';

  // find the event-col closest to the horizontal center of the viewport
  const viewportCenter = el.scrollLeft + el.clientWidth / 2;
  const cols = el.querySelectorAll('.event-col');
  let closest = null;
  let closestDist = Infinity;
  cols.forEach(col => {
    const colCenter = col.offsetLeft + col.offsetWidth / 2;
    const dist = Math.abs(colCenter - viewportCenter);
    if(dist < closestDist){ closestDist = dist; closest = col; }
  });
  scrollPositionLabel.textContent = closest ? closest.dataset.year : '';
}

timelineScrollEl.addEventListener('scroll', updateScrollProgress, { passive: true });
window.addEventListener('resize', updateScrollProgress);

// ===== TRACK HEIGHT SYNC =====
// Measure the real available height of .timeline-scroll and apply it as a
// fixed px value to .timeline-track via CSS variable. This avoids relying on
// chained height:100% across flex containers with overflow, which some
// browsers resolve inconsistently when content is wider than the container.
function syncTrackHeight(){
  const h = timelineScrollEl.clientHeight;
  if(h > 0){
    document.getElementById('timelineTrack').style.setProperty('--track-h', h + 'px');
  }
}

// The year-range slider is position:fixed (so it always stays glued to the
// bottom of the viewport), which means it takes up zero space in the
// document's normal flow. We measure its real rendered height and reserve
// that exact amount as bottom padding on <body>, so the flexible timeline
// area above it is sized to the space that's actually visible (not the
// space it would have if the fixed slider didn't exist).
const yearRangeEl = document.querySelector('.year-range');
function syncYearRangeHeight(){
  const h = yearRangeEl.getBoundingClientRect().height;
  if(h > 0){
    document.documentElement.style.setProperty('--year-range-h', h + 'px');
  }
  syncTrackHeight();
}
if(typeof ResizeObserver !== 'undefined'){
  const trackResizeObserver = new ResizeObserver(() => syncYearRangeHeight());
  trackResizeObserver.observe(timelineScrollEl);
  trackResizeObserver.observe(yearRangeEl);
} else {
  window.addEventListener('resize', syncYearRangeHeight);
}
window.addEventListener('resize', syncYearRangeHeight);

// ===== KEYBOARD NAVIGATION (placeholder - extended below) =====

// ===== INIT =====
buildEraTicks();
updateRangeUI();
syncYearRangeHeight();
render();

</script>
